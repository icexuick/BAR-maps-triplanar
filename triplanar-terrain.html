  uDecalCentre:     { value: Array.from({ length: MAX_DECALS }, () => new THREE.Vector4()) },
  // .xyz = tangent / bitangent axes, anchored to the surface normal at
  // spawn time and pre-rotated by a random angle so repeated decals
  // don't look identical.
  uDecalT:          { value: Array.from({ length: MAX_DECALS }, () => new THREE.Vector3(1, 0, 0)) },
  uDecalB:          { value: Array.from({ length: MAX_DECALS }, () => new THREE.Vector3(0, 0, 1)) },
  // Each Vector2 stores the per-decal albedo fade (.x) and glow ember
  // fade (.y). Per-decal glow timeline so a fresh blast can't re-ignite
  // older decals — each one cools on its own clock.
  uDecalFade:       { value: Array.from({ length: MAX_DECALS }, () => new THREE.Vector2()) },
  uDecalGlow:       { value: 0.6 },
  uDecalTint:       { value: 0.65 },
  uDecalNormalStr:  { value: 0.6 },

  // Shadow mapping — bound to DirectionalLight.shadow after scene setup.
  uShadowMap:        { value: null },
  uShadowMatrix:     { value: new THREE.Matrix4() },
  uShadowEnabled:    { value: 0.0 },
  uShadowBias:       { value: 0.00005 },
  uShadowNormalBias: { value: 0.04 },
  uShadowMapSize:    { value: 4096 },
  uShadowSoftness:   { value: 2.5 },

  uHeightmap: { value: null },
  uUseHeightmap: { value: 0.0 },
  uHeightScale: { value: 4.0 },
  uHeightmapTexel: { value: new THREE.Vector2(1.0 / 1024.0, 1.0 / 1024.0) },
  uWorldWidth: { value: STATE.worldSize },
  uWorldDepth: { value: STATE.worldSize },

  // Explosion damage mask. R = scorched amount (0..1), G = crater depth
  // (0..1, multiplied by uDamageMaxDepth world units at the vertex stage).
  uDamageMask:     { value: null },
  uDamageTexel:    { value: new THREE.Vector2(1.0 / 1024.0, 1.0 / 1024.0) },
  // Reference world-unit depth for a FULLY saturated G channel. Fixed at
  // paint time: the explosion slider stores depth as (actualDepth / 5.0) in
  // the G byte, so changing the slider later never retroactively deepens
  // existing craters. Keep this in sync with the Depth slider's max value.
  uDamageMaxDepth: { value: 5.0 },
  uDamageEnabled:  { value: 0.0 },

  uHeightMinWorld: { value: 0.0 },
  uHeightMaxWorld: { value: 1.0 },

  // Topographic contour lines. Rendered as subtle horizontal isolines at
  // constant world-Y intervals. A fake normal perturbation makes them look
  // like shallow grooves, which means the existing NdotL/shadow pipeline
  // automatically gives them sun-linked shading — grooves on a sunward-
  // facing slope shade on their upper lip, anti-sun slopes flip the shade.
  uTopoEnabled:  { value: 0.0 },
  uTopoSpacing:  { value: 0.6 },   // world-Y distance between lines
  uTopoWidth:    { value: 0.04 },  // world-Y thickness of each line
  uTopoDepth:    { value: 0.6 },   // fake groove depth (normal perturbation strength)
  uTopoDarken:   { value: 0.35 },  // how much the core of the line is darkened
  // xy = slope min/max (0..1), zw = height01 min/max
  uTopoRange:    { value: new THREE.Vector4(0.0, 1.0, 0.0, 1.0) }
};
// Bind the decal textures into the shared uniform set now that both the
// textures and the uniforms object exist.
sharedUniforms.uDecalAlbedo.value = decalAlbedoTex;
sharedUniforms.uDecalNormal.value = decalNormalTex;

// ═══════════════════════════════════════════════════════════════════════
//  GEOMETRY / MATERIAL REBUILD
// ═══════════════════════════════════════════════════════════════════════
let terrain = null;
let currentGeo = null;
let currentMat = null;
// Hoisted here because rebuildGeometry() runs during initial setup, before
// the heightmap section further down would otherwise declare it.
let lastHeightmapInfo = null;

function rebuildGeometry() {
  if (currentGeo) currentGeo.dispose();
  const width = STATE.worldSize;
  const depth = STATE.worldSize / STATE.heightmapAspect;
  // If a heightmap is loaded, match the grid to its pixel resolution
  // (one quad per texel-minus-one) so every displacement sample lands on
  // an actual vertex. Otherwise fall back to a world-size-scaled grid.
  let segX, segZ;
  if (lastHeightmapInfo) {
    segX = Math.min(4096, Math.max(8, lastHeightmapInfo.width  - 1));
    segZ = Math.min(4096, Math.max(8, lastHeightmapInfo.height - 1));
  } else {
    segX = Math.min(1024, Math.max(200, Math.round(width * 25)));
    segZ = Math.min(1024, Math.max(200, Math.round(depth * 25)));
  }
  currentGeo = new THREE.PlaneGeometry(width, depth, segX, segZ);
  currentGeo.rotateX(-Math.PI / 2);
  if (terrain) terrain.geometry = currentGeo;
  sharedUniforms.uWorldWidth.value = width;
  sharedUniforms.uWorldDepth.value = depth;
  const triCount = currentGeo.index
    ? currentGeo.index.count / 3
    : currentGeo.attributes.position.count / 3;
  document.getElementById('stat-tris').textContent = `TRIS: ${Math.round(triCount / 1000)}K`;
}

// Build a fixed-length array of 8 THREE.Vector4 for a gradient's stops,
// packed as vec4(r, g, b, pos). Unused slots get pos = -1 so the shader
// loop ignores them. Input stops are sorted by pos so the shader's
// left-to-right walk produces the correct interpolation.
function buildStopsArray(stops) {
  const sorted = [...(stops || [])].sort((a, b) => a.pos - b.pos);
  const arr = [];
  for (let i = 0; i < 8; i++) {
    if (i < sorted.length) {
      const s = sorted[i];
      arr.push(new THREE.Vector4(s.color[0], s.color[1], s.color[2], s.pos));
    } else {
      arr.push(new THREE.Vector4(0, 0, 0, -1));
    }
  }
  return arr;
}

// Push the current gradient state for a given auto-layer into the live
// uniforms so the GPU sees the new stop positions/colors on the next draw.
// Keeps the Vector4 identities intact (three.js' .set() in-place) so the
// uniform upload path stays cheap.
// Live-push a layer's gradient state to the shader uniforms. `kind` selects
// which gradient to push: 'height' uses the gradLayer*  uniforms and reads
// from layer.gradient; 'slope' uses slopeGradLayer* and layer.slopeGradient.
// Same shape, just different prefixes — kept as one function so the live-
// update path is identical and we only have one place to maintain.
function pushGradientUniforms(idx, kind = 'height') {
  const u = currentMat && currentMat.uniforms;
  if (!u) return;
  const layer = STATE.layers[idx];
  if (!layer) return;
  const prefix = kind === 'slope' ? 'slopeGrad' : 'grad';
  if (!u[`${prefix}StopsLayer${idx}`]) return;
  const g = (kind === 'slope' ? layer.slopeGradient : layer.gradient)
            || { enabled: 0, strength: 1, stops: [] };
  u[`${prefix}EnabledLayer${idx}`].value  = g.enabled ? 1.0 : 0.0;
  u[`${prefix}StrengthLayer${idx}`].value = g.strength ?? 1.0;
  const sorted = [...(g.stops || [])].sort((a, b) => a.pos - b.pos);
  u[`${prefix}StopCountLayer${idx}`].value = Math.min(sorted.length, 8);
  const arr = u[`${prefix}StopsLayer${idx}`].value;
  for (let i = 0; i < 8; i++) {
    if (i < sorted.length) {
      const s = sorted[i];
      arr[i].set(s.color[0], s.color[1], s.color[2], s.pos);
    } else {
      arr[i].set(0, 0, 0, -1);
    }
  }
}

function buildUniformsForState() {
  // Fresh clone of shared uniforms so ShaderMaterial gets its own references
  const u = {};
  for (const [k, v] of Object.entries(sharedUniforms)) {
    u[k] = v;   // keep reference — we want slider writes to propagate
  }

  // Material sampler + tunable uniforms (one set per unique material).
  // The tunable uniforms use ONE shared reference per material id, stored on
  // MATERIAL_LIBRARY[id]._uniforms, so Materials panel slider writes reach
  // every subsequent material rebuild without needing a full shader recompile.
  const mats = new Set();
  mats.add(STATE.baseLayer.material);
  for (const l of STATE.layers) mats.add(l.material);
  mats.add('damage');
  for (const id of mats) {
    const m = MATERIAL_LIBRARY[id];
    if (!m._uniforms) {
      m._uniforms = {
        UvScale:    { value: m.uvScale },
        UvRot:      { value: m.uvRotation },
        Bright:     { value: m.brightness },
        Tint:       { value: new THREE.Vector3(...m.tint) },
        Roughness:  { value: m.roughness },
        NormalStr:  { value: m.normalStrength },
        Spec:       { value: m.specular }
      };
    }
    u[`u_${id}_Color`]     = { value: getTexture(m.color, { srgb: true }) };
    u[`u_${id}_Normal`]    = { value: getTexture(m.normal) };
    u[`u_${id}_UvScale`]   = m._uniforms.UvScale;
    u[`u_${id}_UvRot`]     = m._uniforms.UvRot;
    u[`u_${id}_Bright`]    = m._uniforms.Bright;
    u[`u_${id}_Tint`]      = m._uniforms.Tint;
    u[`u_${id}_Roughness`] = m._uniforms.Roughness;
    u[`u_${id}_NormalStr`] = m._uniforms.NormalStr;
    u[`u_${id}_Spec`]      = m._uniforms.Spec;
  }

  // Per-layer uniforms (vec4 = hMin,hMax,sMin,sMax; plus soft, strength, brightness, thickness, shadowStrength)
  STATE.layers.forEach((l, idx) => {
    u[`uLayer${idx}`] = { value: new THREE.Vector4(l.hMin, l.hMax, l.sMin, l.sMax) };
    u[`softLayer${idx}`] = { value: l.soft };
    u[`strengthLayer${idx}`] = { value: l.visible === false ? 0.0 : l.strength };
    u[`brightLayer${idx}`] = { value: l.brightness };
    u[`thickLayer${idx}`] = { value: l.thickness ?? 0.0 };
    u[`highlightWidthLayer${idx}`] = { value: l.highlightWidth ?? 0.15 };
    u[`highlightSoftLayer${idx}`] = { value: l.highlightSoft ?? 1.0 };
    u[`shadowLayer${idx}`] = { value: l.shadowStrength ?? 0.0 };
    u[`shadowDistLayer${idx}`] = { value: l.shadowDist ?? 0.02 };
    u[`shadowBlurLayer${idx}`] = { value: l.shadowBlur ?? 0.01 };
    const en = l.edgeNoise || {};
    u[`edgeNoiseEnabledLayer${idx}`] = { value: en.enabled ? 1.0 : 0.0 };
    u[`edgeNoiseScaleLayer${idx}`]   = { value: en.scale   ?? -1.0  }; // log10 → 0.1
    u[`edgeNoiseAmountLayer${idx}`]  = { value: en.amount  ?? 0.08 };
    u[`edgeNoiseWidthLayer${idx}`]   = { value: en.width   ?? 0.15 };
    u[`edgeMaskHMinLayer${idx}`]     = { value: en.maskHMin ? 1.0 : 0.0 };
    u[`edgeMaskHMaxLayer${idx}`]     = { value: en.maskHMax ? 1.0 : 0.0 };
    u[`edgeMaskSMinLayer${idx}`]     = { value: en.maskSMin ? 1.0 : 0.0 };
    u[`edgeMaskSMaxLayer${idx}`]     = { value: en.maskSMax ? 1.0 : 0.0 };
    // Gradient uniforms — packed stops array (vec4 = rgb + pos), fixed size 8.
    const grad = l.gradient || { enabled: 0, strength: 1, stops: [] };
    u[`gradEnabledLayer${idx}`]  = { value: grad.enabled ? 1.0 : 0.0 };
    u[`gradStrengthLayer${idx}`] = { value: grad.strength ?? 1.0 };
    u[`gradStopCountLayer${idx}`] = { value: Math.min(grad.stops.length, 8) };
    const stops = buildStopsArray(grad.stops);
    u[`gradStopsLayer${idx}`] = { value: stops };
    // Slope-gradient uniforms — same shape as height gradient.
    const sgrad = l.slopeGradient || { enabled: 0, strength: 1, stops: [] };
    u[`slopeGradEnabledLayer${idx}`]  = { value: sgrad.enabled ? 1.0 : 0.0 };
    u[`slopeGradStrengthLayer${idx}`] = { value: sgrad.strength ?? 1.0 };
    u[`slopeGradStopCountLayer${idx}`] = { value: Math.min(sgrad.stops.length, 8) };
    u[`slopeGradStopsLayer${idx}`] = { value: buildStopsArray(sgrad.stops) };
  });

  // Base layer brightness is a single global uniform
  u.uBaseBrightness = { value: STATE.baseLayer.brightness };

  return u;
}

// Cached static shader metrics, refreshed on every rebuildMaterial().
// tapsPerPixel = texture2D samples the fragment shader performs per pixel
// for a fully-opaque terrain sample (base + every active auto-layer, plus
// PCF shadow taps). aluOps is a rough operator count — useful as a relative
// indicator, not an absolute cycle count.
let shaderStats = {
  tapsPerPixel: 0,
  tapsMat: 0,
  tapsShadow: 0,
  tapsPerMaterial: 0,
  materialCount: 0,
  projection: 'triplanar',
  aluOps: 0,
  varyings: 0,
  uniforms: 0,
  fragLines: 0,
  vertLines: 0
};

function countOccurrences(str, pattern) {
  const m = str.match(pattern);
  return m ? m.length : 0;
}

function computeShaderStats(fragSrc, vertSrc, state) {
  // --- Texture taps ---
  // Each material needs color + normal; triplanar samples each on 3 axes
  // (2 samplers × 3 axes = 6 taps), biplanar on only the 2 dominant axes
  // (2 samplers × 2 axes = 4 taps). Hex-tile materials triple that on the
  // axes they use (3 stochastic samples per axis-tap to hide repetition).
  const usedMats = new Set([state.baseLayer.material, ...state.layers.map(l => l.material)]);
  const materialCount = usedMats.size;
  const tapsPerMaterial = state.biplanar ? 4 : 6;
  // Each auto-layer + the base calls sample_XX() once. Tap count for each
  // call depends on whether THAT material has hexTile enabled.
  const tapsForMat = (matId) => {
    const def = MATERIAL_LIBRARY[matId];
    const hex = def && def.hexTile === true;
    return tapsPerMaterial * (hex ? 3 : 1);
  };
  const sampleCallsPerPixel = 1 + state.layers.length;
  let materialTaps = tapsForMat(state.baseLayer.material);
  for (const l of state.layers) materialTaps += tapsForMat(l.material);
  // PCF shadow sampling: 16-tap Poisson disk when shadows are enabled.
  const shadowTaps = sharedUniforms.uShadowEnabled.value > 0.5 ? 16 : 0;
  const tapsPerPixel = materialTaps + shadowTaps;

  // --- ALU op count (rough) ---
  // Strip comments + string literals so we don't count them.
  const stripped = fragSrc
    .replace(/\/\/.*$/gm, '')
    .replace(/\/\*[\s\S]*?\*\//g, '');
  // Count arithmetic operators that aren't part of ++, --, ==, <=, >=, !=
  // Also count common built-in math calls.
  const arith = countOccurrences(stripped, /[^+\-*/=<>!]([+\-*/])[^+\-*/=]/g);
  const builtins = countOccurrences(stripped,
    /\b(dot|cross|normalize|length|mix|smoothstep|clamp|pow|exp|sqrt|min|max|abs|sin|cos|reflect|texture2D|dFdx|dFdy)\s*\(/g);
  const aluOps = arith + builtins * 3;  // builtins roughly cost 3 ops each

  // --- Varyings / uniforms (from the actual declared ones) ---
  const varyings = countOccurrences(fragSrc + vertSrc, /\bvarying\s+\w+\s+\w+/g);
  const uniforms = countOccurrences(fragSrc + vertSrc, /\buniform\s+\w+\s+\w+/g);

  shaderStats = {
    tapsPerPixel,
    tapsMat: materialTaps,
    tapsShadow: shadowTaps,
    tapsPerMaterial,
    materialCount,
    projection: state.biplanar ? 'biplanar' : 'triplanar',
    aluOps,
    varyings,
    uniforms,
    fragLines: fragSrc.split('\n').length,
    vertLines: vertSrc.split('\n').length
  };
  updateStaticStatsUI();
}

function formatNum(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'G';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function updateStaticStatsUI() {
  const el = id => document.getElementById(id);
  const s = shaderStats;
  el('stat-taps').textContent =
    `TAPS/PX: ${s.tapsPerPixel} (${s.tapsMat} mat + ${s.tapsShadow} shadow)`;
  el('stat-proj').textContent =
    `PROJ: ${s.projection} (${s.tapsPerMaterial}/mat × ${1 + STATE.layers.length} calls)`;
  el('stat-alu').textContent  = `ALU OPS: ~${s.aluOps}`;
  el('stat-varyings').textContent =
    `VARY/UNI: ${s.varyings}/${s.uniforms}`;
}

function rebuildMaterial() {
  const fragmentShader = buildFragmentShader(STATE);
  const uniforms = buildUniformsForState();
  const mat = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms,
    side: THREE.DoubleSide,
    extensions: { derivatives: true }
  });
  if (currentMat) currentMat.dispose();
  currentMat = mat;
  if (terrain) terrain.material = mat;
  computeShaderStats(fragmentShader, vertexShader, STATE);
}

// Initial build
rebuildGeometry();
rebuildMaterial();
terrain = new THREE.Mesh(currentGeo, currentMat);
terrain.castShadow = true;
terrain.receiveShadow = true;
scene.add(terrain);

// Seed a reasonable procedural height range so layer thresholds work
// before any heightmap is loaded.
{
  const d = sharedUniforms.uDisplacement.value;
  sharedUniforms.uHeightMinWorld.value = -d;
  sharedUniforms.uHeightMaxWorld.value =  d;
}

// ═══════════════════════════════════════════════════════════════════════
//  WATER PLANE (THREE.Water from r128 examples)
// ═══════════════════════════════════════════════════════════════════════
// THREE.Water is a screen-space-normal water shader: it grabs the scene as a
// reflection RT, distorts the UVs with a tiling normal map, and blends with
// a sun specular highlight. Cheap enough to run alongside the terrain at
// 60 fps. We size the plane generously beyond the terrain so the water
// extends to the horizon, and reuse the world Y from the slider for height.
let water = null;

// Water normals — we use the same 4-tile bump map the BAR map viewer ships
// with, fetched from their map_blueprint repo. It's a tileable normal
// designed for big oceans (4 packed scales) and looks dramatically better
// than three.js's stock waternormals.jpg at large plane sizes.
let waterNormalsTex = null;
function getWaterNormals() {
  if (waterNormalsTex) return waterNormalsTex;
  waterNormalsTex = new THREE.TextureLoader().load(
    'https://raw.githubusercontent.com/beyond-all-reason/map_blueprint/a7db394716730e102f84442ed35fe3f7644a01fc/maps/waterbump_4tiles.png',
    t => {
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.needsUpdate = true;
    },
    undefined,
    err => console.warn('water normals failed to load:', err)
  );
  waterNormalsTex.wrapS = waterNormalsTex.wrapT = THREE.RepeatWrapping;
  return waterNormalsTex;
}

function buildWater() {
  if (typeof THREE.Water !== 'function') {
    console.warn('THREE.Water failed to load — check the examples script.');
    return;
  }
  if (water) {
    scene.remove(water);
    water.geometry.dispose();
    water.material.dispose();
    water = null;
  }
  // Skip construction entirely when water is disabled. THREE.Water allocates
  // a 512² WebGLRenderTarget and renders the full scene into it every frame
  // for its reflection pass — building it up-front costs VRAM even while
  // hidden. Deferring the build until the slider actually turns on means
  // the default (water off) session pays zero water cost.
  if (!STATE.water.enabled) return;
  // Clip water to the terrain footprint so it doesn't extend past the map
  // edges. The skybox handles "ocean to the horizon".
  const width = STATE.worldSize;
  const depth = STATE.worldSize / STATE.heightmapAspect;
  const geo = new THREE.PlaneGeometry(width, depth);
  water = new THREE.Water(geo, {
    textureWidth: 512,
    textureHeight: 512,
    waterNormals: getWaterNormals(),
    sunDirection: new THREE.Vector3().copy(sharedUniforms.uSunDir.value).normalize(),
    sunColor: new THREE.Color(STATE.water.sunColor),
    waterColor: new THREE.Color(STATE.water.color),
    distortionScale: STATE.water.distortionScale,
    fog: scene.fog !== undefined,
    alpha: STATE.water.alpha
  });
  water.rotation.x = -Math.PI / 2;
  water.position.y = STATE.water.height;
  water.visible = STATE.water.enabled;
  water.castShadow = false;
  water.receiveShadow = false;
  // Match the BAR map viewer exactly: transparent + no depth write so the
  // water doesn't punch a hole in the depth buffer, and a small polygon
  // offset to push it behind the terrain plane and avoid z-fighting at
  // shorelines.
  water.material.transparent = true;
  water.material.depthWrite = false;
  water.material.polygonOffset = true;
  water.material.polygonOffsetFactor = -1.0;
  water.material.polygonOffsetUnits = -1.0;
  if (water.material.uniforms.size) {
    water.material.uniforms.size.value = STATE.water.sizeMultiplier;
  }
  if (water.material.uniforms.alpha) {
    water.material.uniforms.alpha.value = STATE.water.alpha;
  }
  // The Water shader's reflection RT renders the entire scene a second
  // time. If scene.background is null (no skybox loaded) the RT comes
  // back transparent and the water surface looks like flat painted glass.
  // Wrap onBeforeRender to substitute a fallback background during the
  // mirror pass and restore it immediately after.
  const originalOnBeforeRender = water.onBeforeRender;
  water.onBeforeRender = function (rndr, scn, cam, ...rest) {
    const savedBackground = scn.background;
    if (!savedBackground) scn.background = new THREE.Color(0x9bc3e0);
    if (originalOnBeforeRender) originalOnBeforeRender.call(this, rndr, scn, cam, ...rest);
    scn.background = savedBackground;
  };
  scene.add(water);
}
buildWater();

// ═══════════════════════════════════════════════════════════════════════
//  DIRECTIONAL SUN LIGHT + SHADOW MAP
// ═══════════════════════════════════════════════════════════════════════
// three.js renders the shadow depth pass automatically once the light and
// renderer are configured. Our custom ShaderMaterial doesn't integrate with
// the built-in shadow system, so we:
//   1. Give the terrain a customDepthMaterial that replicates our vertex
//      displacement (otherwise the depth pass uses a flat plane).
//   2. Bind light.shadow.map.texture + light.shadow.matrix into our fragment
//      shader uniforms each frame and PCF-sample them manually.
const sunLight = new THREE.DirectionalLight(0xfff1d6, 1.0);
sunLight.position.set(18, 28, 10);
sunLight.target.position.set(0, 0, 0);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(4096, 4096);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 200;
{
  const s = 45;
  sunLight.shadow.camera.left   = -s;
  sunLight.shadow.camera.right  =  s;
  sunLight.shadow.camera.top    =  s;
  sunLight.shadow.camera.bottom = -s;
}
// We do our own bias in the fragment shader via normal-offset, so leave
// three.js's built-in bias neutral.
sunLight.shadow.bias = 0.0;
scene.add(sunLight);
scene.add(sunLight.target);

// Custom depth material — mirrors the displacement in our vertex shader so the
// shadow map represents the actual terrain surface, not the flat plane.
const depthVertexShader = `
  uniform float uDisplacement;
  uniform sampler2D uHeightmap;
  uniform float uUseHeightmap;
  uniform float uHeightScale;
  uniform float uTime;
  uniform sampler2D uDamageMask;
  uniform float     uDamageEnabled;
  uniform float     uDamageMaxDepth;

  vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
  float snoise(vec3 v) {
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
        i.z + vec4(0.0, i1.z, i2.z, 1.0))
      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }
  float fbm(vec3 p) {
    float v = 0.0; float a = 0.5; vec3 shift = vec3(100.0);
    for (int i = 0; i < 6; i++) { v += a * snoise(p); p = p * 2.0 + shift; a *= 0.5; }
    return v;
  }
  void main() {
    vec3 pos = position;
    float height;
    if (uUseHeightmap > 0.5) {
      height = texture2D(uHeightmap, uv).r * uHeightScale;
    } else {
      float n  = fbm(pos.xzy * 0.3 + uTime * 0.02);
      float n2 = fbm(pos.xzy * 0.8 + 50.0);
      height = (n * 0.7 + n2 * 0.3) * uDisplacement;
    }
    if (uDamageEnabled > 0.5) {
      height -= texture2D(uDamageMask, uv).g * uDamageMaxDepth;
    }
    pos += normal * height;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  }
`;
// Three.js packs depth into RGBA by default; mirror that so our shader can
// unpack with the standard constants. (UnpackDepth helper in main shader below.)
const depthFragmentShader = `
  vec4 packDepthToRGBA(float v) {
    vec4 r = vec4(1.0, 255.0, 65025.0, 16581375.0) * v;
    r = fract(r);
    r -= r.yzww * vec4(1.0/255.0, 1.0/255.0, 1.0/255.0, 0.0);
    return r;
  }
  void main() {
    gl_FragColor = packDepthToRGBA(gl_FragCoord.z);
  }
`;
const depthMaterial = new THREE.ShaderMaterial({
  vertexShader: depthVertexShader,
  fragmentShader: depthFragmentShader,
  uniforms: {
    uDisplacement:    sharedUniforms.uDisplacement,
    uHeightmap:       sharedUniforms.uHeightmap,
    uUseHeightmap:    sharedUniforms.uUseHeightmap,
    uHeightScale:     sharedUniforms.uHeightScale,
    uTime:            sharedUniforms.uTime,
    uDamageMask:      sharedUniforms.uDamageMask,
    uDamageEnabled:   sharedUniforms.uDamageEnabled,
    uDamageMaxDepth:  sharedUniforms.uDamageMaxDepth
  },
  side: THREE.DoubleSide
});
terrain.customDepthMaterial = depthMaterial;

sharedUniforms.uShadowEnabled.value = 1.0;
sharedUniforms.uShadowMapSize.value = sunLight.shadow.mapSize.x;

// ═══════════════════════════════════════════════════════════════════════
//  HEIGHTMAP LOADING — 16-bit PNG via UPNG.js → Float32 DataTexture
// ═══════════════════════════════════════════════════════════════════════
// The browser's default <img>/canvas path decodes every PNG to 8-bit RGBA,
// which quantizes heightmaps to 256 levels and shows up as terracing. To
// keep real 16-bit precision (65536 levels) we parse PNG bytes ourselves
// via UPNG.js and build a DataTexture with FloatType.

// (lastHeightmapInfo is hoisted above near rebuildGeometry)
// Raw PNG bytes of the currently loaded heightmap so it can be embedded
// as base64 in saved config files (null when running procedural).
let currentHeightmapBytes = null;
let currentHeightmapDataURL = null;  // base64 of PNG, format: data:image/png;base64,...
let currentSkyboxDataURL = null;

// Convert an ArrayBuffer of PNG bytes to a data URL. Used to embed a
// previously-fetched heightmap in the saved config.
// Skybox loader still uses the <img>/canvas path, so keep this helper for
// re-encoding loaded HTMLImageElements to an embeddable data URL.
function imageToDataURL(image, mime = 'image/png') {
  const w = image.naturalWidth || image.width;
  const h = image.naturalHeight || image.height;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(image, 0, 0);
  return c.toDataURL(mime);
}

function arrayBufferToDataURL(buf, mime = 'image/png') {
  const bytes = new Uint8Array(buf);
  let binary = '';
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return `data:${mime};base64,` + btoa(binary);
}

function dataURLToArrayBuffer(dataURL) {
  const base64 = dataURL.split(',', 2)[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

// Decode PNG bytes (8- or 16-bit, gray or RGBA) to a normalized Float32
// array of height values in [0,1]. Uses UPNG.js' internal decode path so
// we bypass the canvas 8-bit bottleneck.
//
// UPNG.decode() returns { width, height, depth, ctype, frames, data, ... }.
// `png.data` is the decoded first-frame pixel bytes for non-APNG images,
// but its exact concrete type varies between versions — sometimes a
// Uint8Array, sometimes a raw ArrayBuffer. Wrap defensively.
function decodePNGToHeightFloat32(arrayBuffer) {
  if (typeof UPNG === 'undefined') {
    throw new Error('UPNG.js not loaded — check the <script> tag.');
  }
  const png = UPNG.decode(arrayBuffer);
  const w = png.width;
  const h = png.height;
  const depth = png.depth;   // bits per sample: 8 or 16
  const ctype = png.ctype;   // 0 gray, 2 RGB, 3 palette, 4 gray+A, 6 RGBA

  // Prefer UPNG's own frame unpacker when available — it handles interlace,
  // filtering, and 16-bit unpacking consistently.
  let raw;
  if (png.frames && png.frames.length && UPNG.toRGBA8) {
    // toRGBA8 always returns 8-bit per channel; only use it as a fallback
    // for weird PNG layouts. We'll detect this below.
    raw = null;
  }
  if (!raw) {
    raw = png.data instanceof Uint8Array
      ? png.data
      : new Uint8Array(png.data);
  }

  const samplesPerPixel =
    ctype === 0 ? 1 :
    ctype === 2 ? 3 :
    ctype === 4 ? 2 :
    ctype === 6 ? 4 : 1;
  const bytesPerSample = depth === 16 ? 2 : 1;
  const stride = samplesPerPixel * bytesPerSample;
  const expectedBytes = w * h * stride;

  const out = new Float32Array(w * h);

  // If the raw buffer doesn't match what we expect (e.g. interlaced PNG
  // that UPNG didn't unpack into a flat array), fall back to toRGBA8 and
  // accept the 8-bit truncation rather than crashing.
  if (raw.length < expectedBytes) {
    console.warn(
      `PNG raw buffer (${raw.length}) < expected (${expectedBytes}) for ` +
      `${w}x${h} depth=${depth} ctype=${ctype}. Falling back to toRGBA8.`
    );
    const rgba = new Uint8Array(UPNG.toRGBA8(png)[0]);
    const norm = 1.0 / 255.0;
    for (let p = 0; p < w * h; p++) out[p] = rgba[p * 4] * norm;
    return { width: w, height: h, depth: 8, data: out };
  }

  if (depth === 16) {
    const norm = 1.0 / 65535.0;
    for (let p = 0; p < w * h; p++) {
      const i = p * stride;
      // First sample is gray/red. PNG stores 16-bit samples big-endian.
      out[p] = ((raw[i] << 8) | raw[i + 1]) * norm;
    }
  } else {
    const norm = 1.0 / 255.0;
    for (let p = 0; p < w * h; p++) {
      out[p] = raw[p * stride] * norm;
    }
  }
  return { width: w, height: h, depth, data: out };
}

function analyzeHeightFloat32(heightInfo) {
  const { width: w, height: h, data } = heightInfo;
  let min = Infinity, max = -Infinity;
  // Sample every 4th pixel in each direction to keep it cheap.
  for (let y = 0; y < h; y += 4) {
    for (let x = 0; x < w; x += 4) {
      const v = data[y * w + x];
      if (v < min) min = v;
      if (v > max) max = v;
    }
  }
  if (!isFinite(min)) { min = 0; max = 1; }
  return { width: w, height: h, min, max };
}

// ── Sediment / talus mask (CPU bake from heightmap) ──────────────────────
// For each heightmap pixel, sample 8 neighbours in a ring at the configured
// radius. Sum the height excess of any neighbour that sits more than the
// threshold above me — that's the "talus from above" signal. Multiply by
// (1 - slope) to fade off cliffs themselves. Result is a [0,1] R8 texture
// the fragment shader can sample with a single tap.
//
// Cost: O(W*H * 8 samples). For 512² that's ~2M ops, runs in well under
// 5ms even in JS. Re-baked when heightmap loads OR when Radius / Threshold
// / Slope Fade slider changes (the cheap-to-bake branch). Strength + Debug
// Tint flow through pure uniforms with no rebake.
let lastBakedHeightInfo = null;     // remembers the source so slider tweaks can rebake
function bakeSedimentMask(heightInfo) {
  const { width: w, height: h, data } = heightInfo;
  const cfg = STATE.sediment;
  const radius = Math.max(1, Math.round(cfg.radius));
  const thr = Math.max(0, cfg.threshold);
  const slopeFadeAmt = Math.max(0, Math.min(1, cfg.slopeFade));

  // Pre-compute the 8 ring directions × radius once. (cos/sin per angle.)
  const NUM_DIRS = 8;
  const dx = new Int32Array(NUM_DIRS);
  const dy = new Int32Array(NUM_DIRS);
  for (let i = 0; i < NUM_DIRS; i++) {
    const a = (i / NUM_DIRS) * Math.PI * 2.0;
    dx[i] = Math.round(Math.cos(a) * radius);
    dy[i] = Math.round(Math.sin(a) * radius);
  }

  const out = new Uint8Array(w * h);
  let maxAccum = 0;
  // Pass 1: accumulate raw talus signal.
  const raw = new Float32Array(w * h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const me = data[y * w + x];
      let accum = 0;
      for (let i = 0; i < NUM_DIRS; i++) {
        let nx = x + dx[i];
        let ny = y + dy[i];
        if (nx < 0) nx = 0; else if (nx >= w) nx = w - 1;
        if (ny < 0) ny = 0; else if (ny >= h) ny = h - 1;
        const nh = data[ny * w + nx];
        const delta = nh - me - thr;
        if (delta > 0) accum += delta;
      }
      // Slope of THIS pixel (central difference). Used to fade sediment off
      // steep cliff faces — talus naturally slides off near-vertical rocks.
      let slope = 0;
      if (slopeFadeAmt > 0) {
        const xL = Math.max(0, x - 1), xR = Math.min(w - 1, x + 1);
        const yU = Math.max(0, y - 1), yD = Math.min(h - 1, y + 1);
        const gx = data[y * w + xR] - data[y * w + xL];
        const gy = data[yD * w + x] - data[yU * w + x];
        slope = Math.sqrt(gx * gx + gy * gy);
      }
      const slopeMask = 1.0 - Math.min(1.0, slope * 30.0) * slopeFadeAmt;
      const v = accum * slopeMask;
      raw[y * w + x] = v;
      if (v > maxAccum) maxAccum = v;
    }
  }
  // Pass 2: normalize to [0..255] and write the R8 texture.
  const norm = maxAccum > 1e-6 ? (255.0 / maxAccum) : 0.0;
  for (let p = 0; p < w * h; p++) {
    const v = raw[p] * norm;
    out[p] = v > 255 ? 255 : (v < 0 ? 0 : v);
  }
  const tex = new THREE.DataTexture(out, w, h, THREE.LuminanceFormat, THREE.UnsignedByteType);
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = true;
  tex.needsUpdate = true;
  return tex;
}

function refreshSedimentMask() {
  if (!lastBakedHeightInfo) return;
  const prev = sharedUniforms.uSedimentTex.value;
  const tex = bakeSedimentMask(lastBakedHeightInfo);
  sharedUniforms.uSedimentTex.value = tex;
  if (prev && prev.dispose) prev.dispose();
}

// Build a float DataTexture from a Float32Array of heights in [0,1].
// WebGL1 + ANGLE refuses LuminanceFormat+FloatType on many GPUs ("Invalid
// internal format 0x1909"), so we expand to RGBA and replicate the height
// into all four channels. The shader samples .r.
function makeHeightDataTexture(heightInfo) {
  const { width: w, height: h, data } = heightInfo;
  const rgba = new Float32Array(w * h * 4);
  for (let p = 0, o = 0; p < w * h; p++, o += 4) {
    const v = data[p];
    rgba[o    ] = v;
    rgba[o + 1] = v;
    rgba[o + 2] = v;
    rgba[o + 3] = 1.0;
  }
  const tex = new THREE.DataTexture(
    rgba, w, h,
    THREE.RGBAFormat,
    THREE.FloatType
  );
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = false;
  // UPNG delivers rows top-to-bottom (row 0 = top of the PNG). WebGL uv.y=0
  // samples the BOTTOM row of a texture, so we need flipY=true to push row 0
  // of our array to uv.y=1 (top). Without this the whole heightmap renders
  // mirrored across the X axis — the top of the PNG ends up in the south.
  tex.flipY = true;
  tex.needsUpdate = true;
  return tex;
}

// ═══════════════════════════════════════════════════════════════════════
//  EXPLOSION DAMAGE MASK
// ═══════════════════════════════════════════════════════════════════════
// CPU-side RGBA8 texture sized to match the heightmap (or 1024² in
// procedural mode). R = scorched amount, G = crater depth. The vertex
// shader subtracts G * uDamageMaxDepth from the terrain height; the
// fragment shader uses R to erase organic layers and paint the damage
// material on top of rock/cliff.
let damageMaskTex = null;
let damageMaskData = null;
let damageMaskW = 0;
let damageMaskH = 0;
// Accumulated "dirty rectangle" for the current frame's mask writes. If any
// pixels were touched we upload only that sub-rect to the GPU via
// gl.texSubImage2D, instead of re-uploading the entire 16 MB float texture.
// Values are inclusive pixel bounds; -1 means "empty".
const damageDirty = { minX: -1, minY: -1, maxX: -1, maxY: -1 };
function damageDirtyReset() {
  damageDirty.minX = damageDirty.minY = damageDirty.maxX = damageDirty.maxY = -1;
}
function damageDirtyExpand(x0, y0, x1, y1) {
  if (damageDirty.minX === -1) {
    damageDirty.minX = x0; damageDirty.minY = y0;
    damageDirty.maxX = x1; damageDirty.maxY = y1;
  } else {
    if (x0 < damageDirty.minX) damageDirty.minX = x0;
    if (y0 < damageDirty.minY) damageDirty.minY = y0;
    if (x1 > damageDirty.maxX) damageDirty.maxX = x1;
    if (y1 > damageDirty.maxY) damageDirty.maxY = y1;
  }
}
// Scratch buffer reused frame-to-frame for the partial-upload rect. Grows
// on demand; never shrinks, so a big blast sets the ceiling once.
let damagePatchBuf = null;
let damagePatchBufCapacity = 0;

function makeDamageMask(w, h) {
  damageMaskW = w;
  damageMaskH = h;
  // Float32 RGBA so accumulated crater depth has effectively unlimited
  // precision. With 8-bit storage each additive delta was quantized to
  // 1/255 of the pinned max depth (~0.02 world units) and small repeated
  // blasts would round away to zero. Floats keep every contribution.
  damageMaskData = new Float32Array(w * h * 4);  // all zeros = pristine terrain
  const tex = new THREE.DataTexture(
    damageMaskData, w, h,
    THREE.RGBAFormat,
    THREE.FloatType
  );
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = false;
  // Match the heightmap orientation so worldXZ → UV lines up with both.
  tex.flipY = true;
  tex.needsUpdate = true;
  return tex;
}

function ensureDamageMask() {
  // Sync the mask to either the current heightmap resolution or 1024² for
  // procedural terrain. Called on init and whenever the heightmap changes.
  let w = 1024, h = 1024;
  if (lastHeightmapInfo) {
    w = lastHeightmapInfo.width;
    h = lastHeightmapInfo.height;
  }
  if (damageMaskTex && damageMaskW === w && damageMaskH === h) {
    // Already correct size — just clear it.
    damageMaskData.fill(0);
    damageMaskTex.needsUpdate = true;
    return;
  }
  if (damageMaskTex) damageMaskTex.dispose();
  damageMaskTex = makeDamageMask(w, h);
  sharedUniforms.uDamageMask.value = damageMaskTex;
  sharedUniforms.uDamageTexel.value.set(1.0 / w, 1.0 / h);
  sharedUniforms.uDamageEnabled.value = 1.0;
}

function resetDamageMask() {
  if (!damageMaskData) return;
  damageMaskData.fill(0);
  damageMaskTex.needsUpdate = true;
  // Kill any in-flight animated blasts so they don't immediately repaint
  // their progress into the freshly-cleared mask.
  if (typeof activeBlasts !== 'undefined') activeBlasts.length = 0;
}

// Sample the displaced terrain height at a world-XZ point. Mirrors exactly
// what the vertex shader does: bilinear heightmap sample minus crater depth.
// Returns the world-Y of the actual visible surface, or 0 if we're off the map.
function sampleTerrainY(wx, wz) {
  const worldW = STATE.worldSize;
  const worldD = STATE.worldSize / STATE.heightmapAspect;
  // world → uv (same convention as the shaders). uv.x → +X, uv.y → -Z.
  const u = wx / worldW + 0.5;
  const v = -wz / worldD + 0.5;
  if (u < 0 || u > 1 || v < 0 || v > 1) return 0;

  // ── Base height (bilinear on the heightmap, or procedural fbm fallback) ──
  let h = 0;
  if (lastHeightmapInfo && lastHeightmapInfo.data) {
    const { width: W, height: H, data } = lastHeightmapInfo;
    // PNG rows are stored top-to-bottom in `data` (row 0 = top of image).
    // The texture is uploaded with flipY=true, so in shader UV space v=1 maps
    // to row 0. When we sample the CPU array directly we must apply the same
    // flip by using (1 - v).
    const fx = u * (W - 1);
    const fy = (1 - v) * (H - 1);
    const x0 = Math.floor(fx), x1 = Math.min(W - 1, x0 + 1);
    const y0 = Math.floor(fy), y1 = Math.min(H - 1, y0 + 1);
    const tx = fx - x0;
    const ty = fy - y0;
    const h00 = data[y0 * W + x0];
    const h10 = data[y0 * W + x1];
    const h01 = data[y1 * W + x0];
    const h11 = data[y1 * W + x1];
    const hx0 = h00 * (1 - tx) + h10 * tx;
    const hx1 = h01 * (1 - tx) + h11 * tx;
    h = (hx0 * (1 - ty) + hx1 * ty) * sharedUniforms.uHeightScale.value;
  }
  // (No procedural fbm fallback on the CPU — we'd have to reimplement
  // snoise/fbm in JS. For procedural mode the raycaster falls back to a
  // plane intersection at Y=0, which is close enough for click targeting.)

  // ── Subtract crater depth ──
  if (damageMaskData && sharedUniforms.uDamageEnabled.value > 0.5) {
    const W = damageMaskW, H = damageMaskH;
    const fx = u * (W - 1);
    const fy = v * (H - 1);
    const x0 = Math.floor(fx), x1 = Math.min(W - 1, x0 + 1);
    const y0 = Math.floor(fy), y1 = Math.min(H - 1, y0 + 1);
    const tx = fx - x0;
    const ty = fy - y0;
    const g00 = damageMaskData[(y0 * W + x0) * 4 + 1];
    const g10 = damageMaskData[(y0 * W + x1) * 4 + 1];
    const g01 = damageMaskData[(y1 * W + x0) * 4 + 1];
    const g11 = damageMaskData[(y1 * W + x1) * 4 + 1];
    const gx0 = g00 * (1 - tx) + g10 * tx;
    const gx1 = g01 * (1 - tx) + g11 * tx;
    const crater = gx0 * (1 - ty) + gx1 * ty;
    h -= crater * sharedUniforms.uDamageMaxDepth.value;
  }
  return h;
}

// Surface normal at a world-XZ point via central differences against the
// displaced terrain. Used by decal spawning so each crater gets oriented
// to the slope it landed on. Step size scales with one heightmap texel
// world-distance so the normal matches what the shader's finite-diff
// produces (without going so small that bilinear noise dominates).
function computeTerrainNormal(wx, wz) {
  let step = 0.05;
  if (lastHeightmapInfo) {
    const wpt = STATE.worldSize / Math.max(lastHeightmapInfo.width, lastHeightmapInfo.height);
    step = Math.max(wpt * 1.0, 0.04);
  }
  const hL = sampleTerrainY(wx - step, wz);
  const hR = sampleTerrainY(wx + step, wz);
  const hD = sampleTerrainY(wx, wz - step);
  const hU = sampleTerrainY(wx, wz + step);
  // Match the shader's tangent convention: +X tangent runs +X, +Z direction
  // tangent runs -Z (because UV y → -world Z). cross gives +Y up on flat.
  const tX = new THREE.Vector3(2 * step, hR - hL, 0);
  const tZ = new THREE.Vector3(0, hU - hD, -2 * step);
  const n = new THREE.Vector3().crossVectors(tX, tZ).normalize();
  if (n.y < 0) n.multiplyScalar(-1);
  return n;
}

// Raymarch from the camera through the click direction, stepping along the
// ray until we cross below the displaced surface. Returns a THREE.Vector3
// world-space hit point, or null if nothing was hit.
function raycastDisplacedTerrain(origin, dir) {
  // Expected height range so we can intersect an enclosing AABB to skip the
  // empty air above the terrain and save samples.
  const yMin = sharedUniforms.uHeightMinWorld.value - 0.5;
  const yMax = sharedUniforms.uHeightMaxWorld.value + 0.5;
  const halfW = STATE.worldSize * 0.5;
  const halfD = (STATE.worldSize / STATE.heightmapAspect) * 0.5;

  // Ray vs AABB slab test — only accept hits in front of the camera.
  let tMin = -Infinity, tMax = Infinity;
  const bounds = [
    [-halfW, halfW, origin.x, dir.x],
    [yMin,   yMax,  origin.y, dir.y],
    [-halfD, halfD, origin.z, dir.z]
  ];
  for (const [lo, hi, o, d] of bounds) {
    if (Math.abs(d) < 1e-8) {
      if (o < lo || o > hi) return null;
      continue;
    }
    const t1 = (lo - o) / d;
    const t2 = (hi - o) / d;
    const tLo = Math.min(t1, t2);
    const tHi = Math.max(t1, t2);
    if (tLo > tMin) tMin = tLo;
    if (tHi < tMax) tMax = tHi;
    if (tMin > tMax) return null;
  }
  if (tMax < 0) return null;
  let t = Math.max(tMin, 0);

  // Step size: roughly one heightmap texel worth of world distance. Smaller
  // steps = more accurate hits but more samples. ~1000 steps upper bound.
  let texelWorld = 0.05;
  if (lastHeightmapInfo) {
    const wpt = STATE.worldSize / Math.max(lastHeightmapInfo.width, lastHeightmapInfo.height);
    texelWorld = Math.max(wpt * 0.75, 0.02);
  }
  const dirLen = Math.hypot(dir.x, dir.y, dir.z);
  const stepT = texelWorld / Math.max(dirLen, 1e-6);

  let prevT = t;
  let prevY = origin.y + dir.y * prevT;
  let prevSurf = sampleTerrainY(origin.x + dir.x * prevT, origin.z + dir.z * prevT);
  let prevAbove = prevY > prevSurf;

  const maxSteps = 1500;
  for (let i = 0; i < maxSteps; i++) {
    t += stepT;
    if (t > tMax) break;
    const x = origin.x + dir.x * t;
    const y = origin.y + dir.y * t;
    const z = origin.z + dir.z * t;
    const surf = sampleTerrainY(x, z);
    const above = y > surf;
    if (prevAbove && !above) {
      // Crossed below the surface between prevT and t. Bisect for precision.
      let lo = prevT, hi = t;
      for (let b = 0; b < 8; b++) {
        const mid = (lo + hi) * 0.5;
        const mx = origin.x + dir.x * mid;
        const my = origin.y + dir.y * mid;
        const mz = origin.z + dir.z * mid;
        const ms = sampleTerrainY(mx, mz);
        if (my > ms) lo = mid; else hi = mid;
      }
      const hitT = (lo + hi) * 0.5;
      return new THREE.Vector3(
        origin.x + dir.x * hitT,
        origin.y + dir.y * hitT,
        origin.z + dir.z * hitT
      );
    }
    prevT = t; prevY = y; prevSurf = surf; prevAbove = above;
  }
  return null;
}

// Active blasts currently animating their deformation/scorch paint. Each
// stores the snapshot of params captured at click time plus how much of
// its depth/scorch contribution has already been written to the mask.
const activeBlasts = [];

// Queue a new crater at world-XZ (wx, wz) with the given radius. The mask
// writes are spread over ~0.45s so the ground punches in instead of popping.
// Crater profile is a real crater: raised rim, depressed bowl, scorch
// extends a little beyond the rim.
function paintExplosion(wx, wz, radius) {
  if (!damageMaskData) return;
  const worldW = STATE.worldSize;
  const worldD = STATE.worldSize / STATE.heightmapAspect;
  const uCenter = (wx / worldW + 0.5);
  const vCenter = (-wz / worldD + 0.5);
  if (uCenter < -0.1 || uCenter > 1.1 || vCenter < -0.1 || vCenter > 1.1) return;

  // Snapshot every parameter at fire time so later slider moves don't
  // retroactively deform in-flight blasts. Animation uses paintExplosionDelta
  // each frame to walk the mask from its current state toward the target.
  activeBlasts.push({
    wx, wz, radius,
    depthMul:     Math.max(0, STATE.explosions.depth || 0),
    depthFalloff: Math.max(0.05, STATE.explosions.depthFalloff || 1.0),
    rimHeight:    Math.max(0, STATE.explosions.rimHeight ?? 0.35),
    scorchExt:    Math.max(0.01, STATE.explosions.scorchBoost || 0.66),
    scorchPow:    Math.max(0.05, STATE.explosions.scorchFalloff || 1.0),
    scorchSpikes: Math.min(1.5, Math.max(0, STATE.explosions.scorchSpikes ?? 0.65)),
    // Per-blast angular seed so two blasts at the same spot don't produce
    // identical spike patterns. Two independent seeds keep the low-frequency
    // "envelope" noise and the high-frequency "ray" noise decorrelated.
    seedEnv:      Math.random() * 100.0,
    seedRay:      Math.random() * 100.0,
    depthDur:     0.35,   // seconds to fully punch in the crater
    scorchDur:    0.55,   // seconds to fully bloom the scorch (a touch slower)
    age:          0.0,
    depthProg:    0.0,    // fraction of target depth already written
    scorchProg:   0.0,    // fraction of target scorch already written
  });
}

// Write (targetDepth * depthProg - lastDepthProg) and (targetScorch * scorchProg)
// into the damage mask for a single active blast. Called each frame with the
// updated progress values, then the blast remembers the new progress so the
// next frame writes only the incremental delta.
function paintExplosionContribution(blast, newDepthProg, newScorchProg) {
  if (!damageMaskData) return;
  const W = damageMaskW;
  const H = damageMaskH;
  const worldW = STATE.worldSize;
  const worldD = STATE.worldSize / STATE.heightmapAspect;
  const uCenter = (blast.wx / worldW + 0.5);
  const vCenter = (-blast.wz / worldD + 0.5);

  const rimRatio  = 0.85;
  const scorchExt = blast.scorchExt;
  const scorchPow = blast.scorchPow;
  const rxCrater  = (blast.radius / worldW) * W;
  const ryCrater  = (blast.radius / worldD) * H;
  const cx = uCenter * W;
  const cy = (1 - vCenter) * H;

  const depthDeltaFrac = newDepthProg - blast.depthProg;  // ≥ 0 by construction
  const scorchFrac     = newScorchProg;                    // absolute, since R is max-blend

  // Spike shaping. The angular envelope wobbles the outer scorch radius
  // by up to ±envAmp, and the ray term adds bright radial streaks in the
  // outer band. The crater depth loop below ignores all of this so the
  // hole stays round.
  const spikes     = blast.scorchSpikes;
  const envAmp     = spikes * 0.55;   // how far the outer envelope can bulge outward/inward
  const rayAmp     = spikes * 1.2;    // how much rays brighten the outer band
  const scorchMax  = scorchExt * (1 + envAmp);  // worst-case outer reach for dirty-rect
  // Hash-based 1D value noise, interpolated on the unit circle so it wraps
  // cleanly at ±π. Used for the envelope wobble.
  const hash1 = u => {
    const s = Math.sin(u * 12.9898) * 43758.5453;
    return s - Math.floor(s);
  };
  const angNoise = (ang, lobes, seed) => {
    const u = ang * lobes + seed;
    const i = Math.floor(u);
    const f = u - i;
    const a = hash1(i);
    const b = hash1(i + 1);
    const t = f * f * (3 - 2 * f);
    return a * (1 - t) + b * t;
  };
  // Thin radial rays. Precompute a fixed number of ray directions with
  // per-ray random strength and angular width — each ray is a narrow
  // spike around its own centre, most angles fall on zero. Much thinner
  // than bandlimited noise (which smears between grid cells).
  const NUM_RAYS = 64;
  const rayCenters = new Float32Array(NUM_RAYS);   // angle of each ray in [0..2π)
  const rayAmps    = new Float32Array(NUM_RAYS);   // per-ray strength 0..1
  const rayWidths  = new Float32Array(NUM_RAYS);   // per-ray angular half-width (radians)
  for (let i = 0; i < NUM_RAYS; i++) {
    // Even base spacing + jitter so they're not perfectly regular.
    const base = (i + hash1(i + blast.seedRay * 17.0)) * (Math.PI * 2.0 / NUM_RAYS);
    rayCenters[i] = base;
    // Random strength — some rays are bright, some barely visible.
    const s = hash1(i * 3.17 + blast.seedRay * 5.0);
    rayAmps[i] = s * s;  // skew toward dim so only a few rays really punch
    // Narrow angular half-width: ~0.6°..4° per ray at full width.
    // Needs to be a few texels wide at the rim so linear filtering on
    // the 1024² mask doesn't smear the ray into nothing.
    const w = hash1(i * 7.31 + blast.seedRay * 11.0);
    rayWidths[i] = 0.010 + w * 0.060;
  }

  // Outer reach is whichever of the scorch envelope or the crater footprint
  // extends further out from the centre. The Recoil crater shape is fully
  // contained in r ∈ [0..1], so its outer reach equals rimRatio.
  const outerReach   = Math.max(scorchMax, rimRatio);
  const rxOuter = rxCrater * outerReach;
  const ryOuter = ryCrater * outerReach;
  const x0 = Math.max(0, Math.floor(cx - rxOuter - 1));
  const x1 = Math.min(W - 1, Math.ceil(cx + rxOuter + 1));
  const y0 = Math.max(0, Math.floor(cy - ryOuter - 1));
  const y1 = Math.min(H - 1, Math.ceil(cy + ryOuter + 1));
  damageDirtyExpand(x0, y0, x1, y1);

  const maxDepth = sharedUniforms.uDamageMaxDepth.value;

  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      const nx = (x - cx) / rxCrater;
      const ny = (y - cy) / ryCrater;
      const d = Math.sqrt(nx * nx + ny * ny);

      // Scorch (R) — max-blend toward targetScorch * scorchFrac
      if (d < scorchMax && scorchFrac > 0) {
        // Angular envelope: a few broad lobes wobble the outer radius so
        // the scorch footprint is no longer a perfect circle.
        let outer = scorchExt;
        let rayBoost = 1.0;
        if (spikes > 0) {
          const ang = Math.atan2(ny, nx);
          const env = angNoise(ang, 1.5, blast.seedEnv) * 2 - 1;     // [-1..1], ~3 lobes over 2π
          outer = scorchExt * (1 + env * envAmp);
          // Thin radial rays: walk the precomputed ray table and sum
          // each ray's contribution. Each ray is a gaussian-ish falloff
          // over its own narrow angular half-width, so most of the
          // angular circle stays dark and only the rays light up.
          let rayShape = 0;
          // Bring pixel angle into [0..2π) so deltas are easy to wrap.
          const angNorm = ang < 0 ? ang + Math.PI * 2 : ang;
          for (let i = 0; i < NUM_RAYS; i++) {
            let da = angNorm - rayCenters[i];
            // Wrap to shortest arc in [-π..π].
            if (da >  Math.PI) da -= Math.PI * 2;
            if (da < -Math.PI) da += Math.PI * 2;
            const w = rayWidths[i];
            if (da > -w && da < w) {
              const t = da / w;                        // -1..1 across the ray
              const falloff = 1 - t * t;               // parabola peaking at 0
              const fs = falloff * falloff;            // sharpen further
              const contrib = fs * rayAmps[i];
              if (contrib > rayShape) rayShape = contrib;
            }
          }
          const coreEnd  = scorchExt * 0.35;
          const rayMask  = smoothstep01(coreEnd, outer, d);          // 0 near centre, 1 near rim
          rayBoost = 1 + rayAmp * rayShape * rayMask;
        }
        if (d < outer) {
          const t = 1.0 - smoothstep01(0.0, outer, d);
          let scorch = Math.pow(t, scorchPow) * scorchFrac * rayBoost;
          if (scorch > 1) scorch = 1;
          const idx = (y * W + x) * 4;
          if (scorch > damageMaskData[idx]) damageMaskData[idx] = scorch;
        }
      }

      // Crater depth (G) — additive delta, this blast contributes
      // shape * depthMul * radius * depthDeltaFrac this frame.
      //
      // Shape comes from Recoil/BAR's BasicMapDamage.cpp ("faked Sombrero
      // hat, cut in half") over normalized radius r = d / rimRatio ∈ [0..1]:
      //
      //   c1 = cos((r - 0.1) * (π + 0.3))
      //   c2 = cos(max(0, 3r - 2) * π)
      //   shape = c1 * (1 - r) * (0.5 + 0.5 * c2)
      //
      // shape is POSITIVE in the inner bowl (~r<0.57), crosses zero, then
      // goes NEGATIVE with a rim peak around r ≈ 0.8 before fading to 0 at
      // r = 1. Our mask convention matches Recoil's: positive = sink,
      // negative = lift (vertex shader does height - maskG). So we use
      // the formula directly, no negation.
      // depthFalloff reshapes r before feeding the formula: >1 keeps the
      // centre full-depth longer (wider flat floor), <1 softens it.
      // rimHeight scales ONLY the negative (lift) part so users can dial
      // the upthrust ring without touching the bowl depth.
      if (d < rimRatio && depthDeltaFrac > 0) {
        const r = Math.pow(d / rimRatio, blast.depthFalloff);
        const c1 = Math.cos((r - 0.1) * (Math.PI + 0.3));
        const c2 = Math.cos(Math.max(0, 3 * r - 2) * Math.PI);
        const shape = c1 * (1 - r) * (0.5 + 0.5 * c2);
        // Scale only the negative (lift) band by rimHeight so the slider
        // controls upthrust without touching bowl depth.
        const shapeScaled = shape < 0
          ? shape * blast.rimHeight * 2.0   // lift: scale by slider (2× so 0.5 ≈ Recoil's natural lift)
          : shape;                          // bowl: unscaled
        if (shapeScaled !== 0) {
          const depthWorld = shapeScaled * blast.depthMul * blast.radius * depthDeltaFrac;
          const delta = depthWorld / maxDepth;
          const idx = (y * W + x) * 4 + 1;
          let combined = damageMaskData[idx] + delta;
          // Symmetric clamp: bowl can't exceed +1 (full sink), rim can't
          // exceed -1 (full lift). Float storage keeps the negatives.
          if (combined >  1) combined =  1;
          if (combined < -1) combined = -1;
          damageMaskData[idx] = combined;
        }
      }
    }
  }
  blast.depthProg = newDepthProg;
  blast.scorchProg = newScorchProg;
}

// Advance every active blast by dt seconds, paint incremental contributions,
// retire blasts whose animations have completed.
function updateActiveBlasts(dt) {
  if (activeBlasts.length === 0) return;
  let anyWrites = false;
  for (let i = activeBlasts.length - 1; i >= 0; i--) {
    const b = activeBlasts[i];
    b.age += dt;
    // Eased progress: out-cubic so the first few frames land hard and the
    // tail glides into place — reads as a snappy punch-in, not a linear ramp.
    const tDepth  = Math.min(1, b.age / b.depthDur);
    const tScorch = Math.min(1, b.age / b.scorchDur);
    const easeOut = t => 1 - Math.pow(1 - t, 3);
    const newDepthProg  = easeOut(tDepth);
    const newScorchProg = easeOut(tScorch);
    if (newDepthProg  > b.depthProg + 1e-5 ||
        newScorchProg > b.scorchProg + 1e-5) {
      paintExplosionContribution(b, newDepthProg, newScorchProg);
      anyWrites = true;
    }
    if (tDepth >= 1 && tScorch >= 1) {
      activeBlasts.splice(i, 1);
    }
  }
  if (anyWrites) uploadDamageMaskDirtyRect();
}

// Upload only the dirty sub-rect of the damage mask to the GPU. Avoids
// re-uploading a full 1024²×RGBA×Float32 (~16 MB) every blast frame. Falls
// back to `texture.needsUpdate = true` if the GL handle isn't ready yet
// (before Three.js has initialised the texture on first use).
function uploadDamageMaskDirtyRect() {
  if (damageDirty.minX === -1) return;
  const gl = renderer.getContext();
  const props = renderer.properties.get(damageMaskTex);
  const glTex = props && props.__webglTexture;
  if (!glTex) {
    // Texture hasn't been initialised on the GPU yet — let Three.js do
    // the full initial upload on the next render.
    damageMaskTex.needsUpdate = true;
    damageDirtyReset();
    return;
  }

  const W = damageMaskW;
  const rx0 = damageDirty.minX;
  const ry0 = damageDirty.minY;
  const rx1 = damageDirty.maxX;
  const ry1 = damageDirty.maxY;
  const rw = rx1 - rx0 + 1;
  const rh = ry1 - ry0 + 1;
  const needed = rw * rh * 4;
  if (damagePatchBufCapacity < needed) {
    damagePatchBuf = new Float32Array(needed);
    damagePatchBufCapacity = needed;
  }
  // Pack the dirty rect (row-by-row) out of the big mask into the scratch
  // buffer. Float32Array.subarray + set is a fast typed-memory copy.
  const src = damageMaskData;
  const dst = damagePatchBuf;
  for (let y = 0; y < rh; y++) {
    const srcRow = ((ry0 + y) * W + rx0) * 4;
    dst.set(src.subarray(srcRow, srcRow + rw * 4), y * rw * 4);
  }

  // We pass a view that covers exactly rw*rh*4 floats so WebGL doesn't
  // read past the filled region of the reusable scratch buffer.
  const view = dst.subarray(0, needed);

  // Three.js caches per-unit texture bindings. To avoid corrupting that
  // cache we do our raw write on a high texture unit Three doesn't use
  // for normal material sampling, save/restore the active unit, and
  // restore the unpack flags we touched.
  const savedActive = gl.getParameter(gl.ACTIVE_TEXTURE);
  const savedBinding2D = gl.getParameter(gl.TEXTURE_BINDING_2D);
  const PARK_UNIT = gl.TEXTURE0 + 15;
  gl.activeTexture(PARK_UNIT);
  gl.bindTexture(gl.TEXTURE_2D, glTex);

  // The DataTexture was created with flipY=true, so Three's full-upload
  // path flips the row order on upload. We match that for sub-uploads by
  // setting UNPACK_FLIP_Y_WEBGL and translating the destination Y to
  // bottom-left origin (what WebGL uses after the flip). Without this,
  // clicks on the south side of the map would punch craters in the
  // north — the classic y-flip symptom.
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  const dstY = damageMaskH - 1 - ry1;
  gl.texSubImage2D(gl.TEXTURE_2D, 0, rx0, dstY, rw, rh, gl.RGBA, gl.FLOAT, view);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);

  // Restore GL state so Three's cache stays consistent.
  gl.bindTexture(gl.TEXTURE_2D, savedBinding2D);
  gl.activeTexture(savedActive);
  damageDirtyReset();
}

function smoothstep01(edge0, edge1, x) {
  const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
  return t * t * (3 - 2 * t);
}

// Create the initial (procedural-sized) damage mask and bind it to the
// shared uniforms. The shader's uDamageEnabled starts at 0.0 so this is
// safe even before the first frame renders.
ensureDamageMask();

// ═══════════════════════════════════════════════════════════════════════
//  DEBRIS PARTICLES
// ═══════════════════════════════════════════════════════════════════════
// Pool of instanced boxes that get spawned on each explosion. No fire — just
// dirt chunks launched along an outward+upward cone, pulled back down by
// gravity, and fading out as they land.
const DEBRIS_POOL_SIZE = 512;
// Chunk geometry: a flat-shaded tetrahedron. Four triangular faces with
// sharp corners read instantly as a rock shard. Non-indexed + computed
// normals give per-face (flat) shading so each triangle catches light
// separately — no smooth-sphere look. All instances share this single
// geometry; per-instance non-uniform scale warps it into slabs, wedges,
// and long shards so no two chunks look alike.
function makeChunkGeometry() {
  const g = new THREE.TetrahedronGeometry(0.7, 0).toNonIndexed();
  g.computeVertexNormals();
  return g;
}
const debrisGeom = makeChunkGeometry();
const debrisMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,      // white so instanceColor * map gives the true base tint
  map: null,            // set from the current base material on spawn / rebuild
  roughness: 0.95,
  metalness: 0.0,
  transparent: true,
  opacity: 1.0,
  depthWrite: false     // transparent pass: skip depth writes so overlapping
                        // chunks don't punch holes in each other while fading
});
// Per-instance alpha — InstancedMesh doesn't support per-instance opacity
// out of the box, so we patch an 'instanceAlpha' attribute into the
// standard material's shader via onBeforeCompile.
debrisMat.onBeforeCompile = (shader) => {
  shader.vertexShader = shader.vertexShader
    .replace(
      '#include <common>',
      '#include <common>\nattribute float instanceAlpha;\nvarying float vInstanceAlpha;'
    )
    .replace(
      '#include <begin_vertex>',
      '#include <begin_vertex>\nvInstanceAlpha = instanceAlpha;'
    );
  shader.fragmentShader = shader.fragmentShader
    .replace(
      '#include <common>',
      '#include <common>\nvarying float vInstanceAlpha;'
    )
    .replace(
      '#include <dithering_fragment>',
      'gl_FragColor.a *= vInstanceAlpha;\n#include <dithering_fragment>'
    );
};
function syncDebrisMaterialToBase() {
  const baseId = STATE.baseLayer.material;
  const baseDef = MATERIAL_LIBRARY[baseId];
  if (!baseDef) return;
  const tex = getTexture(baseDef.color, { srgb: true });
  if (debrisMat.map !== tex) {
    debrisMat.map = tex;
    debrisMat.needsUpdate = true;
  }
}
const debrisMesh = new THREE.InstancedMesh(debrisGeom, debrisMat, DEBRIS_POOL_SIZE);
debrisMesh.frustumCulled = false;
debrisMesh.castShadow = false;
debrisMesh.receiveShadow = false;
debrisMesh.count = DEBRIS_POOL_SIZE;
debrisMesh.instanceColor = new THREE.InstancedBufferAttribute(
  new Float32Array(DEBRIS_POOL_SIZE * 3), 3
);
// Per-instance alpha attribute, read by the shader patch above. Start
// fully opaque; updateDebris drives it down during the settled phase.
const debrisAlphaArray = new Float32Array(DEBRIS_POOL_SIZE).fill(1.0);
const debrisAlphaAttr = new THREE.InstancedBufferAttribute(debrisAlphaArray, 1);
debrisAlphaAttr.setUsage(THREE.DynamicDrawUsage);
debrisGeom.setAttribute('instanceAlpha', debrisAlphaAttr);
scene.add(debrisMesh);

// Per-instance physics state. Slot in [0..DEBRIS_POOL_SIZE). alive=false
// means hidden (scaled to zero). Matrix/color are only updated for live
// slots, and we hide dead ones by writing a zero-scale matrix once.
const debrisSlots = new Array(DEBRIS_POOL_SIZE).fill(null).map(() => ({
  alive: false,
  pos: new THREE.Vector3(),
  vel: new THREE.Vector3(),
  rot: new THREE.Euler(),
  rotVel: new THREE.Vector3(),
  // Non-uniform per-axis scale so each chunk has its own silhouette on
  // top of the shared geometry.
  scale: new THREE.Vector3(0, 0, 0),
  age: 0,
  life: 1,          // seconds — only used once settled, for sink-out
  settled: false,   // true after bouncing ends; starts the sink countdown
  settleAge: 0,     // seconds spent at rest
  settleGroundY: 0, // world-Y of the ground at the moment of settling
  airborne: false,  // skip ground collision until the chunk clears the
                    // surface — prevents a low-spawned chunk from ground-
                    // testing true on frame 1 and sticking
}));
let debrisCursor = 0;
const debrisZeroMat = new THREE.Matrix4().makeScale(0, 0, 0);
for (let i = 0; i < DEBRIS_POOL_SIZE; i++) {
  debrisMesh.setMatrixAt(i, debrisZeroMat);
}
debrisMesh.instanceMatrix.needsUpdate = true;

const DEBRIS_TMP_MAT  = new THREE.Matrix4();
const DEBRIS_TMP_POS  = new THREE.Vector3();
const DEBRIS_TMP_QUAT = new THREE.Quaternion();
const DEBRIS_TMP_SCL  = new THREE.Vector3();
const DEBRIS_TMP_COL  = new THREE.Color();

// Three size tiers per blast: a handful of big boulders, a medium shower,
// and a cloud of small gravel. Sizes are multipliers on radius; velocity
// is scaled per-tier so big chunks don't over-fly the crater.
const DEBRIS_TIERS = [
  // count, sizeMin, sizeMax, velMul, spinMul
  { count: 5,  sizeMin: 0.09, sizeMax: 0.14, velMul: 0.55, spinMul: 0.5 },  // large
  { count: 15, sizeMin: 0.045, sizeMax: 0.075, velMul: 0.80, spinMul: 0.8 }, // medium
  { count: 30, sizeMin: 0.02, sizeMax: 0.04, velMul: 1.10, spinMul: 1.2 },  // small
];

// Spawn a burst of chunks at (wx, wy, wz) in three size tiers.
function spawnDebris(wx, wy, wz, radius) {
  syncDebrisMaterialToBase();
  const baseDef = MATERIAL_LIBRARY[STATE.baseLayer.material];
  const baseTint = (baseDef && baseDef.tint) || [1, 1, 1];
  const baseBright = (STATE.baseLayer.brightness || 1.0) *
                     ((baseDef && baseDef.brightness) || 1.0);
  const radScale = Math.max(0.5, radius);
  // Chunk count and size still scale with the crater, but launch
  // velocity intentionally does NOT scale linearly: a radius-3 blast
  // shouldn't hurl chunks 3× as high as a radius-0.885 one. We
  // normalise on the small-explosion radius and use sqrt so big
  // blasts throw a bit harder, not catastrophically harder.
  const REF_RADIUS = 0.885;
  const velRadiusScale = Math.sqrt(Math.max(0.5, radius) / REF_RADIUS);

  for (const tier of DEBRIS_TIERS) {
   for (let i = 0; i < tier.count; i++) {
    const slotIdx = debrisCursor;
    const s = debrisSlots[slotIdx];
    debrisCursor = (debrisCursor + 1) % DEBRIS_POOL_SIZE;

    s.alive = true;
    s.settled = false;
    s.settleAge = 0;
    // Scatter spawn points around the click, then snap each one to the
    // actual (post-crater) terrain surface so chunks visibly erupt out
    // of the ground. We start with 'airborne = false' and disable ground
    // collision until the chunk has cleared the surface — that way we
    // can spawn flush with the terrain without frame-1 sticking.
    const sx = wx + (Math.random() - 0.5) * radius * 0.2;
    const sz = wz + (Math.random() - 0.5) * radius * 0.2;
    const sy = sampleTerrainY(sx, sz);
    s.pos.set(sx, sy - 0.05, sz);
    s.airborne = false;

    // Outward+upward cone. More vertical than horizontal so the fountain
    // reads as a blast, not a shotgun spray. velMul keeps big boulders
    // nearer the crater and lets gravel fly a bit further. Tuned along
    // with the lower gravity below for a measured, weighty arc.
    const angle = Math.random() * Math.PI * 2;
    const velBase = REF_RADIUS * velRadiusScale;
    const horiz = (0.55 + Math.random() * 0.85) * velBase * 0.9 * tier.velMul;
    const vert  = (0.75 + Math.random() * 1.1) * velBase * 1.08 * tier.velMul;
    s.vel.set(Math.cos(angle) * horiz, vert, Math.sin(angle) * horiz);

    s.rot.set(Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28);
    s.rotVel.set(
      (Math.random() - 0.5) * 10 * tier.spinMul,
      (Math.random() - 0.5) * 10 * tier.spinMul,
      (Math.random() - 0.5) * 10 * tier.spinMul
    );
    const baseScale = (tier.sizeMin + Math.random() * (tier.sizeMax - tier.sizeMin)) * radScale;
    // Stretch each axis independently so chunks end up as slabs, wedges,
    // long shards — anything but identical tetrahedra.
    s.scale.set(
      baseScale * (0.6 + Math.random() * 1.1),
      baseScale * (0.6 + Math.random() * 1.1),
      baseScale * (0.6 + Math.random() * 1.1)
    );
    s.age = 0;
    s.life = 1.3 + Math.random() * 0.7;   // linger time after settling

    // Tint the base texture slightly per-chunk so the burst doesn't look
    // painted. Multiplies the base material's own tint + brightness so
    // swapping the base (rock → sand) changes the debris color too.
    const shade = 0.75 + Math.random() * 0.5;
    debrisMesh.instanceColor.setXYZ(slotIdx,
      baseTint[0] * baseBright * shade,
      baseTint[1] * baseBright * shade,
      baseTint[2] * baseBright * shade);
    // Freshly spawned chunk is fully opaque; updateDebris drops this
    // during the settled phase.
    debrisAlphaArray[slotIdx] = 1.0;
   }
  }
  debrisMesh.instanceColor.needsUpdate = true;
  debrisAlphaAttr.needsUpdate = true;
}

function updateDebris(dt) {
  const gravity = -5.2;       // world units / s² — low gravity stretches
                              // hang-time so the blast reads weighty
  const airDrag = Math.pow(0.985, dt * 60);   // frame-rate-independent drag
  const spinDrag = Math.pow(0.97, dt * 60);   // continuous angular drag
  const restitution = 0.45;   // bounce energy retained per impact (0..1)
  const groundFriction = 0.65; // horizontal velocity retained per bounce
  const restSpeed = 0.6;      // below this speed-on-ground, declare settled
  let anyLive = false;
  let anyAlphaChanged = false;
  for (let i = 0; i < DEBRIS_POOL_SIZE; i++) {
    const s = debrisSlots[i];
    if (!s.alive) continue;
    anyLive = true;

    if (s.settled) {
      // If a newer crater has dug the ground out from under a settled
      // chunk, the chunk is now floating below the surface — despawn
      // it instead of leaving a ghost slot around.
      const curGroundY = sampleTerrainY(s.pos.x, s.pos.z);
      if (s.pos.y < curGroundY - 0.1) {
        s.alive = false;
        debrisMesh.setMatrixAt(i, debrisZeroMat);
        if (debrisAlphaArray[i] !== 1.0) {
          debrisAlphaArray[i] = 1.0;
          anyAlphaChanged = true;
        }
        continue;
      }
      // Linger briefly, then fade opacity out over the back 60% of
      // life so the chunk dissolves in place instead of popping.
      s.settleAge += dt;
      if (s.settleAge >= s.life) {
        s.alive = false;
        debrisMesh.setMatrixAt(i, debrisZeroMat);
        if (debrisAlphaArray[i] !== 1.0) {
          debrisAlphaArray[i] = 1.0;   // reset for the next time this slot is reused
          anyAlphaChanged = true;
        }
        continue;
      }
      const fadeStart = s.life * 0.4;
      const alpha = s.settleAge > fadeStart
        ? Math.max(0, 1 - (s.settleAge - fadeStart) / (s.life - fadeStart))
        : 1;
      if (debrisAlphaArray[i] !== alpha) {
        debrisAlphaArray[i] = alpha;
        anyAlphaChanged = true;
      }
      DEBRIS_TMP_POS.copy(s.pos);
      DEBRIS_TMP_QUAT.setFromEuler(s.rot);
      DEBRIS_TMP_SCL.copy(s.scale);
      DEBRIS_TMP_MAT.compose(DEBRIS_TMP_POS, DEBRIS_TMP_QUAT, DEBRIS_TMP_SCL);
      debrisMesh.setMatrixAt(i, DEBRIS_TMP_MAT);
      continue;
    }

    s.age += dt;

    // Integrate
    s.vel.y += gravity * dt;
    s.vel.x *= airDrag;
    s.vel.z *= airDrag;
    s.pos.addScaledVector(s.vel, dt);
    // Continuous angular drag — tumble slows a little every frame, so by
    // the time a chunk settles the rotation is already nearly stopped.
    s.rotVel.multiplyScalar(spinDrag);
    s.rot.x += s.rotVel.x * dt;
    s.rot.y += s.rotVel.y * dt;
    s.rot.z += s.rotVel.z * dt;

    // Ground test against the (current) displaced terrain so chunks don't
    // sink through newly-dug holes. Bounce with energy loss; once the
    // chunk is slow enough on contact, declare it settled.
    // A freshly spawned chunk sits flush with the surface — skip the
    // collision until it has physically cleared it, otherwise the first
    // frame immediately traps it.
    const groundY = sampleTerrainY(s.pos.x, s.pos.z);
    const surfaceY = groundY + 0.02;
    if (!s.airborne) {
      if (s.pos.y > groundY + 0.15) {
        s.airborne = true;
      } else if (s.pos.y < groundY - 0.5) {
        // Pre-airborne chunk never cleared the surface (too weak a
        // launch, or terrain dug out from underneath). Free the slot.
        s.alive = false;
        debrisMesh.setMatrixAt(i, debrisZeroMat);
        if (debrisAlphaArray[i] !== 1.0) {
          debrisAlphaArray[i] = 1.0;
          anyAlphaChanged = true;
        }
        continue;
      }
    } else if (s.pos.y < surfaceY) {
      s.pos.y = surfaceY;
      const horizSpeed = Math.hypot(s.vel.x, s.vel.z);
      const totalSpeed = Math.hypot(horizSpeed, s.vel.y);
      if (totalSpeed < restSpeed) {
        s.settled = true;
        s.settleGroundY = groundY;
        s.vel.set(0, 0, 0);
        s.rotVel.set(0, 0, 0);
      } else {
        s.vel.y = -s.vel.y * restitution;
        s.vel.x *= groundFriction;
        s.vel.z *= groundFriction;
        // Lose a bit of spin on every impact so cubes aren't whirling forever.
        s.rotVel.multiplyScalar(0.7);
      }
    }

    // Airborne/bouncing chunks render at full scale; fade only starts
    // after they've settled, so nothing pops mid-bounce.
    DEBRIS_TMP_POS.copy(s.pos);
    DEBRIS_TMP_QUAT.setFromEuler(s.rot);
    DEBRIS_TMP_SCL.copy(s.scale);
    DEBRIS_TMP_MAT.compose(DEBRIS_TMP_POS, DEBRIS_TMP_QUAT, DEBRIS_TMP_SCL);
    debrisMesh.setMatrixAt(i, DEBRIS_TMP_MAT);
  }
  if (anyLive) debrisMesh.instanceMatrix.needsUpdate = true;
  if (anyAlphaChanged) debrisAlphaAttr.needsUpdate = true;
}

// ═══════════════════════════════════════════════════════════════════════
//  FLASH / FIREBALL — BAR-style click-to-explode visual
// ═══════════════════════════════════════════════════════════════════════
// Each click spawns a single flash slot composed of two camera-facing
// billboards: a bright fireball quad and a flat ground shockwave ring.
// Both are driven by a custom additive shader that ramps colour and
// opacity over normalized age. A shared dynamic point light tracks the
// most recent live flash so the scene gets a brief lighting kick without
// paying for one light per flash.
const FLASH_POOL_SIZE = 16;

// Shared geometry: a single unit quad. Each flash slot uses an instanced
// billboard via Sprite (fireball) + a flat horizontal disc (shockwave).
// Sprites auto-face the camera so we don't need a custom billboard shader.
const flashFireballMat = new THREE.ShaderMaterial({
  uniforms: { uColor: { value: new THREE.Color() }, uAlpha: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    uniform float uAlpha;
    varying vec2 vUv;
    void main() {
      // Soft circular falloff with a hot core that stays bright longer.
      float r = length(vUv - 0.5) * 2.0;        // 0 at centre, 1 at edge
      if (r > 1.0) discard;
      float core = pow(1.0 - r, 1.6);            // bright peak
      float halo = pow(1.0 - r, 0.45) * 0.35;    // soft outer glow
      float i = (core + halo) * uAlpha;
      gl_FragColor = vec4(uColor * i, i);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const flashRingMat = new THREE.ShaderMaterial({
  uniforms: { uColor: { value: new THREE.Color() }, uAlpha: { value: 0 }, uRing: { value: 0.0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    uniform float uAlpha;
    uniform float uRing;     // 0..1 — fraction of disc the ring is at
    varying vec2 vUv;
    void main() {
      float r = length(vUv - 0.5) * 2.0;
      if (r > 1.0) discard;
      // Thin bright ring at radius uRing, plus a soft inner fill that
      // fades out behind the ring as it moves outward.
      float ringW = 0.18;
      float ring = smoothstep(uRing - ringW, uRing, r) * (1.0 - smoothstep(uRing, uRing + ringW, r));
      float inner = (1.0 - smoothstep(0.0, uRing, r)) * 0.25;
      float i = (ring + inner) * uAlpha;
      gl_FragColor = vec4(uColor * i, i);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

// Per-slot meshes (one fireball plane + one ground ring). Pre-allocated.
const flashSlots = [];
for (let i = 0; i < FLASH_POOL_SIZE; i++) {
  const fireballMat = flashFireballMat.clone();
  const ringMat = flashRingMat.clone();
  // Quad (XY plane). The fireball billboards via lookAt(camera) each frame;
  // the ring sits flat on the ground (rotated -π/2 around X).
  const fireball = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), fireballMat);
  const ring = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), ringMat);
  ring.rotation.x = -Math.PI / 2;
  fireball.visible = false;
  ring.visible = false;
  fireball.frustumCulled = false;
  ring.frustumCulled = false;
  scene.add(fireball);
  scene.add(ring);
  flashSlots.push({
    alive: false,
    age: 0,
    life: 0.55,        // total seconds the flash lives
    radius: 1.0,       // peak fireball radius (matches blast radius)
    pos: new THREE.Vector3(),
    fireball, ring,
    fireballMat, ringMat
  });
}

// Shared dynamic point light. Cheap — only one PointLight in the scene
// regardless of how many flashes fire. We retarget it to the brightest
// live flash each frame, so the scene gets an actual lighting kick.
const flashLight = new THREE.PointLight(0xffaa55, 0.0, 30, 2.0);
flashLight.castShadow = false;
scene.add(flashLight);

function spawnFlash(wx, wy, wz, radius) {
  const slot = flashSlots.find(s => !s.alive) || flashSlots[0];
  slot.alive = true;
  slot.age = 0;
  slot.life = 0.55;
  slot.radius = radius;
  slot.pos.set(wx, wy, wz);
  slot.fireball.visible = true;
  slot.ring.visible = true;
}

// ── Crater decals ──
// Each entry corresponds to one slot in the shader's uniform arrays.
// alive=false slots are reused before allocation grows the active set;
// when all slots are alive we recycle the oldest. Decals fade in on
// spawn and fade out at the end of life so the on/off transition isn't
// jarring. The 'glow' channel naturally fades faster (driven by age).
const DECAL_LIFE       = 30.0;   // total seconds before a decal fully fades
const DECAL_FADE_IN    = 0.25;   // seconds to bloom up to full alpha
const DECAL_FADE_OUT   = 6.0;    // seconds of fade-out at the tail
const DECAL_GLOW_LIFE  = 4.5;    // glow ember-fades within this window
const activeDecals = [];
for (let i = 0; i < MAX_DECALS; i++) {
  activeDecals.push({
    alive: false, age: 0,
    x: 0, y: 0, z: 0,
    radius: 1, invRadius: 1,
