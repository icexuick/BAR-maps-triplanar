    // Tangent / bitangent / normal at the impact point — anchor for the
    // oriented projection box. Defaults are a flat ground frame.
    tx: 1, ty: 0, tz: 0,
    bx: 0, by: 0, bz: 1,
    nx: 0, ny: 1, nz: 0
  });
}

// Helpers reused across spawnDecal calls so we don't allocate every click.
const _decalNormalTmp = new THREE.Vector3();
const _decalTangentTmp = new THREE.Vector3();
const _decalBitangentTmp = new THREE.Vector3();
const _decalUpY = new THREE.Vector3(0, 1, 0);
const _decalUpZ = new THREE.Vector3(0, 0, 1);
function spawnDecal(wx, wy, wz, radius) {
  // Find a free slot, or recycle the oldest live one.
  let slot = activeDecals.find(d => !d.alive);
  if (!slot) {
    slot = activeDecals[0];
    for (const d of activeDecals) if (d.age > slot.age) slot = d;
  }
  slot.alive  = true;
  slot.age    = 0;
  slot.x      = wx;
  slot.y      = wy;
  slot.z      = wz;
  // Tuned down from earlier sizes — keeps the decal close to the actual
  // crater footprint instead of bleeding out into surroundings.
  slot.radius = radius * 0.9;
  slot.invRadius = 1.0 / slot.radius;

  // Sample the surface normal at the impact point and build a tangent
  // frame (T, B, N) anchored to it. T is constructed from world +X
  // projected onto the plane perpendicular to N, then orthonormalised.
  // This avoids the up-reference flipping issue when N transitions
  // between ~horizontal and ~vertical slopes — the frame stays
  // continuous because we use a single stable reference axis.
  const n = computeTerrainNormal(wx, wz);
  // Pick the world axis least parallel to N as the reference for T.
  // Using the smallest component of |N| means cross(N, ref) is never
  // close to zero, so T is well-defined for any slope.
  const ax = Math.abs(n.x), ay = Math.abs(n.y), az = Math.abs(n.z);
  let refX = 0, refY = 0, refZ = 0;
  if (ax < ay && ax < az) refX = 1;
  else if (ay < az)        refY = 1;
  else                     refZ = 1;
  // T = normalize(ref - N*(N·ref))   (Gram-Schmidt: ref minus its N component)
  const dotNR = n.x * refX + n.y * refY + n.z * refZ;
  let tx = refX - n.x * dotNR;
  let ty = refY - n.y * dotNR;
  let tz = refZ - n.z * dotNR;
  const tLen = Math.hypot(tx, ty, tz) || 1;
  tx /= tLen; ty /= tLen; tz /= tLen;
  // B = N × T  — completes the right-handed frame.
  const bx = n.y * tz - n.z * ty;
  const by = n.z * tx - n.x * tz;
  const bz = n.x * ty - n.y * tx;

  // Random rotation around N so repeated decals don't look identical.
  // Pre-rotate T and B by (cos, sin) so the shader stores the final axes.
  const a = Math.random() * Math.PI * 2;
  const cs = Math.cos(a);
  const sn = Math.sin(a);
  slot.tx =  tx * cs + bx * sn;
  slot.ty =  ty * cs + by * sn;
  slot.tz =  tz * cs + bz * sn;
  slot.bx = -tx * sn + bx * cs;
  slot.by = -ty * sn + by * cs;
  slot.bz = -tz * sn + bz * cs;
  slot.nx = n.x; slot.ny = n.y; slot.nz = n.z;
}

function updateDecals(dt) {
  let count = 0;
  for (const d of activeDecals) {
    if (!d.alive) continue;
    d.age += dt;
    if (d.age >= DECAL_LIFE) {
      d.alive = false;
      continue;
    }
    // Albedo envelope: fade in fast, hold, fade out at the tail.
    const fadeIn  = Math.min(1, d.age / DECAL_FADE_IN);
    const fadeOut = d.age > DECAL_LIFE - DECAL_FADE_OUT
      ? (DECAL_LIFE - d.age) / DECAL_FADE_OUT
      : 1;
    const fade = Math.max(0, Math.min(1, fadeIn * fadeOut));
    // Glow envelope: per-decal ember cooldown on its OWN clock — so a
    // fresh blast can't re-ignite older craters. Same fade-in shape as
    // albedo so the embers don't pop.
    const glowFade = d.age < DECAL_GLOW_LIFE
      ? fadeIn * Math.pow(1 - d.age / DECAL_GLOW_LIFE, 1.4)
      : 0;
    if (fade <= 0.001 && glowFade <= 0.001) continue;

    const slotIdx = count;
    // Centre packs world-space XYZ + invRadius. Tangent frame goes into
    // the parallel T/B arrays (precomputed at spawn).
    sharedUniforms.uDecalCentre.value[slotIdx].set(d.x, d.y, d.z, d.invRadius);
    sharedUniforms.uDecalT.value[slotIdx].set(d.tx, d.ty, d.tz);
    sharedUniforms.uDecalB.value[slotIdx].set(d.bx, d.by, d.bz);
    sharedUniforms.uDecalFade.value[slotIdx].set(fade, glowFade);
    count++;
    if (count >= MAX_DECALS) break;
  }
  sharedUniforms.uDecalCount.value = count;
  // uDecalGlow is now just the user's slider — per-decal envelope is
  // baked into uDecalFade.y so each crater cools independently.
  sharedUniforms.uDecalGlow.value = (STATE.explosions?.decalGlow ?? 0.6) * 3.2;
}

// Three colour stops (RGB) blended over normalized age — bright white
// flash → warm orange → deep red smoke. Matches the BAR fireball look.
const FLASH_COL_HOT  = new THREE.Color(1.0, 0.95, 0.75);
const FLASH_COL_MID  = new THREE.Color(1.0, 0.55, 0.18);
const FLASH_COL_LATE = new THREE.Color(0.55, 0.12, 0.05);
const FLASH_TMP_COL  = new THREE.Color();

// Fireball loopt korter dan de hele flash-slot (de shockwave en het
// terrein-licht moeten nog even doorlopen nadat de centrale vuurbal
// is uitgedoofd).
const FLASH_FIREBALL_LIFE = 0.32;

function updateFlashes(dt) {
  let brightestI = 0;
  let brightestSlot = null;
  for (const s of flashSlots) {
    if (!s.alive) continue;
    s.age += dt;
    const t = s.age / s.life;
    if (t >= 1) {
      s.alive = false;
      s.fireball.visible = false;
      s.ring.visible = false;
      continue;
    }

    // Fireball gebruikt z'n eigen kortere tijdlijn — knipperen weg na
    // FLASH_FIREBALL_LIFE seconden, los van slot.life.
    const fbT = Math.min(1, s.age / FLASH_FIREBALL_LIFE);
    const fbDone = fbT >= 1;
    if (fbDone) {
      s.fireball.visible = false;
    }

    // Fireball: snap-grow in the first ~12% of fireball life, hold, then fade.
    // Size peaks slightly larger than the crater radius so it visually
    // engulfs the rim like in BAR.
    const grow  = Math.min(1, fbT / 0.12);
    const fbSize = s.radius * 2.4 * (0.4 + 0.6 * Math.pow(grow, 0.5));
    s.fireball.scale.set(fbSize, fbSize, 1);
    // Billboard: quad faces the camera each frame.
    s.fireball.position.copy(s.pos);
    // Centre of the fireball sits at terrain level so the bottom half
    // hugs the ground instead of floating above the crater.
    s.fireball.lookAt(camera.position);

    // Colour ramp: hot → mid → late.
    if (fbT < 0.35) {
      const u = fbT / 0.35;
      FLASH_TMP_COL.copy(FLASH_COL_HOT).lerp(FLASH_COL_MID, u);
    } else {
      const u = (fbT - 0.35) / 0.65;
      FLASH_TMP_COL.copy(FLASH_COL_MID).lerp(FLASH_COL_LATE, u);
    }
    s.fireballMat.uniforms.uColor.value.copy(FLASH_TMP_COL);
    // Alpha curve: punch in fast, hold, then ease out.
    const alpha = fbDone ? 0 : (fbT < 0.12
      ? Math.pow(fbT / 0.12, 0.7) * 1.6
      : Math.pow(1 - (fbT - 0.12) / 0.88, 1.7) * 1.6);
    s.fireballMat.uniforms.uAlpha.value = Math.max(0, Math.min(2.5, alpha));

    // Ground shockwave: expands from 0 to ~2.5× crater radius over ~0.55s,
    // then fades. Ring radius runs in normalized [0..1] disc coords.
    const ringT = Math.min(1, t / 0.7);
    // Ease-out: snel groeien aan het begin, langzamer naar het einde.
    const ringEased = 1 - Math.pow(1 - ringT, 2.2);
    const ringSize = s.radius * 1.35 * ringEased;
    s.ring.scale.set(ringSize, ringSize, 1);
    s.ring.position.copy(s.pos);
    s.ring.position.y += Math.max(0.05, s.radius * 0.08);
    s.ringMat.uniforms.uColor.value.copy(FLASH_COL_MID);
    s.ringMat.uniforms.uRing.value = 0.5 + ringT * 0.45;
    s.ringMat.uniforms.uAlpha.value = (1 - ringT) * 0.9;

    // Track brightest flash for the shared point light.
    const intensity = alpha * s.radius;
    if (intensity > brightestI) {
      brightestI = intensity;
      brightestSlot = s;
    }
  }

  if (brightestSlot) {
    flashLight.position.copy(brightestSlot.pos);
    flashLight.color.copy(brightestSlot.fireballMat.uniforms.uColor.value);
    // Light intensity scales with both flash brightness and crater
    // radius so big blasts illuminate more terrain.
    flashLight.intensity = brightestI * 4.0;
    flashLight.distance = brightestSlot.radius * 18.0;
    // Drive the terrain shader's flash uniforms so the ground itself
    // lights up — Three's PointLight only affects materials with their
    // own lighting model (debris uses MeshStandardMaterial, terrain
    // uses a custom ShaderMaterial that ignores it).
    sharedUniforms.uFlashPos.value.copy(brightestSlot.pos);
    const fc = brightestSlot.fireballMat.uniforms.uColor.value;
    sharedUniforms.uFlashColor.value.set(fc.r, fc.g, fc.b);
    sharedUniforms.uFlashIntensity.value = brightestI * 2.6;
    sharedUniforms.uFlashRadius.value    = brightestSlot.radius * 2.66;
  } else {
    flashLight.intensity = 0;
    sharedUniforms.uFlashIntensity.value = 0;
  }
}

function applyHeightFloat32(heightInfo) {
  const info = analyzeHeightFloat32(heightInfo);
  // Stash the raw height data alongside the metadata so the click raycaster
  // can sample the displaced surface CPU-side.
  info.data = heightInfo.data;
  lastHeightmapInfo = info;
  // Also remember it for the sediment mask — same buffer, no copy.
  lastBakedHeightInfo = heightInfo;
  refreshSedimentMask();
  STATE.heightmapAspect = info.width / info.height;

  const tex = makeHeightDataTexture(heightInfo);
  const prev = sharedUniforms.uHeightmap.value;
  sharedUniforms.uHeightmap.value = tex;
  sharedUniforms.uUseHeightmap.value = 1.0;
  sharedUniforms.uHeightmapTexel.value.set(1.0 / info.width, 1.0 / info.height);

  const scale = sharedUniforms.uHeightScale.value;
  sharedUniforms.uHeightMinWorld.value = info.min * scale;
  sharedUniforms.uHeightMaxWorld.value = info.max * scale;

  rebuildGeometry();
  ensureDamageMask();
  buildWater();

  if (prev && prev !== tex) prev.dispose();
  document.getElementById('stat-shader').textContent =
    `SHADER: HEIGHTMAP ${info.width}x${info.height} (${heightInfo.depth}bit)`;
}

function loadHeightmapFromArrayBuffer(buf) {
  try {
    const heightInfo = decodePNGToHeightFloat32(buf);
    applyHeightFloat32(heightInfo);
    currentHeightmapBytes = buf;
    currentHeightmapDataURL = arrayBufferToDataURL(buf);
  } catch (err) {
    console.error('PNG decode failed:', err);
  }
}

function loadHeightmapFromURL(url, { silent = false } = {}) {
  // Data URL fast path: parse the base64 and feed straight into the decoder.
  if (url.startsWith('data:')) {
    try {
      loadHeightmapFromArrayBuffer(dataURLToArrayBuffer(url));
    } catch (err) {
      if (!silent) console.warn('Heightmap data URL decode failed:', err);
    }
    return;
  }
  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.arrayBuffer();
    })
    .then(buf => loadHeightmapFromArrayBuffer(buf))
    .catch(err => { if (!silent) console.warn('Heightmap load failed:', url, err); });
}

function loadHeightmapFromFile(file) {
  file.arrayBuffer()
    .then(buf => loadHeightmapFromArrayBuffer(buf))
    .catch(err => console.warn('Heightmap file read failed:', err));
}

function clearHeightmap() {
  sharedUniforms.uUseHeightmap.value = 0.0;
  STATE.heightmapAspect = 1.0;
  currentHeightmapBytes = null;
  currentHeightmapDataURL = null;
  // For procedural mode use a ±uDisplacement range as a reasonable guess
  const d = sharedUniforms.uDisplacement.value;
  sharedUniforms.uHeightMinWorld.value = -d;
  sharedUniforms.uHeightMaxWorld.value =  d;

// ═══════════════════════════════════════════════════════════════════════
//  ORBIT CAMERA (LMB = orbit, RMB/MMB/Shift+LMB = pan, wheel = zoom)
// ═══════════════════════════════════════════════════════════════════════
let dragMode = null;  // 'orbit' | 'pan' | null
let prevMouse = { x: 0, y: 0 };
let orbitAngle = 0.8;
let orbitPitch = 0.45;
let orbitDist = 18;
const panTarget = new THREE.Vector3(0, 0, 0);

function updateCamera() {
  const x = orbitDist * Math.sin(orbitAngle) * Math.cos(orbitPitch);
  const y = orbitDist * Math.sin(orbitPitch);
  const z = orbitDist * Math.cos(orbitAngle) * Math.cos(orbitPitch);
  camera.position.set(x, y, z).add(panTarget);
  camera.lookAt(panTarget);
}
updateCamera();

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

renderer.domElement.addEventListener('pointerdown', e => {
  // RMB (2), MMB (1), or Shift+LMB → pan. LMB → orbit.
  if (e.button === 2 || e.button === 1 || (e.button === 0 && e.shiftKey)) {
    dragMode = 'pan';
  } else if (e.button === 0) {
    dragMode = 'orbit';
  } else {
    return;
  }
  prevMouse = { x: e.clientX, y: e.clientY };
  e.preventDefault();
});
window.addEventListener('pointerup', () => { dragMode = null; });
window.addEventListener('pointermove', e => {
  if (!dragMode) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  prevMouse = { x: e.clientX, y: e.clientY };

  if (dragMode === 'orbit') {
    orbitAngle -= dx * 0.005;
    orbitPitch = Math.max(0.05, Math.min(1.4, orbitPitch + dy * 0.005));
  } else {
    // Pan in screen space along the camera's right/up vectors, scaled by
    // distance so the cursor stays roughly glued to the terrain.
    const panScale = orbitDist * 0.0018;
    const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
    const up    = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 1);
    panTarget.addScaledVector(right, -dx * panScale);
    panTarget.addScaledVector(up,     dy * panScale);
  }
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e => {
  orbitDist = Math.max(4, Math.min(60, orbitDist + e.deltaY * 0.02));
  updateCamera();
  e.preventDefault();
}, { passive: false });

// Turn a mouse click into a world-space hit on the displaced terrain. We
// march a ray through the heightmap CPU-side (see raycastDisplacedTerrain)
// so the hit point matches what the player actually sees on screen instead
// of the flat base plane.
const explosionPointer = new THREE.Vector2();
const explosionRayOrigin = new THREE.Vector3();
const explosionRayDir    = new THREE.Vector3();
let explosionMouseDown = null;
renderer.domElement.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  explosionMouseDown = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('pointerup', e => {
  if (e.button !== 0 || !explosionMouseDown) return;
  const dx = e.clientX - explosionMouseDown.x;
  const dy = e.clientY - explosionMouseDown.y;
  explosionMouseDown = null;
  if (dx * dx + dy * dy > 25) return;           // treat drags as orbit, not fire
  if (!STATE.explosions.enabled) return;
  if (!terrain) return;

  // Build the world-space ray from the click position.
  const rect = renderer.domElement.getBoundingClientRect();
  explosionPointer.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  explosionPointer.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  explosionRayOrigin.copy(camera.position);
  explosionRayDir.set(explosionPointer.x, explosionPointer.y, 0.5)
    .unproject(camera)
    .sub(camera.position)
    .normalize();

  const hit = raycastDisplacedTerrain(explosionRayOrigin, explosionRayDir);
  if (!hit) return;
  paintExplosion(hit.x, hit.z, STATE.explosions.radius);
  spawnDebris(hit.x, hit.y, hit.z, STATE.explosions.radius);
  spawnFlash(hit.x, hit.y, hit.z, STATE.explosions.radius);
  spawnDecal(hit.x, hit.y, hit.z, STATE.explosions.radius);
});

// ── Inject numeric readouts next to every left-panel slider ──
// Each step count drives how many decimals we display (0.0005 → 4, 0.01 → 2,
// 0.1 → 1, 1 → 0). Keeps the format consistent with the slider precision.
function formatForStep(step) {
  if (step >= 1)     return v => v.toFixed(0);
  if (step >= 0.1)   return v => v.toFixed(1);
  if (step >= 0.01)  return v => v.toFixed(2);
  if (step >= 0.001) return v => v.toFixed(3);
  return v => v.toFixed(4);
}
document.querySelectorAll('.hud-bottom-left .control-row input[type="range"]').forEach(input => {
  const step = parseFloat(input.step) || 0.01;
  const fmt = formatForStep(step);
  const span = document.createElement('span');
  span.className = 'val';
  span.textContent = fmt(parseFloat(input.value));
  input.after(span);
  input.addEventListener('input', () => {
    span.textContent = fmt(parseFloat(input.value));
  });
  // Stash the formatter so syncSlidersFromState can refresh the readout too.
  input._valSpan = span;
  input._valFmt  = fmt;
});

// ═══════════════════════════════════════════════════════════════════════
//  SKYBOX (equirectangular) + hemi-ambient sampling
// ═══════════════════════════════════════════════════════════════════════
// Samples three horizontal bands from the equirectangular image and feeds
// the results to the shader's hemispherical ambient term. This gives a
// cheap IBL-like tint without any cubemap/convolution work.
function sampleHemiAmbient(image) {
  const w = image.naturalWidth || image.width;
  const h = image.naturalHeight || image.height;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.drawImage(image, 0, 0);
  const data = ctx.getImageData(0, 0, w, h).data;

  function averageBand(yStart, yEnd) {
    let r = 0, g = 0, b = 0, n = 0;
    // Sample sparsely to keep it fast on large images
    const stepY = Math.max(1, Math.floor((yEnd - yStart) / 16));
    const stepX = Math.max(1, Math.floor(w / 64));
    for (let y = yStart; y < yEnd; y += stepY) {
      for (let x = 0; x < w; x += stepX) {
        const i = (y * w + x) * 4;
        r += data[i]; g += data[i + 1]; b += data[i + 2];
        n++;
      }
    }
    return [r / n / 255, g / n / 255, b / n / 255];
  }

  // Top 15% = sky, middle 30% around the horizon, bottom 15% = ground
  const sky      = averageBand(0, Math.floor(h * 0.15));
  const horizon  = averageBand(Math.floor(h * 0.40), Math.floor(h * 0.60));
  const ground   = averageBand(Math.floor(h * 0.85), h);

  return { sky, horizon, ground };
}

function applySkyboxTexture(texture, image) {
  texture.mapping = THREE.EquirectangularReflectionMapping;
  texture.encoding = THREE.sRGBEncoding;
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;

  const prev = scene.background;
  scene.background = texture;
  if (prev && prev.dispose && prev !== texture) prev.dispose();

  // Feed hemi-ambient uniforms from image analysis
  const hemi = sampleHemiAmbient(image);
  sharedUniforms.uAmbientSky.value.set(...hemi.sky);
  sharedUniforms.uAmbientHorizon.value.set(...hemi.horizon);
  sharedUniforms.uAmbientGround.value.set(...hemi.ground);

  // Adjust fog color to the horizon tint so distant terrain blends into the sky
  sharedUniforms.uFogColor.value.set(...hemi.horizon);
}

function loadSkyboxFromURL(url, { silent = false } = {}) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const tex = new THREE.Texture(img);
    tex.needsUpdate = true;
    applySkyboxTexture(tex, img);
    // JPEG re-encode — skyboxes are photographic so JPEG is drastically
    // smaller than PNG and the loss is imperceptible for ambient sampling.
    currentSkyboxDataURL = url.startsWith('data:') ? url : imageToDataURL(img, 'image/jpeg');
  };
  img.onerror = () => { if (!silent) console.warn('Skybox load failed:', url); };
  img.src = url;
}

function loadSkyboxFromFile(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const tex = new THREE.Texture(img);
    tex.needsUpdate = true;
    applySkyboxTexture(tex, img);
    currentSkyboxDataURL = imageToDataURL(img, 'image/jpeg');
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function clearSkybox() {
  currentSkyboxDataURL = null;
  const prev = scene.background;
  scene.background = null;
  if (prev && prev.dispose) prev.dispose();
  // Reset ambient uniforms to defaults
  sharedUniforms.uAmbientSky.value.set(0.55, 0.65, 0.85);
  sharedUniforms.uAmbientHorizon.value.set(0.45, 0.50, 0.60);
  sharedUniforms.uAmbientGround.value.set(0.20, 0.18, 0.15);
  sharedUniforms.uFogColor.value.set(0.55, 0.62, 0.75);
}

// ═══════════════════════════════════════════════════════════════════════
//  SAVE / LOAD CONFIG
// ═══════════════════════════════════════════════════════════════════════
// Serializes everything the user can tune: the layer stack, per-slider
// values, and world/lighting state. Textures and image files themselves
// aren't embedded — the config just references material IDs + sliders.
const CONFIG_VERSION = 1;
const CONFIG_LS_KEY  = 'bar-triplanar-config';

function collectConfig() {
  const u = sharedUniforms;
  return {
    version: CONFIG_VERSION,
    state: {
      worldSize: STATE.worldSize,
      heightmapAspect: STATE.heightmapAspect,
      baseLayer: { ...STATE.baseLayer },
      layers: STATE.layers.map(l => ({ ...l })),
      biplanar: STATE.biplanar,
      sharpenBlend: STATE.sharpenBlend,
      sediment: { ...STATE.sediment }
    },
    shader: {
      texScale: u.uTexScale.value,
      blendSharp: u.uBlendSharpness.value,
      heightBlend: u.uHeightBlend.value,
      fogDensity: u.uFogDensity.value,
      displacement: u.uDisplacement.value,
      heightScale: u.uHeightScale.value
    },
    lighting: {
      ambientStrength: u.uAmbientStrength.value,
      sunStrength: u.uSunStrength.value,
      rimStrength: u.uRimStrength.value,
      specular: u.uSpecular.value,
      sunDir: u.uSunDir.value.toArray(),
      shadowBias: u.uShadowBias.value,
      shadowNormalBias: u.uShadowNormalBias.value,
      shadowSoftness: u.uShadowSoftness.value,
      shadowEnabled: u.uShadowEnabled.value
    },
    topo: {
      enabled: u.uTopoEnabled.value,
      spacing: u.uTopoSpacing.value,
      width:   u.uTopoWidth.value,
      depth:   u.uTopoDepth.value,
      darken:  u.uTopoDarken.value,
      range:   u.uTopoRange.value.toArray()
    },
    water: { ...STATE.water },
    explosions: { ...STATE.explosions },
    materials: Object.fromEntries(
      Object.entries(MATERIAL_LIBRARY).map(([id, m]) => [id, {
        uvScale: m.uvScale,
        uvRotation: m.uvRotation,
        brightness: m.brightness,
        tint: [...m.tint],
        roughness: m.roughness,
        normalStrength: m.normalStrength,
        specular: m.specular,
        hexTile: m.hexTile === true
      }])
    ),
    // Embed the actual image bytes as data URLs so a saved config can
    // fully restore the scene without needing the original source files.
    assets: {
      heightmap: currentHeightmapDataURL,
      skybox:    currentSkyboxDataURL
    }
  };
}

function applyConfig(cfg) {
  if (!cfg || cfg.version !== CONFIG_VERSION) {
    console.warn('Config version mismatch or empty, skipping.');
    return;
  }
  const u = sharedUniforms;

  // STATE — rebuild the layer stack
  if (cfg.state) {
    if (typeof cfg.state.worldSize === 'number') STATE.worldSize = cfg.state.worldSize;
    if (cfg.state.baseLayer) STATE.baseLayer = { ...cfg.state.baseLayer };
    if (Array.isArray(cfg.state.layers)) STATE.layers = cfg.state.layers.map(l => ({ ...l }));
    if (typeof cfg.state.biplanar === 'boolean') STATE.biplanar = cfg.state.biplanar;
    if (typeof cfg.state.sharpenBlend === 'boolean') STATE.sharpenBlend = cfg.state.sharpenBlend;
    if (cfg.state.sediment) STATE.sediment = { ...STATE.sediment, ...cfg.state.sediment };
  }

  // Shader group
  if (cfg.shader) {
    if (typeof cfg.shader.texScale === 'number')     u.uTexScale.value = cfg.shader.texScale;
    if (typeof cfg.shader.blendSharp === 'number')   u.uBlendSharpness.value = cfg.shader.blendSharp;
    if (typeof cfg.shader.heightBlend === 'number')  u.uHeightBlend.value = cfg.shader.heightBlend;
    if (typeof cfg.shader.fogDensity === 'number')   u.uFogDensity.value = cfg.shader.fogDensity;
    if (typeof cfg.shader.displacement === 'number') u.uDisplacement.value = cfg.shader.displacement;
    if (typeof cfg.shader.heightScale === 'number')  u.uHeightScale.value = cfg.shader.heightScale;
  }

  // Lighting group
  if (cfg.lighting) {
    if (typeof cfg.lighting.ambientStrength === 'number') u.uAmbientStrength.value = cfg.lighting.ambientStrength;
    if (typeof cfg.lighting.sunStrength === 'number')     u.uSunStrength.value = cfg.lighting.sunStrength;
    if (typeof cfg.lighting.rimStrength === 'number')     u.uRimStrength.value = cfg.lighting.rimStrength;
    if (typeof cfg.lighting.specular === 'number')        u.uSpecular.value = cfg.lighting.specular;
    if (Array.isArray(cfg.lighting.sunDir))               u.uSunDir.value.fromArray(cfg.lighting.sunDir).normalize();
    if (typeof cfg.lighting.shadowBias === 'number')       u.uShadowBias.value = cfg.lighting.shadowBias;
    if (typeof cfg.lighting.shadowNormalBias === 'number') u.uShadowNormalBias.value = cfg.lighting.shadowNormalBias;
    if (typeof cfg.lighting.shadowSoftness === 'number')   u.uShadowSoftness.value = cfg.lighting.shadowSoftness;
    if (typeof cfg.lighting.shadowEnabled === 'number')    u.uShadowEnabled.value = cfg.lighting.shadowEnabled;
  }

  // Topo contour lines
  if (cfg.topo) {
    if (typeof cfg.topo.enabled === 'number') u.uTopoEnabled.value = cfg.topo.enabled;
    if (typeof cfg.topo.spacing === 'number') u.uTopoSpacing.value = cfg.topo.spacing;
    if (typeof cfg.topo.width === 'number')   u.uTopoWidth.value   = cfg.topo.width;
    if (typeof cfg.topo.depth === 'number')   u.uTopoDepth.value   = cfg.topo.depth;
    if (typeof cfg.topo.darken === 'number')  u.uTopoDarken.value  = cfg.topo.darken;
    if (Array.isArray(cfg.topo.range))        u.uTopoRange.value.fromArray(cfg.topo.range);
  }

  // Water plane settings — rebuild the mesh so size + height take effect.
  if (cfg.water) {
    Object.assign(STATE.water, cfg.water);
    buildWater();
  }

  // Explosion tunables — most values get snapshotted on the next
  // paintExplosion() call, but the scorch-material toggle decides
  // whether the 'damage' material is compiled in, so a rebuild is
  // required when it flips.
  if (cfg.explosions) {
    const prevScorch = STATE.explosions.scorchEnabled !== false;
    Object.assign(STATE.explosions, cfg.explosions);
    const newScorch = STATE.explosions.scorchEnabled !== false;
    if (prevScorch !== newScorch) rebuildMaterial();
  }

  // Per-material tunables — write back to MATERIAL_LIBRARY and live uniforms
  if (cfg.materials) {
    for (const [id, mc] of Object.entries(cfg.materials)) {
      const m = MATERIAL_LIBRARY[id];
      if (!m) continue;
      if (typeof mc.uvScale === 'number')        m.uvScale = mc.uvScale;
      if (typeof mc.uvRotation === 'number')     m.uvRotation = mc.uvRotation;
      if (typeof mc.brightness === 'number')     m.brightness = mc.brightness;
      if (Array.isArray(mc.tint))                m.tint = [...mc.tint];
      if (typeof mc.roughness === 'number')      m.roughness = mc.roughness;
      if (typeof mc.normalStrength === 'number') m.normalStrength = mc.normalStrength;
      if (typeof mc.specular === 'number')       m.specular = mc.specular;
      if (typeof mc.hexTile === 'boolean')       m.hexTile = mc.hexTile;
      const mu = ensureMatUniforms(id);
      mu.UvScale.value   = m.uvScale;
      mu.UvRot.value     = m.uvRotation;
      mu.Bright.value    = m.brightness;
      mu.Tint.value.set(...m.tint);
      mu.Roughness.value = m.roughness;
      mu.NormalStr.value = m.normalStrength;
      mu.Spec.value      = m.specular;
    }
  }

  // Push values back into the DOM sliders so the UI matches
  syncSlidersFromState();

  // The layer stack may have changed materials/count — regenerate shader.
  rebuildMaterial();
  renderLayerPanel();
  renderMaterialsPanel();

  // Restore embedded assets. Heightmap load re-runs rebuildGeometry itself
  // (to match the image aspect). If there's no embedded heightmap, go back
  // to procedural mode and rebuild with the current worldSize.
  if (cfg.assets && cfg.assets.heightmap) {
    loadHeightmapFromURL(cfg.assets.heightmap, { silent: true });
  } else {
    clearHeightmap();
  }
  if (cfg.assets && cfg.assets.skybox) {
    loadSkyboxFromURL(cfg.assets.skybox, { silent: true });
  }
}

  set('explosionsDepthFalloff',   STATE.explosions.depthFalloff);
  set('explosionsRimHeight',      STATE.explosions.rimHeight);

  set('explosionsScorchSpikes',   STATE.explosions.scorchSpikes);
  set('explosionsScorchEnabled',  STATE.explosions.scorchEnabled === false ? 0 : 1);
  set('explosionsDecalEnabled',   STATE.explosions.decalEnabled === false ? 0 : 1);
  set('explosionsDecalGlow',      STATE.explosions.decalGlow);
  set('explosionsDecalTint',      STATE.explosions.decalTint);
  set('explosionsDecalNormal',    STATE.explosions.decalNormalStr);
  // Decal toggle/tint/normal flow through live uniforms (no rebuild
  // needed), so push them into the shader after a config load.
  sharedUniforms.uDecalEnabled.value   = STATE.explosions.decalEnabled === false ? 0.0 : 1.0;
  sharedUniforms.uDecalTint.value      = STATE.explosions.decalTint      ?? 0.65;
  sharedUniforms.uDecalNormalStr.value = STATE.explosions.decalNormalStr ?? 0.6;

  // Sync the projection-mode toggle buttons (their text label is the only
  // visible state for these — they don't have a slider readout).
  const bpBtn = document.getElementById('btn-biplanar');
  if (bpBtn) bpBtn.textContent = `TRIPLANAR: ${STATE.biplanar ? 'OFF' : 'ON'}`;
  const sbBtn = document.getElementById('btn-sharpen-blend');
  if (sbBtn) sbBtn.textContent = `SHARPEN BLEND: ${STATE.sharpenBlend ? 'ON' : 'OFF'}`;

  // Sediment sliders + uniforms. Push the cheap uniforms first, then trigger
  // a CPU rebake of the mask if the heightmap has been loaded.
  set('sedimentEnabled',   STATE.sediment.enabled ? 1 : 0);
  set('sedimentRadius',    STATE.sediment.radius);

  sharedUniforms.uSedimentStrength.value  = STATE.sediment.strength;
  sharedUniforms.uSedimentDebugTint.value = STATE.sediment.debugTint;
  refreshSedimentMask();
}

function saveConfigToFile() {
  const cfg = collectConfig();
  const json = JSON.stringify(cfg, null, 2);
  // Persist to localStorage for auto-restore on reload
  try { localStorage.setItem(CONFIG_LS_KEY, json); } catch (_) {}

  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `triplanar-config-${Date.now()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function loadConfigFromFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const cfg = JSON.parse(reader.result);
      applyConfig(cfg);
      try { localStorage.setItem(CONFIG_LS_KEY, reader.result); } catch (_) {}
    } catch (err) {
      console.error('Failed to parse config file:', err);
    }
  };
  reader.readAsText(file);
}

document.getElementById('btn-save-config').addEventListener('click', saveConfigToFile);
document.getElementById('btn-load-config').addEventListener('click', () => {
  document.getElementById('configFile').click();
});
document.getElementById('configFile').addEventListener('change', e => {
  if (e.target.files && e.target.files[0]) loadConfigFromFile(e.target.files[0]);
});

// Backfill optional fields on layers that may have been created before a
// given feature existed (saved configs, initial literals, etc). Keeps the
// renderer and UI code free of endless `?? default` ladders.
function ensureLayerDefaults(layer) {
  if (layer.visible == null)         layer.visible = true;
  if (layer.fixed == null)           layer.fixed = false;
  if (layer.thickness == null)       layer.thickness = 0.0;
  if (layer.highlightWidth == null)  layer.highlightWidth = 0.15;
  if (layer.highlightSoft == null)   layer.highlightSoft = 1.0;
  if (layer.shadowStrength == null)  layer.shadowStrength = 0.0;
  if (layer.shadowDist == null)      layer.shadowDist = 0.02;
  if (layer.shadowBlur == null)      layer.shadowBlur = 0.01;
  if (!layer.edgeNoise) {
    layer.edgeNoise = {
      enabled: 0,
      scale: -1.0,   // log10 of the world-XZ frequency (so 10^-1 = 0.1 ≈ medium)
      amount: 0.08,  // how far the edge is pushed (in h / slp units)
      width: 0.15,   // radius of the noise zone around each toggled edge
      maskHMin: 0,
      maskHMax: 0,
      maskSMin: 0,
      maskSMax: 0
    };
  }
  // Backfill: older saves used scale as raw frequency + soft instead of width.
  if (layer.edgeNoise) {
    if (layer.edgeNoise.scale != null && layer.edgeNoise.scale > 0 && layer.edgeNoise.scale < 1) {
      // Heuristic: anything in (0,1) is almost certainly the old linear scale —
      // convert to log10 so old configs still feel roughly right.
      layer.edgeNoise.scale = Math.log10(layer.edgeNoise.scale);
    }
    if (layer.edgeNoise.width == null) {
      layer.edgeNoise.width = layer.edgeNoise.soft != null ? Math.max(layer.edgeNoise.soft * 2, 0.05) : 0.15;
    }
    if (layer.edgeNoise.maskHMin == null) layer.edgeNoise.maskHMin = 0;
    if (layer.edgeNoise.maskHMax == null) layer.edgeNoise.maskHMax = 0;
    if (layer.edgeNoise.maskSMin == null) layer.edgeNoise.maskSMin = 0;
    if (layer.edgeNoise.maskSMax == null) layer.edgeNoise.maskSMax = 0;
  }
  if (!layer.gradient) {
    layer.gradient = {
      enabled: 0,
      strength: 1.0,
      stops: [
        { pos: 0.0, color: [1, 1, 1] },
        { pos: 1.0, color: [1, 1, 1] }
      ]
    };
  }
  if (!layer.slopeGradient) {
    layer.slopeGradient = {
      enabled: 0,
      strength: 1.0,
      stops: [
        { pos: 0.0, color: [1, 1, 1] },
        { pos: 1.0, color: [1, 1, 1] }
      ]
    };
  }
  return layer;
}

// Convert [r,g,b] in 0..1 to "#rrggbb" for <input type="color">.
function rgbToHex(c) {
  const to = v => Math.max(0, Math.min(255, Math.round(v * 255)))
    .toString(16).padStart(2, '0');
  return `#${to(c[0])}${to(c[1])}${to(c[2])}`;
}
function hexToRgb(hex) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if (!m) return [1, 1, 1];
  return [parseInt(m[1], 16) / 255, parseInt(m[2], 16) / 255, parseInt(m[3], 16) / 255];
}

// Generate the CSS linear-gradient string used for the preview bar.
function gradientCssFromStops(stops) {
  if (!stops || stops.length === 0) return '#000';
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  const parts = sorted.map(s => `${rgbToHex(s.color)} ${(s.pos * 100).toFixed(1)}%`);
  return `linear-gradient(to right, ${parts.join(', ')})`;
}

          <span class="val">${layer.slopeGradient.strength.toFixed(2)}</span>
        </div>
        <div class="gradient-bar" data-sgrad-bar></div>
        <div data-sgrad-stops></div>
        <button class="gradient-add-stop" data-sgrad-add>+ Add stop</button>
      </div>
    `;
    layerList.appendChild(card);

    // Material change → rebuild shader
    card.querySelector('select').addEventListener('change', e => {
      layer.material = e.target.value;
      rebuildMaterial();
    });

    // Fixed toggle → the layer reads pre-crater height in the shader so
    // explosions can't grow new coverage inside a fresh crater. Needs a
    // shader rebuild since the height variable is swapped at string-gen
    // time (no branch on the hot path).
    const fixBtn = card.querySelector('.layer-fix');
    fixBtn.addEventListener('click', () => {
      layer.fixed = !layer.fixed;
      fixBtn.classList.toggle('on', layer.fixed);
      fixBtn.textContent = layer.fixed ? 'FIX' : 'fix';
      rebuildMaterial();
    });

    // Visibility toggle → flip layer.visible and zero the strength uniform
    // when off. Live-updated, no shader rebuild — the layer block stays
    // compiled in but its weight collapses to 0 so it costs the same as a
    // zero-strength layer (the early-out `w > 0.01` skip path).
    const visBtn = card.querySelector('.layer-vis');
    visBtn.addEventListener('click', () => {
      layer.visible = !(layer.visible !== false);
      visBtn.classList.toggle('off', layer.visible === false);
      visBtn.textContent = layer.visible === false ? 'OFF' : 'ON';
      card.classList.toggle('hidden-layer', layer.visible === false);
      currentMat.uniforms[`strengthLayer${idx}`].value =
        layer.visible === false ? 0.0 : layer.strength;
    });

    // Delete button → remove layer + rebuild shader
    card.querySelector('.layer-del').addEventListener('click', () => {
      STATE.layers.splice(idx, 1);
      rebuildMaterial();
      renderLayerPanel();
    });

    // Sliders: update STATE + uniforms live (no shader rebuild needed).
    // Gradient controls live inside .gradient-editor and are wired separately
    // — we exclude them here so the layer-mask fallback branch doesn't fire.
    card.querySelectorAll('.layer-slider > input[type="range"][data-k]').forEach(input => {
      input.addEventListener('input', e => {
        const key = e.target.dataset.k;
        const val = parseFloat(e.target.value);
        layer[key] = val;
        e.target.parentElement.querySelector('.val').textContent = val.toFixed(2);
        // Push live to uniform
        const u = currentMat.uniforms;
        if (key === 'soft')              u[`softLayer${idx}`].value = val;
        else if (key === 'strength')     u[`strengthLayer${idx}`].value = layer.visible === false ? 0.0 : val;
        else if (key === 'brightness')   u[`brightLayer${idx}`].value = val;
        else if (key === 'thickness')    u[`thickLayer${idx}`].value = val;
        else if (key === 'highlightWidth') u[`highlightWidthLayer${idx}`].value = val;
        else if (key === 'highlightSoft') u[`highlightSoftLayer${idx}`].value = val;
        else if (key === 'shadowStrength') u[`shadowLayer${idx}`].value = val;
        else if (key === 'shadowDist')   u[`shadowDistLayer${idx}`].value = val;
        else if (key === 'shadowBlur')   u[`shadowBlurLayer${idx}`].value = val;
        else {
          u[`uLayer${idx}`].value.set(layer.hMin, layer.hMax, layer.sMin, layer.sMax);
        }
      });
    });

    // Edge-noise editor wiring. All live-updated uniforms — no shader
    // rebuild needed. Scale slider value is the log10 exponent; the readout
    // shows the linearized frequency for legibility.
    const edgeEditor  = card.querySelector('[data-edge-noise-editor]');
    const edgeEnable  = edgeEditor.querySelector('[data-edge-enabled]');
    const edgeScale   = edgeEditor.querySelector('[data-edge-scale]');
    const edgeAmount  = edgeEditor.querySelector('[data-edge-amount]');
    const edgeWidth   = edgeEditor.querySelector('[data-edge-width]');

    edgeEnable.addEventListener('change', () => {
      layer.edgeNoise.enabled = edgeEnable.checked ? 1 : 0;
      currentMat.uniforms[`edgeNoiseEnabledLayer${idx}`].value = layer.edgeNoise.enabled;
    });

    edgeEditor.querySelectorAll('[data-edge-mask]').forEach(cb => {
      cb.addEventListener('change', () => {
        const which = cb.dataset.edgeMask; // HMin / HMax / SMin / SMax
        layer.edgeNoise[`mask${which}`] = cb.checked ? 1 : 0;
        currentMat.uniforms[`edgeMask${which}Layer${idx}`].value = cb.checked ? 1.0 : 0.0;
      });
    });

    edgeScale.addEventListener('input', () => {
      const v = parseFloat(edgeScale.value);
      layer.edgeNoise.scale = v;
      edgeScale.parentElement.querySelector('.val').textContent = Math.pow(10, v).toPrecision(2);
      currentMat.uniforms[`edgeNoiseScaleLayer${idx}`].value = v;
    });
    edgeAmount.addEventListener('input', () => {
      const v = parseFloat(edgeAmount.value);
      layer.edgeNoise.amount = v;
      edgeAmount.parentElement.querySelector('.val').textContent = v.toFixed(2);
      currentMat.uniforms[`edgeNoiseAmountLayer${idx}`].value = v;
    });
    edgeWidth.addEventListener('input', () => {
      const v = parseFloat(edgeWidth.value);
      layer.edgeNoise.width = v;
      edgeWidth.parentElement.querySelector('.val').textContent = v.toFixed(2);
      currentMat.uniforms[`edgeNoiseWidthLayer${idx}`].value = v;
    });

    // Gradient editor wiring. Generic — used for both the height-tint and
    // slope-tint editors. The selectors arg names the data-* attribute prefix
    // so a single function can find both editors' DOM hooks.
    function wireGradientEditor({ editorSel, barSel, stopsSel, addSel, enableSel, strengthSel, gradKey, kind }) {
      const editor   = card.querySelector(`[${editorSel}]`);
      const bar      = editor.querySelector(`[${barSel}]`);
      const stopsCt  = editor.querySelector(`[${stopsSel}]`);
      const addBtn   = editor.querySelector(`[${addSel}]`);
      const enableCb = editor.querySelector(`[${enableSel}]`);
      const strInp   = editor.querySelector(`[${strengthSel}]`);

      function refresh() {
        bar.style.background = gradientCssFromStops(layer[gradKey].stops);
        stopsCt.innerHTML = '';
        layer[gradKey].stops.forEach((stop, si) => {
          const row = document.createElement('div');
          row.className = 'gradient-stop-row';
          row.innerHTML = `
            <input type="color" value="${rgbToHex(stop.color)}">
            <input type="range" min="0" max="1" step="0.001" value="${stop.pos}">
            <span class="val">${stop.pos.toFixed(2)}</span>
            <button class="stop-del" title="Remove stop">✕</button>
          `;
          const colorInp = row.querySelector('input[type="color"]');
          const posInp   = row.querySelector('input[type="range"]');
          const posVal   = row.querySelector('.val');
          const delBtn   = row.querySelector('.stop-del');
          colorInp.addEventListener('input', () => {
            stop.color = hexToRgb(colorInp.value);
            bar.style.background = gradientCssFromStops(layer[gradKey].stops);
            pushGradientUniforms(idx, kind);
          });
          posInp.addEventListener('input', () => {
            stop.pos = parseFloat(posInp.value);
            posVal.textContent = stop.pos.toFixed(2);
            bar.style.background = gradientCssFromStops(layer[gradKey].stops);
            pushGradientUniforms(idx, kind);
          });
          delBtn.addEventListener('click', () => {
            if (layer[gradKey].stops.length <= 2) return;
            layer[gradKey].stops.splice(si, 1);
            refresh();
            pushGradientUniforms(idx, kind);
          });
          stopsCt.appendChild(row);
        });
        addBtn.disabled = layer[gradKey].stops.length >= 8;
      }

      enableCb.addEventListener('change', () => {
        layer[gradKey].enabled = enableCb.checked ? 1 : 0;
        pushGradientUniforms(idx, kind);
      });
      strInp.addEventListener('input', () => {
        const v = parseFloat(strInp.value);
        layer[gradKey].strength = v;
        strInp.parentElement.querySelector('.val').textContent = v.toFixed(2);
        pushGradientUniforms(idx, kind);
      });
      addBtn.addEventListener('click', () => {
        if (layer[gradKey].stops.length >= 8) return;
        // Insert a new stop at the midpoint of the largest gap between existing
        // stops, picking a color that interpolates between its neighbours — this
        // matches how Photoshop adds stops (appears where you'd expect, no jump).
        const sorted = [...layer[gradKey].stops].sort((a, b) => a.pos - b.pos);
        let bestGap = 0, bestPos = 0.5, left = sorted[0], right = sorted[sorted.length - 1];
        for (let i = 0; i < sorted.length - 1; i++) {
          const gap = sorted[i + 1].pos - sorted[i].pos;
          if (gap > bestGap) { bestGap = gap; bestPos = (sorted[i].pos + sorted[i + 1].pos) * 0.5; left = sorted[i]; right = sorted[i + 1]; }
        }
        const t = (bestPos - left.pos) / Math.max(right.pos - left.pos, 1e-5);
        const color = [
          left.color[0] + (right.color[0] - left.color[0]) * t,
          left.color[1] + (right.color[1] - left.color[1]) * t,
          left.color[2] + (right.color[2] - left.color[2]) * t
        ];
        layer[gradKey].stops.push({ pos: bestPos, color });
        refresh();
        pushGradientUniforms(idx, kind);
      });

      refresh();
    }

    wireGradientEditor({
      editorSel: 'data-gradient-editor',
      barSel:    'data-grad-bar',
      stopsSel:  'data-grad-stops',
      addSel:    'data-grad-add',
      enableSel: 'data-grad-enabled',
      strengthSel: 'data-grad-strength',
      gradKey:   'gradient',
      kind:      'height'
    });
    wireGradientEditor({
      editorSel: 'data-slope-gradient-editor',
      barSel:    'data-sgrad-bar',
      stopsSel:  'data-sgrad-stops',
      addSel:    'data-sgrad-add',
      enableSel: 'data-sgrad-enabled',
      strengthSel: 'data-sgrad-strength',
      gradKey:   'slopeGradient',
      kind:      'slope'
    });
  });
}

function addAutoLayer() {
  if (STATE.layers.length >= MAX_LAYERS) return;
  STATE.layers.push({
    id: STATE.nextLayerId++,
    material: 'grass',
    hMin: 0.0, hMax: 1.0, sMin: 0.0, sMax: 1.0,
    soft: 0.1, strength: 1.0, brightness: 1.0,
    thickness: 0.0, shadowStrength: 0.0, shadowDist: 0.02, shadowBlur: 0.01,
    edgeNoise: {
      enabled: 0, scale: -1.0, amount: 0.08, width: 0.15,
      maskHMin: 0, maskHMax: 0, maskSMin: 0, maskSMax: 0
    },
    gradient: {
      enabled: 0,
      strength: 1.0,
      stops: [
        { pos: 0.0, color: [1, 1, 1] },
        { pos: 1.0, color: [1, 1, 1] }
      ]
    },
    slopeGradient: {
      enabled: 0,
      strength: 1.0,
      stops: [
        { pos: 0.0, color: [1, 1, 1] },
        { pos: 1.0, color: [1, 1, 1] }
      ]
    }
  });
  rebuildMaterial();
  renderLayerPanel();
}
document.getElementById('btn-add-layer').addEventListener('click', addAutoLayer);

document.getElementById('btn-biplanar').addEventListener('click', () => {
  STATE.biplanar = !STATE.biplanar;
  // The button reports the TRIPLANAR state (the non-default mode), so it
  // reads as "TRIPLANAR: ON" when the user has opted out of the biplanar
  // default. biplanar=true → triplanar OFF; biplanar=false → triplanar ON.
  document.getElementById('btn-biplanar').textContent =
    `TRIPLANAR: ${STATE.biplanar ? 'OFF' : 'ON'}`;
  rebuildMaterial();
});

document.getElementById('btn-sharpen-blend').addEventListener('click', () => {
  STATE.sharpenBlend = !STATE.sharpenBlend;
  document.getElementById('btn-sharpen-blend').textContent =
    `SHARPEN BLEND: ${STATE.sharpenBlend ? 'ON' : 'OFF'}`;
  rebuildMaterial();
});
renderLayerPanel();

// ═══════════════════════════════════════════════════════════════════════
//  MATERIALS PANEL — per-material tunables with texture preview
// ═══════════════════════════════════════════════════════════════════════
// Each card shows the color map as a thumbnail and exposes:
//   tint (color picker), brightness, rough mult, normal strength,
//   specular, uv scale, uv rotation
// All writes go straight to the material's shared uniforms so the change
// is live without a shader rebuild.
const matList = document.getElementById('mat-list');

function rgbToHex(rgb) {
  const clamp = v => Math.max(0, Math.min(255, Math.round(v * 255)));
  const toHex = v => clamp(v).toString(16).padStart(2, '0');
  return '#' + toHex(rgb[0]) + toHex(rgb[1]) + toHex(rgb[2]);
}
function hexToRgb(hex) {
  const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if (!m) return [1, 1, 1];
  return [parseInt(m[1], 16) / 255, parseInt(m[2], 16) / 255, parseInt(m[3], 16) / 255];
}

function ensureMatUniforms(id) {
  // Creates the shared _uniforms object if it doesn't exist yet. Needed for
  // materials that haven't been referenced by any layer and so haven't been
  // through buildUniformsForState yet.
  const m = MATERIAL_LIBRARY[id];
  if (m._uniforms) return m._uniforms;
  m._uniforms = {
    UvScale:    { value: m.uvScale },
    UvRot:      { value: m.uvRotation },
    Bright:     { value: m.brightness },
    Tint:       { value: new THREE.Vector3(...m.tint) },
    Roughness:  { value: m.roughness },
    NormalStr:  { value: m.normalStrength },
    Spec:       { value: m.specular }
  };
  return m._uniforms;
}

function renderMaterialsPanel() {
  matList.innerHTML = '';
  for (const [id, m] of Object.entries(MATERIAL_LIBRARY)) {
    ensureMatUniforms(id);
    const card = document.createElement('div');
    card.className = 'mat-card';
    const tintHex = rgbToHex(m.tint);
    card.innerHTML = `
      <div class="mat-head">
        <div class="mat-preview" style="background-image:url('${m.color}')"></div>
        <div>
          <div class="mat-title">${m.label}</div>
          <div class="mat-sub">${id}</div>
        </div>
      </div>
      <div class="layer-slider">
        <label>Tint</label>
        <input type="color" data-k="tint" value="${tintHex}">
      </div>
      <div class="layer-slider">
        <label>Bright</label>
        <input type="range" min="0" max="2" step="0.01" value="${m.brightness}" data-k="brightness">
        <span class="val">${m.brightness.toFixed(2)}</span>
      </div>
      <div class="layer-slider">
        <label>Roughness</label>
        <input type="range" min="0" max="1" step="0.01" value="${m.roughness}" data-k="roughness">
        <span class="val">${m.roughness.toFixed(2)}</span>
      </div>
      <div class="layer-slider">
        <label>Normal str</label>
        <input type="range" min="0" max="2" step="0.01" value="${m.normalStrength}" data-k="normalStrength">
        <span class="val">${m.normalStrength.toFixed(2)}</span>
      </div>
      <div class="layer-slider">
        <label>Specular</label>
        <input type="range" min="0" max="3" step="0.01" value="${m.specular}" data-k="specular">
        <span class="val">${m.specular.toFixed(2)}</span>
      </div>
      <div class="layer-slider">
        <label>UV scale</label>
        <input type="range" min="0.1" max="5" step="0.01" value="${m.uvScale}" data-k="uvScale">
        <span class="val">${m.uvScale.toFixed(2)}</span>
      </div>
      <div class="layer-slider">
        <label>UV rot</label>
        <input type="range" min="0" max="6.2832" step="0.01" value="${m.uvRotation}" data-k="uvRotation">
        <span class="val">${m.uvRotation.toFixed(2)}</span>
      </div>
      <div class="layer-slider" title="Mikkelsen stochastic hex-tiling: replaces each axis-tap with 3 randomly-offset taps blended on a triangular grid. Kills visible texture repetition at 3× the per-axis tap cost. Use sparingly (1-2 dominant materials) — heavy.">
        <label>Hex Tile</label>
        <input type="checkbox" data-k="hexTile" ${m.hexTile ? 'checked' : ''} style="width:14px; height:14px; margin:0;">
      </div>
    `;
    matList.appendChild(card);

    // Color picker → tint vec3
    card.querySelector('input[type="color"]').addEventListener('input', e => {
      const rgb = hexToRgb(e.target.value);
      m.tint = rgb;
      m._uniforms.Tint.value.set(...rgb);
    });

    // Hex Tile checkbox → triggers shader rebuild (changes which sample
    // helper is emitted in matSampleFns).
    const hexBox = card.querySelector('input[type="checkbox"][data-k="hexTile"]');
    if (hexBox) {
      hexBox.addEventListener('change', e => {
        m.hexTile = e.target.checked;
        rebuildMaterial();
      });
    }

    // Range sliders → corresponding uniform
    card.querySelectorAll('input[type="range"]').forEach(input => {
      input.addEventListener('input', e => {
        const key = e.target.dataset.k;
        const val = parseFloat(e.target.value);
        m[key] = val;
        e.target.parentElement.querySelector('.val').textContent = val.toFixed(2);
        const u = m._uniforms;
        if      (key === 'brightness')     u.Bright.value    = val;
        else if (key === 'roughness')      u.Roughness.value = val;
        else if (key === 'normalStrength') u.NormalStr.value = val;
        else if (key === 'specular')       u.Spec.value      = val;
        else if (key === 'uvScale')        u.UvScale.value   = val;
        else if (key === 'uvRotation')     u.UvRot.value     = val;
      });
    });
  }
}
renderMaterialsPanel();

const matPanel = document.getElementById('hud-materials');
const matToggleBtn = document.getElementById('btn-toggle-materials');
matToggleBtn.addEventListener('click', () => {
  matPanel.classList.toggle('open');
  matToggleBtn.classList.toggle('active', matPanel.classList.contains('open'));
});

// Try to auto-restore the last config from localStorage. Must run after
// layerList + matList + renderMaterialsPanel are defined (TDZ).
try {
  const saved = localStorage.getItem(CONFIG_LS_KEY);
  if (saved) applyConfig(JSON.parse(saved));
} catch (err) { console.warn('Auto-restore failed:', err); }

// ═══════════════════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════════════════
let lastTime = performance.now();
let frameCount = 0;
let fps = 0;
// Rolling frame-time average so the number doesn't jitter every frame.
let frameTimeAccum = 0;
let frameTimeSamples = 0;
let avgFrameTimeMs = 0;

let _prevFrameMs = 0;
function animate(now) {
  requestAnimationFrame(animate);

  // dt in seconds, clamped so a tab-switch or hitch doesn't teleport debris
  // halfway across the map on the next frame.
  const dt = _prevFrameMs === 0 ? 0.016 : Math.min(0.05, (now - _prevFrameMs) / 1000);
  _prevFrameMs = now;

  frameCount++;
  if (now - lastTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastTime = now;
    document.getElementById('stat-fps').textContent = `FPS: ${fps}`;
    if (frameTimeSamples > 0) {
      avgFrameTimeMs = frameTimeAccum / frameTimeSamples;
      frameTimeAccum = 0;
      frameTimeSamples = 0;
      document.getElementById('stat-frametime').textContent =
        `FRAME: ${avgFrameTimeMs.toFixed(2)} ms`;
    }
    // Derived throughput: pixels on screen × taps/pixel = texels/frame.
    // This is the headline "how expensive is my shader" number.
    const w = renderer.domElement.width;
    const h = renderer.domElement.height;
    // Only terrain pixels actually run the heavy shader, but without a
    // depth pre-pass we treat the whole framebuffer as worst-case.
    const pixels = w * h;
    const texelsPerFrame = pixels * shaderStats.tapsPerPixel;
    document.getElementById('stat-pixels').textContent =
      `PIXELS: ${formatNum(pixels)} (${w}x${h})`;
    document.getElementById('stat-texels').textContent =
      `TEXELS/FR: ${formatNum(texelsPerFrame)}`;
    // Draw-call count straight from three.js
    const info = renderer.info.render;
    document.getElementById('stat-drawcalls').textContent =
      `DRAWS: ${info.calls}`;
  }

  sharedUniforms.uTime.value = now * 0.001;

  // Drive in-flight explosion animations and airborne debris chunks.
  updateActiveBlasts(dt);
  updateDebris(dt);
  updateFlashes(dt);
  updateDecals(dt);

  // Keep the sun pointing from uSunDir, scaled to sit outside the terrain.
  const sd = sharedUniforms.uSunDir.value;
  sunLight.position.set(sd.x * 60, sd.y * 60, sd.z * 60);
  sunLight.target.position.set(0, 0, 0);
  sunLight.target.updateMatrixWorld();

  // Advance the water shader time for animated ripples, and keep its sun
  // direction in sync with the global sun so the specular highlight matches
  // the terrain shading.
  if (water && water.visible) {
    water.material.uniforms.time.value += STATE.water.flowSpeed;
    if (water.material.uniforms.sunDirection) {
      water.material.uniforms.sunDirection.value.copy(sd).normalize();
    }
  }

  // Measure just the render call so we know the GPU-bound frame cost
  // (not the requestAnimationFrame idle time).
  const tStart = performance.now();
  renderer.render(scene, camera);
  frameTimeAccum += performance.now() - tStart;
  frameTimeSamples++;
}

// Sync shadow uniforms right before the terrain draws (after the shadow pass
// has already built the shadow map and updated sunLight.shadow.matrix).
terrain.onBeforeRender = function() {
  if (sunLight.shadow && sunLight.shadow.map) {
    sharedUniforms.uShadowMap.value = sunLight.shadow.map.texture;
    sharedUniforms.uShadowMatrix.value.copy(sunLight.shadow.matrix);
  }
};

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate(performance.now());
</script>
</body>
</html>
