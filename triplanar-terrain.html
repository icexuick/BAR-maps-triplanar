<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triplanar Terrain</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Outfit:wght@300;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e8;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  canvas { display: block; width: 100%; height: 100%; }

  .hud {
    position: fixed;
    z-index: 10;
    pointer-events: none;
  }

  .hud-top-left {
    top: 24px; left: 28px;
  }

  .hud-top-left h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 30px rgba(100, 200, 255, 0.3);
  }

  .hud-top-left .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: rgba(160, 200, 240, 0.6);
    margin-top: 4px;
    letter-spacing: 0.15em;
  }

  .hud-bottom-left {
    /* Anchored directly under the stats panel (top:90 + min-height ~280 +
       gap) and stretched down to the bottom — controls scroll inside. */
    top: 388px;
    bottom: 28px;
    left: 28px;
    width: 320px;
    pointer-events: all;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px 16px;
    background: rgba(10, 18, 32, 0.6);
    border: 1px solid rgba(100, 180, 255, 0.12);
    border-radius: 5px;
    backdrop-filter: blur(8px);
    box-sizing: border-box;
  }
  .hud-bottom-left::-webkit-scrollbar { width: 4px; }
  .hud-bottom-left::-webkit-scrollbar-track { background: transparent; }
  .hud-bottom-left::-webkit-scrollbar-thumb { background: rgba(100, 180, 255, 0.2); border-radius: 2px; }

  .controls {
    pointer-events: all;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .panel-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(200, 230, 255, 0.8);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(100, 180, 255, 0.15);
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .control-row label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(160, 200, 240, 0.65);
    min-width: 90px;
  }

  .control-row .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(180, 220, 255, 0.85);
    min-width: 42px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 120px;
    height: 3px;
    background: rgba(100, 180, 255, 0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(100, 200, 255, 0.7);
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 12px rgba(100, 200, 255, 0.4);
    cursor: grab;
  }

  .preset-btns {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }

  .preset-btn {
    pointer-events: all;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid rgba(100, 180, 255, 0.2);
    background: rgba(10, 15, 30, 0.7);
    color: rgba(160, 200, 240, 0.7);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
  }

  .preset-btn:hover {
    border-color: rgba(100, 200, 255, 0.5);
    color: #fff;
    background: rgba(30, 60, 100, 0.4);
    box-shadow: 0 0 20px rgba(100, 200, 255, 0.15);
  }

  .preset-btn.active {
    border-color: rgba(100, 200, 255, 0.6);
    color: #fff;
    background: rgba(40, 80, 140, 0.35);
  }

  .hud-bottom-right {
    bottom: 28px; right: 28px;
  }

  /* Stats panel lives top-left under the title, in its own boxed container
     so it doesn't collide with the layer panel on the right or the controls
     panel at the bottom. */
  .hud-stats {
    top: 90px; left: 28px;
    width: 320px;
    min-height: 240px;
    padding: 14px 16px;
    background: rgba(10, 18, 32, 0.6);
    border: 1px solid rgba(100, 180, 255, 0.12);
    border-radius: 5px;
    backdrop-filter: blur(8px);
    pointer-events: all;
    box-sizing: border-box;
  }

  .stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(160, 200, 240, 0.55);
    text-align: left;
    line-height: 1.7;
  }

  .group-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(100, 200, 255, 0.5);
    margin-top: 14px;
    margin-bottom: 2px;
    padding-bottom: 3px;
    border-bottom: 1px solid rgba(100, 180, 255, 0.08);
  }
  .group-title:first-child { margin-top: 0; }

  /* Layer panel (right side) */
  .hud-right {
    top: 24px; right: 28px;
    bottom: 90px;
    width: 340px;
    pointer-events: all;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
  }
  .hud-right::-webkit-scrollbar { width: 4px; }
  .hud-right::-webkit-scrollbar-track { background: transparent; }
  .hud-right::-webkit-scrollbar-thumb { background: rgba(100, 180, 255, 0.2); border-radius: 2px; }

  .layer-panel-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(200, 230, 255, 0.8);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(100, 180, 255, 0.15);
  }

  .layer-card {
    background: rgba(10, 18, 32, 0.6);
    border: 1px solid rgba(100, 180, 255, 0.12);
    border-radius: 5px;
    padding: 10px 12px;
    margin-bottom: 8px;
    backdrop-filter: blur(8px);
  }
  .layer-card.base { border-color: rgba(255, 200, 100, 0.25); }

  .layer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .layer-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(100, 180, 255, 0.15);
    color: rgba(180, 220, 255, 0.9);
  }
  .layer-card.base .layer-tag {
    background: rgba(255, 200, 100, 0.15);
    color: rgba(255, 220, 160, 0.9);
  }
  .layer-del {
    background: transparent;
    border: none;
    color: rgba(255, 120, 120, 0.5);
    font-size: 14px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .layer-del:hover { color: rgba(255, 120, 120, 1); }

  .layer-vis {
    background: transparent;
    border: 1px solid rgba(100, 180, 255, 0.25);
    border-radius: 3px;
    color: rgba(180, 220, 255, 0.85);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    cursor: pointer;
    margin-right: 6px;
  }
  .layer-vis:hover { border-color: rgba(100, 200, 255, 0.55); color: #fff; }
  .layer-vis.off {
    color: rgba(160, 200, 240, 0.35);
    border-color: rgba(100, 180, 255, 0.12);
    background: rgba(10, 20, 35, 0.5);
  }
  .layer-fix {
    background: transparent;
    border: 1px solid rgba(255, 200, 100, 0.25);
    border-radius: 3px;
    color: rgba(255, 220, 180, 0.45);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    cursor: pointer;
    margin-right: 6px;
  }
  .layer-fix:hover { border-color: rgba(255, 210, 130, 0.55); color: #fff; }
  .layer-fix.on {
    color: rgba(255, 230, 150, 1.0);
    border-color: rgba(255, 200, 100, 0.6);
    background: rgba(40, 28, 10, 0.5);
  }
  .layer-card.hidden-layer { opacity: 0.55; }
  .layer-card.hidden-layer .layer-tag { opacity: 0.5; }

  .layer-card select {
    width: 100%;
    padding: 5px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: rgba(10, 20, 35, 0.8);
    color: rgba(200, 230, 255, 0.9);
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 3px;
    outline: none;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .layer-card select:focus { border-color: rgba(100, 200, 255, 0.5); }

  .layer-slider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .layer-slider label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(160, 200, 240, 0.55);
    min-width: 70px;
  }
  .layer-slider input[type="range"] {
    flex: 1;
    width: auto;
  }
  .layer-slider .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: rgba(160, 200, 240, 0.6);
    min-width: 32px;
    text-align: right;
  }

  .add-layer-btn {
    width: 100%;
    margin-top: 6px;
    padding: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: rgba(10, 20, 35, 0.6);
    color: rgba(160, 200, 240, 0.7);
    border: 1px dashed rgba(100, 180, 255, 0.25);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .add-layer-btn:hover {
    background: rgba(30, 60, 100, 0.3);
    border-color: rgba(100, 200, 255, 0.5);
    color: #fff;
  }

  /* Height-gradient editor inside each auto-layer card */
  .gradient-editor {
    margin-top: 8px;
    padding: 8px;
    background: rgba(5, 15, 25, 0.5);
    border: 1px solid rgba(100, 180, 255, 0.12);
    border-radius: 4px;
  }
  .gradient-head {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .gradient-head label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(160, 200, 240, 0.55);
    flex: 1;
  }
  .gradient-head input[type="checkbox"] {
    accent-color: rgba(100, 200, 255, 0.8);
  }
  .gradient-bar {
    position: relative;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(100, 180, 255, 0.2);
    margin-bottom: 6px;
    background: #000;
  }
  .gradient-stop-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
  }
  .gradient-stop-row input[type="color"] {
    width: 22px;
    height: 18px;
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 2px;
    background: transparent;
    padding: 0;
    cursor: pointer;
  }
  .gradient-stop-row input[type="range"] {
    flex: 1;
    width: auto;
  }
  .gradient-stop-row .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: rgba(160, 200, 240, 0.6);
    min-width: 28px;
    text-align: right;
  }
  .gradient-stop-row .stop-del {
    width: 18px;
    height: 18px;
    line-height: 16px;
    text-align: center;
    background: transparent;
    color: rgba(200, 120, 120, 0.7);
    border: 1px solid rgba(200, 120, 120, 0.25);
    border-radius: 2px;
    font-size: 10px;
    cursor: pointer;
    padding: 0;
  }
  .gradient-stop-row .stop-del:hover {
    background: rgba(200, 120, 120, 0.2);
    color: #fff;
  }
  .gradient-add-stop {
    width: 100%;
    margin-top: 4px;
    padding: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(10, 20, 35, 0.6);
    color: rgba(160, 200, 240, 0.7);
    border: 1px dashed rgba(100, 180, 255, 0.2);
    border-radius: 3px;
    cursor: pointer;
  }
  .gradient-add-stop:hover:not(:disabled) {
    background: rgba(30, 60, 100, 0.3);
    border-color: rgba(100, 200, 255, 0.4);
    color: #fff;
  }
  .gradient-add-stop:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* Edge-noise: which of the 4 band edges the noise applies to */
  .edge-mask-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 8px;
    margin-bottom: 6px;
  }
  .edge-mask-row label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(160, 200, 240, 0.6);
    cursor: pointer;
  }
  .edge-mask-row input[type="checkbox"] {
    accent-color: rgba(100, 200, 255, 0.8);
  }

  /* Materials panel (sits left of the Layers panel) */
  .hud-materials {
    top: 24px; right: 380px;
    bottom: 90px;
    width: 320px;
    pointer-events: all;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
    display: none;
  }
  .hud-materials.open { display: block; }
  .hud-materials::-webkit-scrollbar { width: 4px; }
  .hud-materials::-webkit-scrollbar-track { background: transparent; }
  .hud-materials::-webkit-scrollbar-thumb { background: rgba(100, 180, 255, 0.2); border-radius: 2px; }

  .mat-card {
    background: rgba(10, 18, 32, 0.6);
    border: 1px solid rgba(100, 180, 255, 0.12);
    border-radius: 5px;
    padding: 10px 12px;
    margin-bottom: 8px;
    backdrop-filter: blur(8px);
  }
  .mat-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .mat-preview {
    width: 44px; height: 44px;
    border-radius: 4px;
    border: 1px solid rgba(100, 180, 255, 0.2);
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
  }
  .mat-title {
    flex: 1;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(200, 230, 255, 0.85);
  }
  .mat-card .mat-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: rgba(160, 200, 240, 0.5);
    margin-top: 2px;
  }
  .mat-card input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 32px; height: 18px;
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 3px;
    padding: 0;
    background: transparent;
    cursor: pointer;
  }
  .mat-card input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .mat-card input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

  .mat-toggle-btn {
    position: fixed;
    top: 24px; right: 380px;
    pointer-events: all;
    z-index: 11;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid rgba(100, 180, 255, 0.2);
    background: rgba(10, 15, 30, 0.7);
    color: rgba(160, 200, 240, 0.7);
    border-radius: 4px;
    cursor: pointer;
    backdrop-filter: blur(8px);
  }
  .mat-toggle-btn:hover {
    border-color: rgba(100, 200, 255, 0.5);
    color: #fff;
  }
  .mat-toggle-btn.active {
    border-color: rgba(100, 200, 255, 0.6);
    color: #fff;
    background: rgba(40, 80, 140, 0.35);
  }

  .corner-deco {
    position: fixed;
    width: 40px; height: 40px;
    border-color: rgba(100, 180, 255, 0.12);
    border-style: solid;
    z-index: 5;
  }
  .corner-tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  .scanline {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(100, 180, 255, 0.008) 2px,
      rgba(100, 180, 255, 0.008) 4px
    );
    pointer-events: none;
    z-index: 20;
  }
</style>
</head>
<body>

<div class="scanline"></div>
<div class="corner-deco corner-tl"></div>
<div class="corner-deco corner-tr"></div>
<div class="corner-deco corner-bl"></div>
<div class="corner-deco corner-br"></div>

<div id="canvas-container"></div>

<div class="hud hud-top-left">
  <h1>Triplanar Terrain</h1>
  <div class="subtitle">three.js &middot; glsl shader &middot; layered materials</div>
</div>

<div class="hud hud-bottom-left">
  <div class="panel-title">Controls</div>
  <div class="controls">
    <div class="group-title">Shader</div>
    <div class="control-row">
      <label>Texture Scale</label>
      <input type="range" id="texScale" min="0.5" max="8" step="0.1" value="2.5">
    </div>
    <div class="control-row">
      <label>Blend Sharp</label>
      <input type="range" id="blendSharp" min="0.5" max="8" step="0.1" value="2">
    </div>
    <div class="control-row" title="Frostbite-style height-based blending. Layer mask boundaries snap to the brighter texels (treated as 'higher') and away from darker ones, producing crisp interlocking transitions instead of muddy linear gradients. Zero extra texture taps. 0 = standard smoothstep, 1 = fully height-driven.">
      <label>Height Blend</label>
      <input type="range" id="heightBlend" min="0" max="1" step="0.01" value="0">
    </div>
    <div class="control-row">
      <label>Fog</label>
      <input type="range" id="fogDensity" min="0" max="0.03" step="0.0005" value="0.004">
    </div>

    <div class="group-title">Lighting</div>
    <div class="control-row">
      <label>Ambient</label>
      <input type="range" id="ambientStrength" min="0" max="1" step="0.01" value="0.35">
    </div>
    <div class="control-row">
      <label>Sun</label>
      <input type="range" id="sunStrength" min="0" max="2" step="0.01" value="1.15">
    </div>
    <div class="control-row">
      <label>Rim</label>
      <input type="range" id="rimStrength" min="0" max="1" step="0.01" value="0">
    </div>
    <div class="control-row">
      <label>Specular</label>
      <input type="range" id="specular" min="0" max="1" step="0.01" value="0.12">
    </div>
    <div class="control-row">
      <label>Sun X</label>
      <input type="range" id="sunX" min="-1" max="1" step="0.01" value="0.6">
    </div>
    <div class="control-row">
      <label>Sun Y</label>
      <input type="range" id="sunY" min="0.1" max="1" step="0.01" value="0.8">
    </div>
    <div class="control-row">
      <label>Sun Z</label>
      <input type="range" id="sunZ" min="-1" max="1" step="0.01" value="0.3">
    </div>
    <div class="control-row">
      <label>Shadow Bias</label>
      <input type="range" id="shadowBias" min="0" max="0.001" step="0.00001" value="0.00005">
    </div>
    <div class="control-row">
      <label>Shadow N-Bias</label>
      <input type="range" id="shadowNormalBias" min="0" max="0.3" step="0.001" value="0.04">
    </div>
    <div class="control-row">
      <label>Shadow Soft</label>
      <input type="range" id="shadowSoftness" min="0.5" max="8" step="0.1" value="2.5">
    </div>
    <div class="control-row">
      <label>Shadows</label>
      <input type="range" id="shadowEnabled" min="0" max="1" step="1" value="1">
    </div>

    <div class="group-title">Heightmap</div>
    <div class="control-row">
      <label>Proc Height</label>
      <input type="range" id="displacement" min="0" max="6" step="0.1" value="2.8">
    </div>
    <div class="control-row">
      <label>Height Scale</label>
      <input type="range" id="heightScale" min="0" max="20" step="0.1" value="4.0">
    </div>
    <div class="control-row">
      <label>World Size</label>
      <input type="range" id="worldSize" min="6" max="40" step="0.5" value="18">
    </div>
    <div class="control-row">
      <label>FOV</label>

<!-- UPNG.js: decodes 8- and 16-bit PNGs to raw bytes, so we can feed real
     16-bit heightmaps into a DataTexture without losing precision to the
     browser's 8-bit canvas path. pako is a dependency for zlib inflate. -->

<script>
// ═══════════════════════════════════════════════════════════════════════
//  MATERIAL LIBRARY
// ═══════════════════════════════════════════════════════════════════════
// To add a new material:
//   1. Drop a new ambientCG 1K-JPG set in ./textures/<id>/
//   2. Add an entry below with its color/normal/rough file paths.
//   3. Refresh the page. It shows up in every layer dropdown.
//
// Per-material tunables (all live-editable from the Materials panel):
//   uvScale         texture repeat scale (larger = more tiling)
//   uvRotation      radians, rotates UVs in all three triplanar axes
//   brightness      multiplies albedo
//   tint            vec3 rgb multiplier on albedo (1,1,1 = neutral)
//   roughness       flat scalar 0..1 (0 = mirror, 1 = chalk); no texture lookup
//   normalStrength  0 = flat, 1 = full normal map
//   specular        per-material spec multiplier on top of global Specular
const MATERIAL_LIBRARY = {
  rock: {
    label: 'Rock (red planet base)',
    color:  'textures/rock/Rock030_1K-JPG_Color.jpg',
    normal: 'textures/rock/Rock030_1K-JPG_NormalGL.jpg',
    uvScale: 1.0, uvRotation: 0.0,
    brightness: 1.0, tint: [1, 1, 1],
    roughness: 0.85, normalStrength: 1.0, specular: 1.0
  },
  cliff: {
    label: 'Cliff (sharp rock)',
    color:  'textures/cliff/Rock048_1K-JPG_Color.jpg',
    normal: 'textures/cliff/Rock048_1K-JPG_NormalGL.jpg',
    uvScale: 1.1, uvRotation: 0.0,
    brightness: 1.0, tint: [1, 1, 1],
    roughness: 0.80, normalStrength: 1.0, specular: 1.0
  },
  grass: {
    label: 'Grass',
    color:  'textures/grass/Grass004_1K-JPG_Color.jpg',
    normal: 'textures/grass/Grass004_1K-JPG_NormalGL.jpg',
    uvScale: 1.3, uvRotation: 0.0,
    brightness: 1.0, tint: [1, 1, 1],
    roughness: 0.90, normalStrength: 1.0, specular: 1.0
  },
  sand: {
    label: 'Sand / dirt',
    color:  'textures/sand/Ground093B_1K-JPG_Color.jpg',
    normal: 'textures/sand/Ground093B_1K-JPG_NormalGL.jpg',
    uvScale: 1.2, uvRotation: 0.0,
    brightness: 1.0, tint: [1, 1, 1],
    roughness: 0.95, normalStrength: 1.0, specular: 1.0
  },
  snow: {
    label: 'Snow',
    color:  'textures/snow/Snow006_1K-JPG_Color.jpg',
    normal: 'textures/snow/Snow006_1K-JPG_NormalGL.jpg',
    uvScale: 0.7, uvRotation: 0.0,
    brightness: 1.0, tint: [1, 1, 1],
    roughness: 0.60, normalStrength: 1.0, specular: 1.0
  },
  damage: {
    label: 'Damage / scorched',
    color:  'textures/rock/Rock030_1K-JPG_Color.jpg',
    normal: 'textures/rock/Rock030_1K-JPG_NormalGL.jpg',
    uvScale: 1.8, uvRotation: 0.0,
    brightness: 0.35, tint: [0.55, 0.40, 0.32],
    roughness: 0.95, normalStrength: 1.3, specular: 0.3
  }
};

// ═══════════════════════════════════════════════════════════════════════
//  STATE — base material + ordered stack of auto-layers
// ═══════════════════════════════════════════════════════════════════════
// Each auto-layer has a rule that produces a weight in [0..1]:
//   weight = heightMask(vHeight01) * slopeMask(slope) * strength
// Layers are applied in order from top to bottom; later layers blend
// on top of earlier ones. Base is always at 100%.
const STATE = {
  baseLayer: { material: 'rock', brightness: 1.0 },
  layers: [
    // id, material, height range, slope range, softness, strength, brightness,
    // thickness (fake ledge height, world units, 0 = flat), shadowStrength (drop shadow darkness 0..1)
    { id: 1, material: 'sand',  hMin: 0.00, hMax: 0.20, sMin: 0.00, sMax: 1.00, soft: 0.10, strength: 1.0, brightness: 1.0, thickness: 0.0, shadowStrength: 0.0, shadowDist: 0.02, shadowBlur: 0.01, fixed: false},
    { id: 3, material: 'cliff', hMin: 0.00, hMax: 1.00, sMin: 0.45, sMax: 1.00, soft: 0.15, strength: 1.0, brightness: 1.0, thickness: 0.0, shadowStrength: 0.0, shadowDist: 0.02, shadowBlur: 0.01, fixed: false},
    { id: 2, material: 'grass', hMin: 0.10, hMax: 0.70, sMin: 0.00, sMax: 0.40, soft: 0.15, strength: 1.0, brightness: 1.0, thickness: 0.0, shadowStrength: 0.0, shadowDist: 0.02, shadowBlur: 0.01, fixed: true},
    { id: 4, material: 'snow',  hMin: 0.75, hMax: 1.00, sMin: 0.00, sMax: 0.35, soft: 0.10, strength: 1.0, brightness: 1.0, thickness: 0.0, shadowStrength: 0.0, shadowDist: 0.02, shadowBlur: 0.01, fixed: false}
  ],
  nextLayerId: 5,
  biplanar: true,         // biplanar (top-2 axes) is the default — see RECOIL-ENGINE-PROPOSAL.md §2; toggle TRIPLANAR ON to fall back to the 3-axis variant for comparison
  sharpenBlend: false,    // Primozic squared-weights tweak: extra w*=w + renormalize after the standard pow, sharper transitions on cliffs at zero tap cost
  heightBlend: 0.0,       // global strength of luma-driven height blending (Frostbite-style) on layer mask boundaries — 0 = disabled (smoothstep only), 1 = full
  sediment: {             // CPU-baked talus/scree mask: detects pixels at the foot of steep cliffs (high neighbours within sample radius) and outputs a [0,1] mask
    enabled: false,
    radius: 8,            // sample ring radius in heightmap pixels — larger = sediment reaches further from cliffs
    threshold: 0.02,      // minimum height delta (in normalized [0,1] heightmap units) to count a neighbour as "above me"
    strength: 1.0,        // master multiplier on the output mask
    slopeFade: 1.0,       // 0 = ignore my own slope, 1 = sediment only on flat ground
    debugTint: 1.0,       // 0 = no visualisation, 1 = full red tint where sediment is — debug only, drives a sediment-coloured overlay so you can see where the mask fires
  },
  worldSize: 18,          // max dimension of terrain in scene units
  heightmapAspect: 1.0,   // width / height of loaded heightmap
  // Auto height normalization from heightmap CPU analysis.
  // vHeight in the shader is in world units, this maps to 0..1.
  heightMinWorld: 0.0,
  heightMaxWorld: 1.0,
  water: {
    enabled: false,
    height: 0.0,            // world Y of the water plane
    distortionScale: 3.0,
    sizeMultiplier: 3.0,    // ripple frequency multiplier (Water shader uniform)
    alpha: 0.6,
    flowSpeed: 0.002,       // per-frame increment of the time uniform
    color: '#10424c',       // base water tint
    sunColor: '#333333'     // sun specular tint
  },
  explosions: {
    enabled: true,          // click-to-explode while this is on
    radius: 1.0,            // world-space crater radius
    depth: 0.20,            // world-unit peak depth of a single crater (accumulated additively)
    depthFalloff: 1.0,      // exponent on the crater profile (>1 = wider flat floor + steeper rim, <1 = softer cone)
    rimHeight: 0.35,        // raised rim as fraction of crater depth (0 = pure dent, 0.5 = prominent ring of upthrust)
    scorchBoost: 0.66,      // scorch radius as fraction of crater radius
    scorchFalloff: 1.0,     // exponent on the scorch falloff curve (>1 = sharper edge)
    scorchSpikes: 0.65,     // 0 = round scorch, 1 = strong radial rays/spikes (crater stays round either way)
    scorchEnabled: true,    // paint the dark damage material on top of the scorched footprint
    decalEnabled: true,     // composite the BAR ground-crack decal on each blast
    decalGlow: 0.6,         // master glow multiplier for the decal _n alpha channel
    decalTint: 0.65,        // 0 = leave underlying ground albedo, 1 = full BAR-style 2× tint
    decalNormalStr: 0.6     // how much the decal _n RGB perturbs the terrain surface normal
  }
};

const MAX_LAYERS = 8;

// Maximum number of crater decals composited into the terrain shader at
// once. Each decal is two texture samples + a fast AABB reject per
// pixel; pixels outside every decal's footprint hit only the cheap
// reject path, so this budget scales with on-screen decal coverage
// (similar to a deferred decal pass) rather than total count. Older
// decals get recycled when the buffer fills.
const MAX_DECALS = 128;

// ═══════════════════════════════════════════════════════════════════════
//  VERTEX SHADER — unchanged math, slope-normal scaled by world size
// ═══════════════════════════════════════════════════════════════════════
const vertexShader = `
  uniform float uTime;
  uniform float uDisplacement;
  uniform sampler2D uHeightmap;
  uniform float uUseHeightmap;
  uniform float uHeightScale;
  uniform vec2  uHeightmapTexel;  // 1.0 / (image width, image height)
  uniform float uWorldWidth;      // world-space width of terrain
  uniform float uWorldDepth;      // world-space depth of terrain

  // Explosion damage mask — R = scorch, G = crater depth (both 0..1)
  uniform sampler2D uDamageMask;
  uniform float     uDamageEnabled;
  uniform float     uDamageMaxDepth;

  // Crater depth in world units at a given UV (uv.x → +X, uv.y → -Z).
  float sampleCraterDepth(vec2 uv) {
    if (uDamageEnabled < 0.5) return 0.0;
    return texture2D(uDamageMask, uv).g * uDamageMaxDepth;
  }

  varying vec3 vWorldPos;
  varying vec3 vWorldNormal;
  varying vec3 vWorldNormalOriginal;  // pre-crater normal, for 'fixed' layers
  varying float vHeight;
  varying float vHeightOriginal;  // pre-crater world-Y, for 'fixed' layers

  // ── Simplex noise (procedural fallback) ──
  vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

  float snoise(vec3 v) {
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
        i.z + vec4(0.0, i1.z, i2.z, 1.0))
      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }

  float fbm(vec3 p) {
    float v = 0.0;
    float a = 0.5;
    vec3 shift = vec3(100.0);
    for (int i = 0; i < 6; i++) {
      v += a * snoise(p);
      p = p * 2.0 + shift;
      a *= 0.5;
    }
    return v;
  }

  float sampleHeight(vec2 puv, vec3 objPos) {
    if (uUseHeightmap > 0.5) {
      return texture2D(uHeightmap, puv).r * uHeightScale;
    }
    float n  = fbm(objPos.xzy * 0.3 + uTime * 0.02);
    float n2 = fbm(objPos.xzy * 0.8 + 50.0);
    return (n * 0.7 + n2 * 0.3) * uDisplacement;
  }

  void main() {
    vec3 pos = position;
    float heightOriginal = sampleHeight(uv, pos);
    // Subtract crater depth at this UV so the vertex sinks into the explosion pit.
    float height = heightOriginal - sampleCraterDepth(uv);
    pos += normal * height;
    vHeight = height;
    vHeightOriginal = heightOriginal;

    vec4 worldPos = modelMatrix * vec4(pos, 1.0);
    vWorldPos = worldPos.xyz;

    // Finite-difference normal in world space.
    //
    // Orientation: after PlaneGeometry(...).rotateX(-π/2), the UV→world
    // mapping is uv.x → +X and uv.y → -Z. So the "U" neighbor (uv + dv in
    // +uv.y) sits at a SMALLER world Z than the current point. The tangent
    // along world Z therefore runs in -Z with the height delta coming from
    // (hU - hD). Without this sign fix the finite-difference normal gets
    // mirrored across the X axis, which rotates all lighting 180° in the
    // horizontal plane (sun-from-north lights up south-facing walls, etc).
    float dx = 2.0 * uHeightmapTexel.x * uWorldWidth;
    float dz = 2.0 * uHeightmapTexel.y * uWorldDepth;
    // Pre-crater neighbour heights (hL0/hR0/hD0/hU0) are used to build the
    // ORIGINAL normal, so 'fixed' layers see the untouched slope. The crater
    // deltas are then subtracted into hL/hR/hD/hU for the displaced normal.
    float hL0, hR0, hD0, hU0;
    if (uUseHeightmap > 0.5) {
      hL0 = texture2D(uHeightmap, uv - vec2(uHeightmapTexel.x, 0.0)).r * uHeightScale;
      hR0 = texture2D(uHeightmap, uv + vec2(uHeightmapTexel.x, 0.0)).r * uHeightScale;
      hD0 = texture2D(uHeightmap, uv - vec2(0.0, uHeightmapTexel.y)).r * uHeightScale;
      hU0 = texture2D(uHeightmap, uv + vec2(0.0, uHeightmapTexel.y)).r * uHeightScale;
    } else {
      // For the procedural branch, probe fbm at world-XZ offsets around the
      // current point. Reconstruct world XZ from uv (uv.y → -Z).
      vec2 wXZ = vec2((uv.x - 0.5) * uWorldWidth,
                      -(uv.y - 0.5) * uWorldDepth);
      vec3 oL = vec3(wXZ.x - 0.5 * dx, 0.0, wXZ.y);
      vec3 oR = vec3(wXZ.x + 0.5 * dx, 0.0, wXZ.y);
      vec3 oD = vec3(wXZ.x, 0.0, wXZ.y + 0.5 * dz); // uv.y - dv → world +Z
      vec3 oU = vec3(wXZ.x, 0.0, wXZ.y - 0.5 * dz); // uv.y + dv → world -Z
      hL0 = (fbm(oL.xzy * 0.3 + uTime * 0.02) * 0.7 + fbm(oL.xzy * 0.8 + 50.0) * 0.3) * uDisplacement;
      hR0 = (fbm(oR.xzy * 0.3 + uTime * 0.02) * 0.7 + fbm(oR.xzy * 0.8 + 50.0) * 0.3) * uDisplacement;
      hD0 = (fbm(oD.xzy * 0.3 + uTime * 0.02) * 0.7 + fbm(oD.xzy * 0.8 + 50.0) * 0.3) * uDisplacement;
      hU0 = (fbm(oU.xzy * 0.3 + uTime * 0.02) * 0.7 + fbm(oU.xzy * 0.8 + 50.0) * 0.3) * uDisplacement;
    }
    float hL = hL0 - sampleCraterDepth(uv - vec2(uHeightmapTexel.x, 0.0));
    float hR = hR0 - sampleCraterDepth(uv + vec2(uHeightmapTexel.x, 0.0));
    float hD = hD0 - sampleCraterDepth(uv - vec2(0.0, uHeightmapTexel.y));
    float hU = hU0 - sampleCraterDepth(uv + vec2(0.0, uHeightmapTexel.y));

    // +X tangent runs in +world-X with height slope hR-hL.
    // "U" neighbor is in -world-Z, so the Z-tangent runs in -Z.
    vec3 tangentX = vec3(dx, hR - hL, 0.0);
    vec3 tangentZ = vec3(0.0, hU - hD, -dz);
    // cross(tX, tZ) gives +Y up for a flat surface: (+X,0,0) × (0,0,-Z) = (0, X*Z, 0) ✓
    vWorldNormal = normalize(cross(tangentX, tangentZ));

    // Same cross for the pre-crater normal, so fixed layers get the original
    // slope at this point even after an explosion has flattened/steepened it.
    vec3 tangentX0 = vec3(dx, hR0 - hL0, 0.0);
    vec3 tangentZ0 = vec3(0.0, hU0 - hD0, -dz);
    vWorldNormalOriginal = normalize(cross(tangentX0, tangentZ0));

    gl_Position = projectionMatrix * viewMatrix * worldPos;
  }
`;

// ═══════════════════════════════════════════════════════════════════════
//  FRAGMENT SHADER BUILDER
// ═══════════════════════════════════════════════════════════════════════
// We regenerate the shader when the layer stack changes (new layer,
// removed layer, or a different material is picked in a dropdown).
// The generator emits:
//   - A sampler uniform trio per *unique* material used (dedupe across layers)
//   - A fetch block for each layer that early-outs on zero weight
function buildFragmentShader(state) {
  // Collect unique materials referenced by base + layers. The 'damage'
  // material is only compiled in when the scorch overlay is enabled —
  // skipping it saves a sampler trio + a triplanar tap set when the
  // user has the toggle off. The overlay block below also has to be
  // omitted to avoid referencing sample_damage when it isn't emitted.
  const scorchOn = state.explosions?.scorchEnabled !== false;
  const usedMats = new Set();
  usedMats.add(state.baseLayer.material);
  for (const l of state.layers) usedMats.add(l.material);
  if (scorchOn) usedMats.add('damage');
  const matList = [...usedMats];

  // Sampler + tunable uniforms per material
  const matUniforms = matList.map((m) => `
  uniform sampler2D u_${m}_Color;
  uniform sampler2D u_${m}_Normal;
  uniform float u_${m}_UvScale;
  uniform float u_${m}_UvRot;
  uniform float u_${m}_Bright;
  uniform vec3  u_${m}_Tint;
  uniform float u_${m}_Roughness;
  uniform float u_${m}_NormalStr;
  uniform float u_${m}_Spec;`).join('\n');

  // For each material, a sampling block that returns albedo/normal/roughness.
  // Rotation is applied via a mat2 built from u_<m>_UvRot, and the per-material
  // uvScale stacks with the global texScale. Roughness is a flat scalar
  // uniform — no texture sampler — so we stay under the 16-texture-unit
  // limit when the full 5-material stack is active.
  // Per-material sample function. The HEX TILE flag (per-material toggle on
  // the Materials panel) selects between the standard 1-tap-per-axis
  // triplanar/biplanar samplers and the 3-tap-per-axis hex-tile variants
  // that hide visible texture repetition. Compile-time gated, so the cost
  // is paid only by materials that opt in.
  const matSampleFns = matList.map((m) => {
    const def = MATERIAL_LIBRARY[m];
    const useHex = def && def.hexTile === true;
    const albFn = useHex ? 'triplanarAlbedoHex' : 'triplanarAlbedo';
    const nrmFn = useHex ? 'triplanarNormalHex' : 'triplanarNormal';
    return `
  void sample_${m}(vec3 wp, vec3 n, vec3 bw, float texScale,
                   out vec3 alb, out vec3 nrm, out float rgh, out float spc) {
    float s = texScale * u_${m}_UvScale;
    float c = cos(u_${m}_UvRot);
    float sn = sin(u_${m}_UvRot);
    mat2 rot = mat2(c, -sn, sn, c);
    alb = ${albFn}(u_${m}_Color, wp, bw, s, rot) * u_${m}_Tint * u_${m}_Bright;
    vec3 mnrm = ${nrmFn}(u_${m}_Normal, wp, n, bw, s, rot);
    nrm = normalize(mix(n, mnrm, u_${m}_NormalStr));
    rgh = clamp(u_${m}_Roughness, 0.0, 1.0);
    spc = u_${m}_Spec;
  }`;
  }).join('\n');

  // GLSL snippet that applies a per-layer gradient tint to `la` (the freshly-
  // sampled material albedo). One helper, parameterized by:
  //   prefix    - "grad" (height) or "slopeGrad" (slope)
  //   axisExpr  - GLSL expression for the value to evaluate (h, slp, …)
  //   tagBase   - short scope tag so the inlined block doesn't shadow vars
  //               from a previous gradient block in the same scope
  // Stop positions are in ABSOLUTE axis space (0..1), so a stop at 0.5 always
  // sits at the same world height/slope regardless of the layer's hMin/hMax
  // window. Lets you line up tints across layers (e.g. snow and rock both
  // turning blueish at h=0.7, or all layers darkening at slope > 0.6).
  // WebGL1 GLSL can't pass arrays as function args, so this is unrolled as a
  // fixed-bound for-loop the compiler can handle.
  const applyGradient = (idx, prefix, axisExpr, tagBase) => `
      if (${prefix}EnabledLayer${idx} > 0.5) {
        float ${tagBase}t = clamp(${axisExpr}, 0.0, 1.0);
        vec3 ${tagBase}Col = ${prefix}StopsLayer${idx}[0].rgb;
        float ${tagBase}PrevPos = ${prefix}StopsLayer${idx}[0].a;
        vec3 ${tagBase}PrevCol = ${prefix}StopsLayer${idx}[0].rgb;
        for (int gi = 1; gi < 8; gi++) {
          if (gi >= ${prefix}StopCountLayer${idx}) break;
          vec4 ${tagBase}Stop = ${prefix}StopsLayer${idx}[gi];
          if (${tagBase}t <= ${tagBase}Stop.a) {
            float ${tagBase}Span = max(${tagBase}Stop.a - ${tagBase}PrevPos, 1e-5);
            float ${tagBase}Lt = clamp((${tagBase}t - ${tagBase}PrevPos) / ${tagBase}Span, 0.0, 1.0);
            ${tagBase}Col = mix(${tagBase}PrevCol, ${tagBase}Stop.rgb, ${tagBase}Lt);
            break;
          }
          ${tagBase}PrevPos = ${tagBase}Stop.a;
          ${tagBase}PrevCol = ${tagBase}Stop.rgb;
          ${tagBase}Col = ${tagBase}Stop.rgb;
        }
        la *= mix(vec3(1.0), ${tagBase}Col, ${prefix}StrengthLayer${idx});
      }
  `;

  // For each auto-layer, generate a blend block
  const layerBlocks = state.layers.map((l, idx) => {
    const u = `uLayer${idx}`;
    // Two gradient snippets: height-based (uses `h`) and slope-based (uses
    // `slp`). They share the same loop shape but different uniform prefixes
    // and different scope tags so the inlined locals don't collide.
    const heightGrad = applyGradient(idx, 'grad',      'h',   'gh');
    const slopeGrad  = applyGradient(idx, 'slopeGrad', 'slp', 'gs');
    const grad = heightGrad + slopeGrad;
    // Organic layers (grass, snow, sand) get erased where the damage mask
    // has scorched the ground. Rock/cliff stays because scorched material
    // paints on top of it.
    const erodesOnDamage = (l.material !== 'rock' && l.material !== 'cliff' && l.material !== 'damage');
    const damageMultiply = erodesOnDamage ? '\n      w *= (1.0 - damageScorch);' : '';
    // Fixed layers read BOTH the pre-crater height and the pre-crater
    // slope, so an explosion can never cause new coverage of this layer
    // inside the new crater — only erase. Flattening a cliff (lowering
    // slope into grass's sMin..sMax band) or digging a pit (lowering
    // height into grass's hMin..hMax band) both get ignored.
    const heightVar = l.fixed ? 'vHeight01Original' : 'vHeight01';
    const slopeVar  = l.fixed ? 'slopeOriginal'    : 'slope';
    return `
    // --- Layer ${idx}: ${l.material}${l.fixed ? ' (fixed)' : ''} ---
    {
      float h = ${heightVar};
      float slp = ${slopeVar};

      // ── Per-edge organic noise (gated to a width band around each edge) ──
      // Each of the 4 band edges (hMin / hMax / sMin / sMax) gets its own
      // displacement that is multiplied by a "near this edge" mask. The mask
      // is 1 right ON the edge and falls to 0 at distance = width away, so:
      //   - the deep interior of the layer is untouched (mask = 0)
      //   - the deep exterior is also untouched (mask = 0)
      //   - only the strip of width edgeNoiseWidth around the chosen edge
      //     gets the wobble.
      // The displacement is a single fbm2 sample (decorrelated for slope via
      // an offset coord), shared between all 4 edges so the cost stays at
      // 2 noise samples per pixel regardless of how many edges are toggled.
      // edgeNoiseScaleExp lets the slider span ~5 orders of magnitude with
      // useful precision: actual scale = 10^edgeNoiseScaleExp.
      float hMinEdge = ${u}.x;
      float hMaxEdge = ${u}.y;
      float sMinEdge = ${u}.z;
      float sMaxEdge = ${u}.w;
      if (edgeNoiseEnabledLayer${idx} > 0.5) {
        float scaleLin = exp2(edgeNoiseScaleLayer${idx} * 3.32192809);  // = 10^x
        vec2 np = vWorldPos.xz * scaleLin;
        float nH = edgeFbm2(np) * 2.0 - 1.0;
        float nS = edgeFbm2(np + vec2(31.7, 57.3)) * 2.0 - 1.0;
        float amt = edgeNoiseAmountLayer${idx};
        float wd  = max(edgeNoiseWidthLayer${idx}, 1e-4);

        // For each edge, build a "near edge" mask in axis units:
        //   distance from the edge, normalized by width, clamped, then 1-x.
        // A smoothstep gives a soft falloff so the noise blends in/out at
        // the boundary of its own influence zone.
        if (edgeMaskHMinLayer${idx} > 0.5) {
          float m = 1.0 - smoothstep(0.0, wd, abs(h - hMinEdge));
          hMinEdge += nH * amt * m;
        }
        if (edgeMaskHMaxLayer${idx} > 0.5) {
          float m = 1.0 - smoothstep(0.0, wd, abs(h - hMaxEdge));
          hMaxEdge += nH * amt * m;
        }
        if (edgeMaskSMinLayer${idx} > 0.5) {
          float m = 1.0 - smoothstep(0.0, wd, abs(slp - sMinEdge));
          sMinEdge += nS * amt * m;
        }
        if (edgeMaskSMaxLayer${idx} > 0.5) {
          float m = 1.0 - smoothstep(0.0, wd, abs(slp - sMaxEdge));
          sMaxEdge += nS * amt * m;
        }
      }

      // Soft falloff moves OUTWARD from the band so the interior is always 1.0.
      // This matters at the extremes (hMin=0 / sMin=0 etc) — otherwise the
      // soft transition would pull the band inward and make flat grass at
      // height=0 only half-opaque.
      float hM = smoothstep(hMinEdge - softLayer${idx}, hMinEdge, h)
               * (1.0 - smoothstep(hMaxEdge, hMaxEdge + softLayer${idx}, h));
      float sM = smoothstep(sMinEdge - softLayer${idx}, sMinEdge, slp)
               * (1.0 - smoothstep(sMaxEdge, sMaxEdge + softLayer${idx}, slp));
      float w = hM * sM * strengthLayer${idx};${damageMultiply}

      // ── Drop shadow on the UNDERLYING layer, just outside this layer ──
      // Dilate this layer's mask by (shadowDist + shadowBlur) and take the
      // band that's INSIDE the dilated mask but OUTSIDE this layer's own
      // soft-edge zone. The result darkens whatever was already painted in
      // 'albedo' (sand/rock from earlier layers) in a strip just past the
      // grass edge — so the grass itself stays bright and the rock right
      // next to it looks recessed underneath the grass.
      float dropAmt = 0.0;
      if (shadowLayer${idx} > 0.0001) {
        float sD = max(shadowDistLayer${idx}, 0.001);
        float sB = max(shadowBlurLayer${idx}, 0.001);
        float dilate = sD + sB;
        float outerSoft = softLayer${idx} + dilate;
        // Wider mask: same h/slp criteria but pulled OUTWARD by 'dilate'.
        float hMout = smoothstep(hMinEdge - outerSoft, hMinEdge, h)
                    * (1.0 - smoothstep(hMaxEdge, hMaxEdge + outerSoft, h));
        float sMout = smoothstep(sMinEdge - outerSoft, sMinEdge, slp)
                    * (1.0 - smoothstep(sMaxEdge, sMaxEdge + outerSoft, slp));
        float wOuter = hMout * sMout * strengthLayer${idx};
        // Darken the full dilated band on albedo. Where this layer is
        // opaque, the later mix(albedo, la, w) hides it; where the layer
        // is semi-transparent (soft edge) the shadow shows through under it.
        float band = clamp(wOuter, 0.0, 1.0);
        dropAmt = band * shadowLayer${idx};
        albedo *= (1.0 - dropAmt * 0.85);
      }

      // ── Highlight band INSIDE the layer edge, on the sun-facing side ──
      // We need a true world-XZ distance to the edge so the band width
      // is in real units. Use derivatives of w to reconstruct the gradient
      // and project (w - 0.5) along it.
      float lipBoost = 1.0;
      if (thickLayer${idx} > 0.0001 && w > 0.001) {
        float dwdx = dFdx(w);
        float dwdy = dFdy(w);
        vec2 dXdx = vec2(dFdx(vWorldPos.x), dFdx(vWorldPos.z));
        vec2 dXdy = vec2(dFdy(vWorldPos.x), dFdy(vWorldPos.z));
        float det = dXdx.x * dXdy.y - dXdx.y * dXdy.x;
        if (abs(det) > 1e-8) {
          vec2 gradW = vec2(
            ( dXdy.y * dwdx - dXdx.y * dwdy) / det,
            (-dXdy.x * dwdx + dXdx.x * dwdy) / det
          );
          float gLen = length(gradW);
          if (gLen > 1e-6) {
            float signedDist = (w - 0.5) / gLen;     // > 0 inside the layer
            vec2 edgeOutward = -gradW / gLen;        // outward XZ normal
            if (signedDist > 0.0) {
              float lW = max(highlightWidthLayer${idx}, 0.001);
              float lipBand = 1.0 - smoothstep(0.0, lW, signedDist);
              // softness reshapes the falloff: > 1 = rounder/bulgier, < 1 = sharper
              lipBand = pow(lipBand, 1.0 / max(highlightSoftLayer${idx}, 0.05));
              vec2 sunH = vec2(uSunDir.x, uSunDir.z);
              float sunHLen = length(sunH);
              float facing = 1.0;
              if (sunHLen > 1e-4) {
                sunH /= sunHLen;
                facing = max(dot(edgeOutward, sunH), 0.0);
              }
              lipBoost = 1.0 + lipBand * thickLayer${idx} * facing;
            }
          }
        }
      }

      if (w > 0.01) {
        vec3 la; vec3 ln; float lr; float ls;
        sample_${l.material}(vWorldPos, geoNormal, blendWeights, scale, la, ln, lr, ls);
        ${grad}
        // Drop shadow darkens THIS layer only (so neighbouring grass stays
        // bright), highlight brightens it on the sun-facing edge.
        la *= brightLayer${idx} * lipBoost;

        // ── Frostbite-style height-based blending ──
        // Treat the sampled albedo's luma as an implicit per-texel "height":
        // brighter texels read as higher and push the mask outward, darker
        // texels read as lower and pull it inward. The (w*(1-w)) envelope
        // confines the displacement to the soft transition zone — interior
        // (w=1) and exterior (w=0) stay untouched, so this only affects the
        // edge crispness, never the layer's footprint. Zero extra texture
        // taps; we already have 'la' in hand.
        // https://media.contentapi.ea.com/content/dam/eacom/frostbite/files/chapter5-andersson-terrain-rendering-in-frostbite.pdf
        float wEff = w;
        if (uHeightBlend > 0.001) {
          float laLuma = dot(la, vec3(0.299, 0.587, 0.114));
          float edgeEnv = w * (1.0 - w) * 4.0;  // peaks at 1 when w=0.5
          wEff = clamp(w + (laLuma - 0.5) * uHeightBlend * edgeEnv, 0.0, 1.0);
        }

        albedo    = mix(albedo, la, wEff);
        normalAcc = mix(normalAcc, ln, wEff);
        roughAcc  = mix(roughAcc, lr, wEff);
        specAcc   = mix(specAcc, ls, wEff);
      }
    }`;
  }).join('\n');

  // Per-layer uniform declarations (vec4 = hMin,hMax,sMin,sMax + scalars for soft/strength/brightness/thickness/shadow)
  const layerUniforms = state.layers.map((_, idx) => `
  uniform vec4  uLayer${idx};
  uniform float softLayer${idx};
  uniform float strengthLayer${idx};
  uniform float brightLayer${idx};
  uniform float thickLayer${idx};
  uniform float highlightWidthLayer${idx};
  uniform float highlightSoftLayer${idx};
  uniform float shadowLayer${idx};
  uniform float shadowDistLayer${idx};
  uniform float shadowBlurLayer${idx};
  // Organic edge-noise on the h/slope band boundaries.
  // Scale is stored as log10(actualScale) so the slider can span ~5 orders
  // of magnitude. Width is the radius (in h/slp units) of the influence band
  // around each toggled edge.
  uniform float edgeNoiseEnabledLayer${idx};
  uniform float edgeNoiseScaleLayer${idx};
  uniform float edgeNoiseAmountLayer${idx};
  uniform float edgeNoiseWidthLayer${idx};
  uniform float edgeMaskHMinLayer${idx};
  uniform float edgeMaskHMaxLayer${idx};
  uniform float edgeMaskSMinLayer${idx};
  uniform float edgeMaskSMaxLayer${idx};
  // Height-gradient tint: up to 8 color stops stored as vec4(rgb, pos).
  // pos < 0 marks an unused slot. Evaluated against vHeight01.
  uniform float gradEnabledLayer${idx};
  uniform float gradStrengthLayer${idx};
  uniform int   gradStopCountLayer${idx};
  uniform vec4  gradStopsLayer${idx}[8];
  // Slope-gradient tint: same shape, evaluated against slp (0=flat, 1=cliff).
  uniform float slopeGradEnabledLayer${idx};
  uniform float slopeGradStrengthLayer${idx};
  uniform int   slopeGradStopCountLayer${idx};
  uniform vec4  slopeGradStopsLayer${idx}[8];`).join('\n');

  return `
  uniform float uTime;
  uniform float uTexScale;
  uniform float uBlendSharpness;
  uniform float uHeightBlend;       // global Frostbite-style height-blend strength (0 = pure smoothstep masks, 1 = fully luma-driven)
  uniform sampler2D uSedimentTex;   // CPU-baked talus mask (R8). Sampled in heightmap UV space.
  uniform float     uSedimentEnabled;
  uniform float     uSedimentStrength;
  uniform float     uSedimentDebugTint;
  uniform vec3  uSunDir;
  uniform vec3  uFogColor;
  uniform float uFogDensity;
  uniform vec3  uAmbientSky;
  uniform vec3  uAmbientHorizon;
  uniform vec3  uAmbientGround;
  uniform float uBaseBrightness;
  uniform float uAmbientStrength;
  uniform float uSunStrength;
  // Explosion flash light: drives a soft point-light highlight on the
  // terrain so a blast lights up the surrounding ground. Intensity is 0
  // when no flash is alive — the term short-circuits to nothing then.
  uniform vec3  uFlashPos;
  uniform vec3  uFlashColor;
  uniform float uFlashIntensity;
  uniform float uFlashRadius;
  uniform float uRimStrength;
  uniform float uSpecular;

  // Shadow mapping
  uniform sampler2D uShadowMap;
  uniform mat4  uShadowMatrix;
  uniform float uShadowEnabled;
  uniform float uShadowBias;
  uniform float uShadowNormalBias;
  uniform float uShadowMapSize;
  uniform float uShadowSoftness;

  // Heightmap normalization (from CPU min/max analysis)
  uniform float uHeightMinWorld;
  uniform float uHeightMaxWorld;

  // World size (used to convert vWorldPos.xz to a damage mask UV)
  uniform float uWorldWidth;
  uniform float uWorldDepth;

  // Explosion damage mask (R = scorch, G = crater depth)
  uniform sampler2D uDamageMask;
  uniform float     uDamageEnabled;

  // Crater decals — up to MAX_DECALS oriented quads composited on top of

  //   uDecalAlbedo: RGB albedo (×2× tint), A = decal opacity mask
  //   uDecalNormal: RGB tangent-space normal (unused here for now), A = glow mask

  //   uDecalParams[i].xy = world-XZ centre
  //   uDecalParams[i].z  = world-space radius (the decal occupies a
  //                        2*radius square centred on .xy)
  //   uDecalParams[i].w  = rotation angle in radians (orientation jitter
  //                        so repeats don't look identical)
  //   uDecalFade[i]      = fade multiplier (0..1, drops as the decal ages)
  uniform sampler2D uDecalAlbedo;
  uniform sampler2D uDecalNormal;
  uniform float     uDecalEnabled;
  uniform int       uDecalCount;

  // ORIENTED box anchored to the surface normal at its impact point —
  // not a flat-down projection — so cliff-face hits don't get smeared.
  // Layout per decal:
  //   uDecalCentre[i].xyz = world-space hit position
  //   uDecalCentre[i].w   = invRadius (= 1.0 / radius)
  //   uDecalT[i].xyz      = tangent axis (already rotated by random angle)
  //   uDecalB[i].xyz      = bitangent axis (orthonormal with T, perpendicular to N)
  //   uDecalFade[i].x     = albedo fade, .y = glow fade

  // math doesn't actually require it — the box is defined by T and B.

  uniform vec3      uDecalB[${MAX_DECALS}];
  uniform vec2      uDecalFade[${MAX_DECALS}];

  uniform float     uDecalTint;        // 0..1 — 0 leaves underlying ground unchanged, 1 = full BAR-style 2× tint

  uniform float uTopoEnabled;

  uniform float uTopoWidth;
  uniform float uTopoDepth;
  uniform float uTopoDarken;

  varying vec3 vWorldNormal;
  varying vec3 vWorldNormalOriginal;

  // ── Cheap 2D value noise + 2-octave fbm for layer-edge jitter ──
  // Used to break up hMin/hMax/sMin/sMax band boundaries so material
  // transitions look organic instead of razor-straight. Deliberately
  // lightweight (no simplex, no per-octave shift) — it's sampled on the
  // hot fragment path and we only need low-frequency wobble, not detail.
  float edgeHash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
  }
  float edgeValueNoise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    float a = edgeHash(i);
    float b = edgeHash(i + vec2(1.0, 0.0));
    float c = edgeHash(i + vec2(0.0, 1.0));
    float d = edgeHash(i + vec2(1.0, 1.0));
    return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
  }
  float edgeFbm2(vec2 p) {
    return edgeValueNoise(p) * 0.65 + edgeValueNoise(p * 2.13 + 17.0) * 0.35;
  }

  // ── Hex-tile (Mikkelsen stochastic texturing) ──
  // Kills visible texture repetition by sampling 3 randomly-offset copies of
  // the texture on a triangular grid and blending them by barycentric weights
  // sharpened with a power. Mikkelsen's variant — no per-pixel rotation, no
  // histogram pre-process; works on any texture out of the box. Per axis-tap,
  // so under triplanar a hex-tiled material costs 3 axes × 3 hex samples = 9
  // taps for color + 9 for normal = 18 taps. Under biplanar 12 taps. Use
  // sparingly (1-2 dominant materials), but the visual win is dramatic.
  // https://godotshaders.com/shader/stochastic-hex-tiling-mikkelsens-adaptation/
  vec2 hex_hash(vec2 p) {
    vec2 r = mat2(127.1, 311.7, 269.5, 183.3) * p;
    return fract(sin(r) * 43758.5453);
  }
  vec4 hex_weights(vec2 uv, out vec2 vert0, out vec2 vert1, out vec2 vert2) {
    // Skew uv into triangular grid (after Heitz/Mikkelsen).
    const mat2 toSkew = mat2(1.0, 0.0, -0.57735027, 1.15470054);
    vec2 sk = toSkew * uv;
    vec2 fl = floor(sk);
    vec2 fr = fract(sk);
    // Pick the triangle in this rhombic cell (upper or lower).
    float upperTri = step(1.0, fr.x + fr.y);
    vec2 v0 = fl + vec2(upperTri, upperTri);
    vec2 v1 = fl + vec2(upperTri, 1.0 - upperTri);
    vec2 v2 = fl + vec2(1.0 - upperTri, upperTri);
    // Barycentric weights inside the chosen triangle.
    vec3 bw = vec3(1.0 - fr.x - fr.y, fr.x, fr.y);
    // GLSL ES 1.00 has no vector ternary; mix() does the same job branchlessly.
    bw = mix(bw, vec3(-bw.x, 1.0 - bw.z, 1.0 - bw.y), upperTri);
    vert0 = v0; vert1 = v1; vert2 = v2;
    // Sharpen the blend so the 3-way kiss-points stay tight (Mikkelsen).
    bw = pow(bw, vec3(7.0));
    bw /= dot(bw, vec3(1.0));
    return vec4(bw, 0.0);
  }
  vec3 hex_albedo(sampler2D map, vec2 uv) {
    vec2 v0, v1, v2;
    vec4 w = hex_weights(uv, v0, v1, v2);
    vec3 c0 = texture2D(map, uv + hex_hash(v0)).rgb;
    vec3 c1 = texture2D(map, uv + hex_hash(v1)).rgb;
    vec3 c2 = texture2D(map, uv + hex_hash(v2)).rgb;
    return c0 * w.x + c1 * w.y + c2 * w.z;
  }
  vec3 hex_normalRaw(sampler2D map, vec2 uv) {
    vec2 v0, v1, v2;
    vec4 w = hex_weights(uv, v0, v1, v2);
    vec3 n0 = texture2D(map, uv + hex_hash(v0)).xyz;
    vec3 n1 = texture2D(map, uv + hex_hash(v1)).xyz;
    vec3 n2 = texture2D(map, uv + hex_hash(v2)).xyz;

    // 2× - 1 unpack and the per-axis combine.
    return n0 * w.x + n1 * w.y + n2 * w.z;

    // isn't compiled in at all, so this whole block is omitted (no sampler,
    // no triplanar taps). Organic layer erase via damageScorch still works.
${scorchOn ? `
    if (damageScorch > 0.001) {
      vec3 dAlb; vec3 dNrm; float dRgh; float dSpc;
      sample_damage(vWorldPos, geoNormal, blendWeights, scale, dAlb, dNrm, dRgh, dSpc);
      float m = clamp(damageScorch, 0.0, 1.0);
      albedo    = mix(albedo, dAlb, m);
      normalAcc = mix(normalAcc, dNrm, m);
      roughAcc  = mix(roughAcc, dRgh, m);
      specAcc   = mix(specAcc, dSpc, m);
    }` : ''}

    // ── Crater decals ──
    // Each active decal is an oriented square in world-XZ centred on
    // uDecalParams[i].xy with side length 2*z and rotated by .w. We
    // transform vWorldPos.xz into the decal's local frame, derive UVs,
    // sample albedo (RGB×2×tint, A=opacity) and normal (A=glow), then
    // alpha-blend albedo over the lit ground colour and accumulate glow
    // into glowAcc (added after lighting so it stays bright in shadow).
    vec3 glowAcc = vec3(0.0);
    if (uDecalEnabled > 0.5) {
      // Loop bound is constant (WebGL1 GLSL requirement). Each iteration
      // does:
      //   1. Two array reads (params + rot) and a fast scalar AABB test
      //      against the ROTATED footprint — no trig, no length(), one
      //      multiply per axis.
      //   2. If outside the box: 'continue' — texture samples and the
      //      whole albedo/glow/normal stack are skipped. Drivers can
      //      hoist sampler reads out of branches, but only if the result
      //      is actually used downstream; here every dependent value is
      //      gated, so the reads collapse on out-of-box pixels.
      //   3. If inside: sample, blend, perturb.
      // This keeps per-pixel cost roughly O(decals visible at this pixel)
      // instead of O(MAX_DECALS), so big caps cost nothing on terrain
      // pixels with no nearby decals.
      for (int i = 0; i < ${MAX_DECALS}; i++) {
        if (i >= uDecalCount) break;
        vec4 dc = uDecalCentre[i];
        vec2 fades = uDecalFade[i];
        if (fades.x <= 0.001 && fades.y <= 0.001) continue;

        // Project the world-space delta onto the decal's tangent frame.
        // dot(delta, T) gives the local U axis, dot(delta, B) the V axis,
        // dot(delta, N) is depth along the decal plane — used to reject
        // and softly fade pixels that lie above/below the impact surface.
        // dc.w is invRadius.
        vec3 T = uDecalT[i];
        vec3 B = uDecalB[i];
        vec3 N = cross(T, B);
        vec3 delta = vWorldPos - dc.xyz;
        float lu = dot(delta, T) * dc.w;
        float lv = dot(delta, B) * dc.w;
        float ln = dot(delta, N) * dc.w;
        // Oriented-box reject: ±1 along T and B (tangent square), and
        // ±0.7 slab along N — generous enough to keep curved cliff
        // faces visible, tight enough to cull a different mountain.
        if (abs(lu) > 1.0 || abs(lv) > 1.0 || abs(ln) > 0.7) continue;
        // Smooth fade inside the slab so the decal tapers off cleanly
        // when the surface curves out of the projection volume.
        float slabFade = 1.0 - smoothstep(0.3, 0.7, abs(ln));
        // Surface-normal mismatch fade: cull only when the fragment's
        // terrain normal points away from the decal's anchor normal by
        // more than ~90° (dot < 0). Soft fade between 0 and 0.5 means
        // perpendicular surfaces drop out but matching/curving ones
        // stay at full strength — even when the heightmap-sampled
        // anchor normal disagrees a bit with the displaced mesh normal.
        float normalAlign = smoothstep(0.0, 0.5, max(dot(geoNormal, N), 0.0));

        // Inside the box — do the expensive work now.
        vec2 nld = vec2(lu, lv);
        vec2 uv  = nld * 0.5 + 0.5;
        vec4 alb = texture2D(uDecalAlbedo, uv);
        vec4 nrm = texture2D(uDecalNormal, uv);

        // Soft circular falloff inside the square so the decal blends
        // away at its edges instead of showing a sharp corner.
        float rd   = length(nld);
        float edge = 1.0 - smoothstep(0.85, 1.0, rd);
        // No slope reject anymore — the oriented projection wraps the
        // decal onto the actual surface. Slab fade keeps it confined to
        // the impacted face so it doesn't bleed onto distant terrain.
        float a = clamp(pow(alb.a, 0.55) * 1.4, 0.0, 1.0) * edge * fades.x * slabFade * normalAlign;

        // Albedo: multiply (darken) the underlying ground, scaled by
        // the user's tint slider. tint=0 → unchanged, tint=1 → full
        // multiply onto the dark crack texture.
        vec3 darken = mix(vec3(1.0), alb.rgb, uDecalTint);
        albedo = mix(albedo, albedo * darken, a);

        // Glow: normal-map alpha is the emissive mask. Per-decal glow
        // fade so each crater cools on its own timeline.
        float glowMask = clamp(pow(alb.a, 0.55) * 1.4, 0.0, 1.0) * edge * fades.y * slabFade * normalAlign;
        glowAcc += vec3(1.0, 0.45, 0.12) * nrm.a * glowMask * uDecalGlow;

        // Normal-map perturbation. The decal's tangent-space normal
        // unpacks to (tn.x, tn.y, tn.z); we transform it into world
        // space using the decal's tangent frame: x → T, y → B, z → N.
        // N is reconstructed via cross(T, B) since it's not stored.
        if (uDecalNormalStr > 0.001) {
          vec3 tn = nrm.rgb * 2.0 - 1.0;
          vec3 N  = cross(T, B);
          vec3 worldDecalN = normalize(tn.x * T + tn.y * B + max(tn.z, 0.0) * N);
          normalAcc = normalize(mix(normalAcc, worldDecalN, a * uDecalNormalStr));
        }
      }
    }

    // ── Sediment / talus overlay (CPU-baked mask) ──
    // 1 texture tap. The mask is non-zero at the foot of cliffs (where
    // detached material has accumulated). Debug Tint controls a red
    // overlay so you can see where the mask fires; in production use you
    // would drive a sediment material layer or a paint-mask channel from
    // this signal instead of the debug tint.
    if (uSedimentEnabled > 0.5) {
      vec2 sedUV = vec2(
         vWorldPos.x / uWorldWidth + 0.5,
        -vWorldPos.z / uWorldDepth + 0.5
      );
      float sedMask = texture2D(uSedimentTex, sedUV).r * uSedimentStrength;
      sedMask = clamp(sedMask, 0.0, 1.0);
      // Debug visualisation: warm sand/dust tint blended in by the mask.
      vec3 sedColor = vec3(0.78, 0.62, 0.42);
      float tintAmt = sedMask * uSedimentDebugTint;
      albedo = mix(albedo, albedo * 0.7 + sedColor * 0.55, tintAmt);
    }

    vec3 normal = normalize(normalAcc);
    float roughness = clamp(roughAcc, 0.04, 1.0);

    // ── Topographic contour lines ──
    // Renders subtle horizontal grooves at constant world-Y intervals.
    // Gate by user-configured slope + height ranges. The groove itself is
    // faked with (a) a core darkening term on the line and (b) a normal
    // perturbation that tilts the normal's Y component based on which side
    // of the centerline we're on — that gets picked up by the existing
    // NdotL below, so lit slopes shade the groove's upper lip while
    // anti-sun slopes flip automatically.
    float topoDark = 0.0;
    if (uTopoEnabled > 0.5) {
      float topoSlopeMask =
          smoothstep(uTopoRange.x - 0.02, uTopoRange.x, slope)
        * (1.0 - smoothstep(uTopoRange.y, uTopoRange.y + 0.02, slope));
      float topoHeightMask =
          smoothstep(uTopoRange.z - 0.02, uTopoRange.z, vHeight01)
        * (1.0 - smoothstep(uTopoRange.w, uTopoRange.w + 0.02, vHeight01));
      float topoGate = topoSlopeMask * topoHeightMask;
      if (topoGate > 0.001) {
        // Signed distance to the nearest isoline, in world Y units.
        // s ∈ [-0.5, 0.5) within one spacing cell; multiply by spacing for
        // true world-units distance. Sign tells us which side of the line.
        float spacing = max(uTopoSpacing, 0.01);
        float cell = vWorldPos.y / spacing;
        float s = fract(cell) - 0.5;             // -0.5..0.5
        float absDist = abs(s) * spacing;        // world units from centerline
        float halfWidth = max(uTopoWidth * 0.5, 0.001);
        // Anti-alias the line against screen-space derivative of world Y so
        // it doesn't shimmer at distance. fwidth(vWorldPos.y) gives the
        // pixel footprint in world units.
        float fw = fwidth(vWorldPos.y) * 1.5;
        float lineMask = 1.0 - smoothstep(halfWidth - fw, halfWidth + fw, absDist);
        lineMask *= topoGate;

        if (lineMask > 0.0) {
          // Fake groove shape: tilt the normal's world-Y component by a
          // cross-section that's + on one side of the centerline and − on
          // the other. Using a raised cosine so the perturbation is zero
          // exactly on the line and at the groove lips.
          float tWithin = clamp(absDist / halfWidth, 0.0, 1.0);
          float sideSign = s >= 0.0 ? 1.0 : -1.0;
          // crossSection ∈ [0,1] peak at mid-slope of the groove wall
          float crossSection = sin(tWithin * 3.1415926) * (1.0 - tWithin);
          // Apply to the normal's Y component. The geoNormal's horizontal
          // component defines the "uphill" direction; we push normal away
          // from that direction to make a visible groove wall.
          // geoNormal.xz points in the DOWNHILL horizontal direction (a
          // slope's normal leans away from the ridge). The uphill direction
          // is therefore -geoNormal.xz. We tilt the per-pixel normal toward
          // this uphill vector on the upper wall of the groove and away on
          // the lower wall, so the sun's NdotL picks up a real groove-face
          // shading difference that flips with sun direction.
          vec2 downhill = vec2(geoNormal.x, geoNormal.z);
          float horizLen = length(downhill);
          if (horizLen > 1e-4) {
            vec2 uphill = -downhill / horizLen;
            // s > 0 = above centerline in world Y = upper wall of groove on
            // an uphill-facing slope → tilt normal toward uphill.
            // s < 0 = lower wall → tilt toward downhill.
            vec3 tilt = vec3(sideSign * uphill.x, 0.0, sideSign * uphill.y);
            float amt = crossSection * uTopoDepth * lineMask;
            normal = normalize(normal + tilt * amt);
          }
          // Core darkening gives a hint of inked-in contour even on
          // flat-facing slopes where the normal tilt can't produce
          // strong shading difference.
          topoDark = lineMask * uTopoDarken * (1.0 - tWithin);
          albedo *= (1.0 - topoDark);
        }
      }
    }

    // ── Lighting ──
    // Clamp the detail normal to the same hemisphere as the geometric
    // normal so normal-map detail can never rotate a pixel past 90° from
    // the surface (that was leaving cliff faces in full shadow when the
    // sun hit them geometrically). The clamped normal still carries all
    // the micro detail for diffuse shading.
    vec3 sunDir = normalize(uSunDir);
    vec3 shadeN = normal;
    if (dot(shadeN, geoNormal) < 0.0) shadeN = reflect(shadeN, geoNormal);
    float NdotLgeo = max(dot(geoNormal, sunDir), 0.0);
    float NdotL    = max(dot(shadeN,    sunDir), 0.0);

    vec3 warmLight = vec3(1.0, 0.92, 0.8);

    // Hemispherical ambient uses the geometric normal for the same reason.
    float upDot = clamp(geoNormal.y, -1.0, 1.0);
    vec3 ambient;
    if (upDot >= 0.0) {
      ambient = mix(uAmbientHorizon, uAmbientSky, upDot);
    } else {
      ambient = mix(uAmbientHorizon, uAmbientGround, -upDot);
    }

    // ── Shadow sampling: normal-offset + 16-tap Poisson PCF ──
    // Normal-offset bias pushes the sample point along the surface normal by
    // an amount proportional to the slope. This cures most "stripe" acne
    // without the self-shadowing problems of pure depth bias.
    // The 16-tap Poisson disk gives proper soft edges.
    float shadow = 1.0;
    if (uShadowEnabled > 0.5) {
      // Fade to fully-shadowed as NdotL approaches 0 so backfacing terrain
      // never self-shadows (terminator problem).
      float terminator = smoothstep(0.0, 0.25, NdotLgeo);

      // Normal-offset in world space before projecting into light clip space.
      float normalOffset = uShadowNormalBias * (1.0 - NdotLgeo);
      vec3 biasedWorldPos = vWorldPos + geoNormal * normalOffset;

      vec4 shadowCoord = uShadowMatrix * vec4(biasedWorldPos, 1.0);
      vec3 sc = shadowCoord.xyz / shadowCoord.w;

      if (sc.x >= 0.0 && sc.x <= 1.0 && sc.z <= 1.0 && sc.y >= 0.0 && sc.y <= 1.0) {
        float depth = sc.z - uShadowBias;
        vec2 texel = 1.0 / vec2(uShadowMapSize);
        const vec4 unpack = vec4(1.0, 1.0/255.0, 1.0/65025.0, 1.0/16581375.0);

        // Poisson disk (16 samples, pre-rotated set from common PCF kernels)
        vec2 poisson[16];
        poisson[ 0] = vec2(-0.613392,  0.617481);
        poisson[ 1] = vec2( 0.170019, -0.040254);
        poisson[ 2] = vec2(-0.299417,  0.791925);
        poisson[ 3] = vec2( 0.645680,  0.493210);
        poisson[ 4] = vec2(-0.651784,  0.717887);
        poisson[ 5] = vec2( 0.421003,  0.027070);
        poisson[ 6] = vec2(-0.817194, -0.271096);
        poisson[ 7] = vec2(-0.705374, -0.668203);
        poisson[ 8] = vec2( 0.977050, -0.108615);
        poisson[ 9] = vec2( 0.063326,  0.142369);
        poisson[10] = vec2( 0.203528,  0.214331);
        poisson[11] = vec2(-0.667531,  0.326090);
        poisson[12] = vec2(-0.098422, -0.295755);
        poisson[13] = vec2(-0.885922,  0.215369);
        poisson[14] = vec2( 0.566637,  0.605213);
        poisson[15] = vec2( 0.039766, -0.396100);

        // Cheap per-pixel rotation to break banding from the fixed kernel.
        float ang = fract(sin(dot(vWorldPos.xz, vec2(12.9898, 78.233))) * 43758.5453) * 6.2831853;
        float cs = cos(ang);
        float sn = sin(ang);
        mat2 rot = mat2(cs, -sn, sn, cs);

        float radius = uShadowSoftness;
        float sum = 0.0;
        for (int i = 0; i < 16; i++) {
          vec2 off = rot * poisson[i] * texel * radius;
          vec4 rgba = texture2D(uShadowMap, sc.xy + off);
          float s = dot(rgba, unpack);
          sum += (depth > s) ? 0.0 : 1.0;
        }
        shadow = (sum / 16.0) * terminator;
      } else {
        shadow = 1.0;
      }
    }

    // Diffuse uses the textured NdotL (so micro-relief shows up) while the
    // shadow factor and terminator are driven by NdotLgeo elsewhere. A
    // small floor of NdotLgeo keeps the face from going completely dark
    // on the detail-normal side of a wiggle.
    float diffuseTerm = max(NdotL, NdotLgeo * 0.15);
    vec3 lighting = ambient * uAmbientStrength + warmLight * diffuseTerm * shadow * uSunStrength;

    // ── Explosion flash contribution ──
    // Quadratic falloff with a soft cap, plus N·L so the side of slopes
    // facing the blast lights up more than the back. Skipped when no
    // flash is alive (uFlashIntensity == 0). Added BEFORE tonemap so
    // bright peaks roll off naturally with the rest of the lighting.
    if (uFlashIntensity > 0.0) {
      vec3  toFlash   = uFlashPos - vWorldPos;
      float fdist     = length(toFlash);
      float fr        = max(uFlashRadius, 0.001);
      float att       = 1.0 - clamp(fdist / fr, 0.0, 1.0);
      att             = att * att;                              // smooth falloff
      vec3  flashDir  = toFlash / max(fdist, 1e-4);
      float NdotF     = max(dot(geoNormal, flashDir), 0.0);
      // 0.4 wrap term keeps facing-away terrain from going pitch black —
      // a real fireball lights up everything around it, not just the
      // surfaces with positive NdotL.
      float wrap      = NdotF * 0.6 + 0.4;
      lighting       += uFlashColor * uFlashIntensity * att * wrap;
    }

    vec3 viewDir = normalize(cameraPosition - vWorldPos);
    vec3 halfDir = normalize(sunDir + viewDir);
    float NdotH = max(dot(normal, halfDir), 0.0);
    float shininess = mix(120.0, 4.0, roughness);
    float specStrength = (1.0 - roughness) * uSpecular * specAcc;
    vec3 specular = warmLight * pow(NdotH, shininess) * specStrength * shadow;

    // Ambient occlusion approximation from normalized height
    float ao = smoothstep(0.0, 0.7, vHeight01) * 0.5 + 0.5;

    vec3 color = albedo * lighting * ao + specular;
    // Decal glow stays bright in shadow — added after the lighting pass
    // so it reads as emission rather than reflected light.
    color += glowAcc;

    float rim = 1.0 - max(dot(viewDir, normal), 0.0);
    color += pow(rim, 4.0) * vec3(0.15, 0.25, 0.4) * uRimStrength;

    float dist = length(cameraPosition - vWorldPos);
    float fd = dist * uFogDensity;
    float fogFactor = clamp(1.0 - exp(-fd * fd), 0.0, 0.85);
    color = mix(color, uFogColor, fogFactor);

    color = color / (color + vec3(1.0));
    color = pow(color, vec3(1.0 / 2.2));

    gl_FragColor = vec4(color, 1.0);
  }
  `;
}

// ═══════════════════════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0a0f);
renderer.outputEncoding = THREE.sRGBEncoding;
// ACES Filmic tone mapping is what the BAR map viewer uses — without a
// tonemapper the Water shader's HDR-ish output gets clipped/washed-out
// by the sRGB gamma curve and the surface looks like flat painted plastic.
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 4000);
camera.position.set(12, 10, 16);
camera.lookAt(0, 0, 0);

// ═══════════════════════════════════════════════════════════════════════
//  TEXTURE CACHE — load each unique file only once
// ═══════════════════════════════════════════════════════════════════════
const texLoader = new THREE.TextureLoader();
const texCache = {};
function getTexture(path, { srgb = false } = {}) {
  if (texCache[path]) return texCache[path];
  const t = texLoader.load(path);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  if (srgb) t.encoding = THREE.sRGBEncoding;
  texCache[path] = t;
  return t;
}

// Pre-load every material in the library up-front. Cheap and simple.
for (const m of Object.values(MATERIAL_LIBRARY)) {
  getTexture(m.color, { srgb: true });
  getTexture(m.normal);
  getTexture(m.rough);
}

// Crater decal textures (BAR GL4 layout):
//   _a: RGB albedo (×2× tint when composited), A = decal opacity
//   _n: RGB tangent normal (currently unused — could perturb the surface
//       normal in a future revision), A = glow / emission mask
const decalAlbedoTex = getTexture('textures/decals/T_GroundCrack_09_a.png', { srgb: true });
const decalNormalTex = getTexture('textures/decals/T_GroundCrack_09_n.png');
// Override the default repeat wrap — decals are projected, not tiled,
// so sampling outside [0..1] should return transparent edge texels.
decalAlbedoTex.wrapS = decalAlbedoTex.wrapT = THREE.ClampToEdgeWrapping;
decalNormalTex.wrapS = decalNormalTex.wrapT = THREE.ClampToEdgeWrapping;

// ═══════════════════════════════════════════════════════════════════════
//  SHARED UNIFORMS (not layer-specific)
// ═══════════════════════════════════════════════════════════════════════
const sharedUniforms = {
  uTime: { value: 0 },
  uTexScale: { value: 2.5 },
  uBlendSharpness: { value: 2.0 },
  uHeightBlend: { value: 0.0 },
  // Sediment mask (CPU-baked from the heightmap, 1 sampler in main render).
  // uSedimentTex is replaced with a fresh DataTexture each time the user
  // tweaks Radius / Threshold / Slope Fade — those rebake the mask. The
  // Strength and Debug Tint sliders flow through pure uniforms (no rebake).
  // Initialised to a 1×1 zero texture so the sampler binding is valid even
  // before the first heightmap load (some drivers warn about null samplers).
  uSedimentTex:       { value: (() => {
    const t = new THREE.DataTexture(new Uint8Array([0]), 1, 1, THREE.LuminanceFormat, THREE.UnsignedByteType);
    t.needsUpdate = true;
    return t;
  })() },
  uSedimentEnabled:   { value: 0.0 },
  uSedimentStrength:  { value: 1.0 },
  uSedimentDebugTint: { value: 1.0 },
  uDisplacement: { value: 2.8 },
  uSunDir: { value: new THREE.Vector3(0.6, 0.8, 0.3) },
  uFogColor: { value: new THREE.Vector3(0.55, 0.62, 0.75) },
  uFogDensity: { value: 0.004 },
  uAmbientSky:    { value: new THREE.Vector3(0.55, 0.65, 0.85) },
  uAmbientHorizon:{ value: new THREE.Vector3(0.45, 0.50, 0.60) },
  uAmbientGround: { value: new THREE.Vector3(0.20, 0.18, 0.15) },
  uAmbientStrength: { value: 0.35 },
  uSunStrength:     { value: 1.15 },
  uRimStrength:     { value: 0.0 },
  uSpecular:        { value: 0.12 },
  // Explosion flash. Driven from updateFlashes() — intensity is 0 when
  // no flash is alive, otherwise tracks the brightest live flash.
  uFlashPos:        { value: new THREE.Vector3() },
  uFlashColor:      { value: new THREE.Vector3() },
  uFlashIntensity:  { value: 0.0 },
  uFlashRadius:     { value: 1.0 },
  // Crater decal arrays — populated each frame from activeDecals[].
  // Length must match MAX_DECALS in the shader; pre-allocate so we don't
  // realloc on every frame.
  uDecalAlbedo:     { value: null },
  uDecalNormal:     { value: null },
  uDecalEnabled:    { value: 1.0 },
  uDecalCount:      { value: 0 },
  // .xyz = world-space hit position, .w = invRadius
